          ):(
            <div style={{background:'#fff',borderRadius:14,padding:'14px 20px',boxShadow:`0 4px 20px rgba(0,0,0,0.35)`,textAlign:'right'}}>
              <div style={{fontSize:18,fontWeight:900,color:'#0d0d0d'}}>רובינשטיין רוזנטל</div>
              <div style={{fontSize:13,fontWeight:700,color:GOLD3}}>שמאות מקרקעין</div>
              <div style={{fontSize:11,color:'#6b5e50'}}>Real Estate Appraisal</div>
            </div>
          )}
        </div>
        <p style={{color:`${GOLD}99`,fontSize:14,marginBottom:36,letterSpacing:'0.3px'}}>מערכת ניהול תיקי שמאות מקרקעין</p>
        <button onClick={handle} disabled={busy} style={{
          background:busy?'rgba(255,255,255,0.07)':'#fff',color:BLACK,border:`1px solid ${GOLD}55`,
          borderRadius:14,padding:'15px 32px',fontSize:15,fontWeight:700,cursor:busy?'not-allowed':'pointer',
          display:'flex',alignItems:'center',gap:12,margin:'0 auto',width:'100%',justifyContent:'center',
          boxShadow:'0 4px 20px rgba(0,0,0,0.3)',transition:'all 0.2s',
        }}
        onMouseEnter={e=>{if(!busy){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 28px rgba(0,0,0,0.4), 0 0 0 1px ${GOLD}55`;}}}
        onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.3)';}}>
          {busy?<Spinner size={18} color={BLACK}/>:(
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          )}
          {busy?'מתחבר...':'כניסה עם Google'}
        </button>
        <p style={{color:'rgba(255,255,255,0.18)',fontSize:11,marginTop:24}}>גישה פנימית בלבד — עובדי המשרד</p>
      </div>
    </div>
  );
}

// ═══════════════ DASHBOARD VIEW ══════════════════════════════════
function DashboardView({projects,managed,user,onSetView}){
  const today=new Date();today.setHours(0,0,0,0);
  const in7=new Date(today);in7.setDate(in7.getDate()+7);
  const in14=new Date(today);in14.setDate(in14.getDate()+14);

  const activeProjs=projects.filter(p=>!CLIENT_STATUSES.includes(p.status));
  const clientProjs=projects.filter(p=>CLIENT_STATUSES.includes(p.status));

  const overdueProjs=activeProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d<today;})
    .sort((a,b)=>(a._dueD||a._expD)-(b._dueD||b._expD));
  const urgentProjs=activeProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d>=today&&d<=in14;})
    .sort((a,b)=>(a._dueD||a._expD)-(b._dueD||b._expD));
  const thisWeek=urgentProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d<=in7;});

  const parseNum=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
  const totalFee=managed.reduce((s,c)=>s+parseNum(c.fee),0);

  const teamStats=[
    {name:'יוסי',count:activeProjs.filter(p=>p.yossi).length,color:'#2563eb'},
    {name:'מיכאל',count:activeProjs.filter(p=>p.michael).length,color:'#7c3aed'},
    {name:'פייגי',count:activeProjs.filter(p=>p.feigi).length,color:'#059669'},
  ];

  const userName=USER_BY_EMAIL[(user?.email||'').toLowerCase()]||'';
  const hour=new Date().getHours();
  const greet=hour<12?'בוקר טוב':hour<17?'צהריים טובים':'ערב טוב';

  function KpiCard({icon,label,value,color,sub,onClick}){
    return(
      <div onClick={onClick} style={{background:'#fff',borderRadius:14,padding:'20px 22px',
        boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1px solid #ede8e0',flex:1,minWidth:160,
        cursor:onClick?'pointer':'default',transition:'box-shadow 0.15s,transform 0.15s'}}
        onMouseEnter={e=>{if(onClick){e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.13)';e.currentTarget.style.transform='translateY(-2px)';}}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.07)';e.currentTarget.style.transform='none';}}>
        <div style={{fontSize:26,marginBottom:6}}>{icon}</div>
        <div style={{fontSize:34,fontWeight:900,color,lineHeight:1}}>{value}</div>
        <div style={{fontSize:13,color:'#6b5e50',marginTop:6,fontWeight:600}}>{label}</div>
        {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:3}}>{sub}</div>}
      </div>
    );
  }

  function UrgentRow({p,isOverdue}){
    const d=p._dueD||p._expD;
    const dStr=p.dueDate||p.expected||'';
    const daysLeft=d?Math.round((d-today)/86400000):null;
    const person=p.yossi?'יוסי':p.michael?'מיכאל':p.feigi?'פייגי':'';
    const m=STATUS_META[p.status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
    return(
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderBottom:'1px solid #f5f3ef',fontSize:13,flexWrap:'wrap'}}>
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:'nowrap',
          background:isOverdue?'#fef2f2':'#fff7ed',color:isOverdue?'#dc2626':'#d97706',
          border:`1px solid ${isOverdue?'#fca5a5':'#fcd34d'}`}}>
          {isOverdue?`⚠️ ${Math.abs(daysLeft)} ימים`:daysLeft===0?'🔴 היום':`📅 ${daysLeft} ימים`}
        </span>
        <span style={{flex:1,fontWeight:600,color:'#1a1510',minWidth:120}}>{p.name}</span>
        <span style={{color:'#9a8e84',fontSize:12}}>{dStr}</span>
        {person&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:700,background:'#fef3c7',color:'#4b3400',border:'1px solid #d9af34'}}>{person}</span>}
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:m.bg,color:m.fg,border:`1px solid ${m.dot}44`}}>{p.status}</span>
      </div>
    );
  }

  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'};
  const secTitle=(icon,t,count)=>(
    <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontSize:17}}>{icon}</span>{t}
      {count!==undefined&&<span style={{background:`${GOLD}22`,color:GOLD3,borderRadius:20,padding:'1px 9px',fontSize:12,fontWeight:700}}>{count}</span>}
    </div>
  );

  return(
    <div style={{padding:'28px 32px',maxWidth:1400,animation:'fadeIn 0.3s ease'}}>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:26,fontWeight:900,color:GOLD3}}>{greet}{userName?` ${userName}`:''} 👋</h2>
        <div style={{fontSize:13,color:'#9a8e84',marginTop:3}}>
          {new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </div>
      </div>

      <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
        <KpiCard icon="📁" label="פרויקטים פעילים" value={activeProjs.length} color={GOLD3}
          sub={overdueProjs.length>0?`${overdueProjs.length} באיחור`:'הכל בזמן ✓'} onClick={()=>onSetView('projects')}/>
        <KpiCard icon="⏳" label="ממתין ללקוח" value={clientProjs.length} color="#7c3aed" onClick={()=>onSetView('client')}/>
        <KpiCard icon="⚡" label="דד-ליין השבוע" value={thisWeek.length} color="#d97706"
          sub={urgentProjs.length>thisWeek.length?`${urgentProjs.length} ב-14 יום`:''}/>
        <KpiCard icon="🗂️" label="כלל התיקים" value={managed.length} color="#2563eb"
          onClick={()=>onSetView('managed')}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={sec}>
          {secTitle('🔴','באיחור',overdueProjs.length)}
          {overdueProjs.length===0?(
            <div style={{textAlign:'center',color:'#9a8e84',padding:'24px 0',fontSize:13}}>אין תיקים באיחור 🎉</div>
          ):(
            <div style={{borderRadius:10,overflow:'hidden',border:'1px solid #fee2e2'}}>
              {overdueProjs.slice(0,8).map(p=><UrgentRow key={p._row} p={p} isOverdue={true}/>)}
              {overdueProjs.length>8&&<div style={{padding:'8px 14px',fontSize:12,color:'#9a8e84',textAlign:'center'}}>ועוד {overdueProjs.length-8}...</div>}
            </div>
          )}
        </div>
        <div style={sec}>
          {secTitle('📅','דד-ליין — 14 יום קרובים',urgentProjs.length)}
          {urgentProjs.length===0?(
            <div style={{textAlign:'center',color:'#9a8e84',padding:'24px 0',fontSize:13}}>אין תאריכי יעד קרובים</div>
          ):(
            <div style={{borderRadius:10,overflow:'hidden',border:'1px solid #fed7aa'}}>
              {urgentProjs.slice(0,8).map(p=><UrgentRow key={p._row} p={p} isOverdue={false}/>)}
              {urgentProjs.length>8&&<div style={{padding:'8px 14px',fontSize:12,color:'#9a8e84',textAlign:'center'}}>ועוד {urgentProjs.length-8}...</div>}
            </div>
          )}
        </div>
      </div>

      <div style={sec}>
        {secTitle('👥','ביצועי הצוות')}
        <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
          {teamStats.map(({name,count,color})=>(
            <div key={name} style={{flex:1,minWidth:120,background:'#faf8f4',borderRadius:12,padding:'18px',textAlign:'center',border:'1px solid #ede8e0'}}>
              <div style={{fontSize:32,fontWeight:900,color}}>{count}</div>
              <div style={{fontSize:14,fontWeight:700,color:'#4b3400',marginTop:6}}>{name}</div>
              <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>תיקים פעילים</div>
            </div>
          ))}
          <div style={{flex:1,minWidth:120,background:'#faf8f4',borderRadius:12,padding:'18px',textAlign:'center',border:'1px solid #ede8e0'}}>
            <div style={{fontSize:32,fontWeight:900,color:'#6b5e50'}}>{activeProjs.length}</div>
            <div style={{fontSize:14,fontWeight:700,color:'#4b3400',marginTop:6}}>סה"כ</div>
            <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>בביצוע</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ REPORTS VIEW ════════════════════════════════════
function ReportsView({managed,projects}){
  const [tab,setTab]=useState('summary');
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');

  const parseNum=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};

  // Financial stats
  const withFee=managed.filter(c=>parseNum(c.fee)>0);
  const totalFee=withFee.reduce((s,c)=>s+parseNum(c.fee),0);
  const completedCases=managed.filter(c=>c.status==='הסתיים');
  const completedFee=completedCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const activeCases=managed.filter(c=>c.status==='בביצוע');
  const activeFee=activeCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const pendingCases=managed.filter(c=>c.status==='ממתין');
  const pendingFee=pendingCases.reduce((s,c)=>s+parseNum(c.fee),0);

  // Monthly (last 12 months)
  const monthKey=s=>{if(!s)return null;const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}`:null;};
  const now=new Date();
  const months=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);
    return{key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleDateString('he-IL',{month:'short',year:'2-digit'})};
  });
  const monthlyData=months.map(m=>({...m,count:managed.filter(c=>monthKey(c.openDate)===m.key).length,fee:managed.filter(c=>monthKey(c.openDate)===m.key).reduce((s,c)=>s+parseNum(c.fee),0)}));
  const maxMonthCount=Math.max(...monthlyData.map(m=>m.count),1);

  // Group helpers
  const groupBy=(arr,key)=>{
    const map={};
    arr.forEach(c=>{const k=c[key]||'—';if(!map[k])map[k]={count:0,fee:0};map[k].count++;map[k].fee+=parseNum(c.fee);});
    return Object.entries(map).sort((a,b)=>b[1].count-a[1].count);
  };
  const bankStats=groupBy(managed,'bank').slice(0,10);
  const cityStats=groupBy(managed,'city').slice(0,10);
  const purposeStats=groupBy(managed,'purpose').slice(0,8);
  const maxBar=Math.max(...[...bankStats,...cityStats].map(([,v])=>v.count),1);

  // Filtered table
  const filtered=useMemo(()=>{
    let arr=[...managed];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.bank,c.folder,c.purpose].some(v=>String(v||'').toLowerCase().includes(q)));
    if(statusFilter)arr=arr.filter(c=>c.status===statusFilter);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'',vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      return sortDir==='asc'?String(va).localeCompare(String(vb),'he'):String(vb).localeCompare(String(va),'he');
    });
    return arr;
  },[managed,search,statusFilter,sortKey,sortDir]);
  const toggleSort=k=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const STATUS_C={'הסתיים':{bg:'#dcfce7',fg:'#166534',bar:'#22c55e'},'בביצוע':{bg:'#fdf8ee',fg:'#4b3400',bar:GOLD},'ממתין':{bg:'#ffedd5',fg:'#9a3412',bar:'#f97316'},'בוטל':{bg:'#fee2e2',fg:'#991b1b',bar:'#ef4444'}};
  const tabBtns=[{id:'summary',label:'📊 סיכום'},{id:'cases',label:'📋 דוח תיקים'},{id:'stats',label:'📈 ניתוח'}];
  const inp={padding:'8px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,background:'#fff',outline:'none'};
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',border:'1px solid #ede8e0',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:16};
  const KpiCard=({icon,label,value,sub,color})=>(
    <div style={{background:'#fff',borderRadius:14,padding:'20px 22px',flex:1,minWidth:155,border:'1px solid #ede8e0',boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:26,fontWeight:900,color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:12,color:'#6b5e50',marginTop:6,fontWeight:600}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:3}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease',maxWidth:1400}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800,color:GOLD3}}>📊 דוחות</h2>
        <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{managed.length} תיקים במסד הנתונים</div>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,marginBottom:24,background:'#fff',borderRadius:12,padding:4,border:'1px solid #ede8e0',width:'fit-content'}}>
        {tabBtns.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 18px',borderRadius:9,border:'none',background:tab===t.id?BLACK:'transparent',color:tab===t.id?GOLD:'#6b5e50',fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:13,transition:'all 0.15s'}}>{t.label}</button>
        ))}
      </div>

      {/* ── SUMMARY ── */}
      {tab==='summary'&&<div>
        <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
          <KpiCard icon="🗂️" label="סה״כ תיקים" value={managed.length} color={GOLD3}/>
          <KpiCard icon="✅" label="הסתיים" value={completedCases.length} sub={`${managed.length>0?Math.round(completedCases.length/managed.length*100):0}%`} color="#059669"/>
          <KpiCard icon="🔄" label="בביצוע" value={activeCases.length} sub={`${managed.length>0?Math.round(activeCases.length/managed.length*100):0}%`} color="#2563eb"/>
          <KpiCard icon="⏳" label="ממתין" value={pendingCases.length} sub={`${managed.length>0?Math.round(pendingCases.length/managed.length*100):0}%`} color="#d97706"/>
        </div>

        {/* Monthly bar chart */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:16}}>📅 פתיחת תיקים — 12 חודשים אחרונים</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:110}}>
            {monthlyData.map(m=>(
              <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                {m.count>0&&<div style={{fontSize:10,color:'#9a8e84',fontWeight:700}}>{m.count}</div>}
                <div style={{width:'100%',background:m.count>0?GOLD:'#e8e3da',borderRadius:'4px 4px 0 0',height:`${Math.max(3,m.count/maxMonthCount*85)}px`,transition:'height 0.4s'}}/>
                <div style={{fontSize:9,color:'#9a8e84',textAlign:'center',lineHeight:1.2,whiteSpace:'nowrap'}}>{m.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Status breakdown */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:16}}>👥 ביצועי צוות — פרויקטים פעילים</div>
          {(()=>{
            const teamData=[
              {name:'יוסי',color:'#2563eb',icon:'👤'},
              {name:'מיכאל',color:'#7c3aed',icon:'👤'},
              {name:'פייגי',color:'#059669',icon:'👤'},
            ].map(t=>{
              const teamCases=managed.filter(c=>c.michael===t.name||c.folder?.includes(t.name));
              const done=managed.filter(c=>c.status==='הסתיים'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              const active=managed.filter(c=>c.status==='בביצוע'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              return{...t,total:teamCases.length,done,active,pct:teamCases.length>0?Math.round(done/teamCases.length*100):0};
            });
            const maxTotal=Math.max(...teamData.map(t=>t.total),1);
            // Also: monthly open rate (last 6 months)
            const recentMonths=monthlyData.slice(-6);
            const avgPerMonth=recentMonths.length?Math.round(recentMonths.reduce((s,m)=>s+m.count,0)/recentMonths.length):0;
            const thisMonth=recentMonths[recentMonths.length-1]?.count||0;
            const trend=thisMonth>avgPerMonth?'↑':'↓';
            const trendColor=thisMonth>=avgPerMonth?'#059669':'#d97706';
            return(
              <div>
                {teamData.map(t=>(
                  <div key={t.name} style={{marginBottom:16}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13,alignItems:'center'}}>
                      <span style={{fontWeight:700,color:t.color}}>{t.name}</span>
                      <div style={{display:'flex',gap:14,fontSize:12}}>
                        <span style={{background:'#f0ebe3',borderRadius:10,padding:'2px 8px',color:'#6b5e50'}}>{t.total} תיקים</span>
                        <span style={{background:'#dcfce7',borderRadius:10,padding:'2px 8px',color:'#166534'}}>✓ {t.done} הסתיים</span>
                        <span style={{background:'#fdf8ee',borderRadius:10,padding:'2px 8px',color:GOLD3}}>🔄 {t.active} פעיל</span>
                        <span style={{fontWeight:800,color:t.color}}>{t.pct}%</span>
                      </div>
                    </div>
                    <div style={{height:10,background:'#f0ebe3',borderRadius:5,overflow:'hidden',position:'relative'}}>
                      <div style={{height:'100%',width:`${t.total/maxTotal*100}%`,background:`${t.color}33`,borderRadius:5,position:'absolute'}}/>
                      <div style={{height:'100%',width:`${t.done/maxTotal*100}%`,background:t.color,borderRadius:5,position:'absolute',transition:'width 0.6s'}}/>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:20,padding:'14px 16px',background:'#faf8f4',borderRadius:10,border:'1px solid #ede8e0',display:'flex',gap:24,alignItems:'center'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:900,color:trendColor}}>{trend} {thisMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>תיקים החודש</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:900,color:GOLD3}}>{avgPerMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>ממוצע 6 חודשים</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:3,alignItems:'flex-end',height:32}}>
                      {recentMonths.map(m=>(
                        <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                          <div style={{width:'100%',background:m.count>=avgPerMonth?GOLD:'#e0d8cc',borderRadius:'3px 3px 0 0',height:`${Math.max(3,m.count/Math.max(...recentMonths.map(x=>x.count),1)*26)}px`}}/>
                          <div style={{fontSize:8,color:'#9a8e84'}}>{m.label.split(' ')[0]}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>}

      {/* ── CASES TABLE ── */}
      {tab==='cases'&&<div>
        <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש..." style={{...inp,flex:1,minWidth:220}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={inp}>
            <option value="">כל הסטטוסים</option>
            {['הסתיים','בביצוע','ממתין','בוטל'].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(search||statusFilter)&&<button onClick={()=>{setSearch('');setStatusFilter('');}} style={{...inp,background:'#ede8e0',color:'#4b3400',cursor:'pointer'}}>נקה ×</button>}
          <div style={{marginRight:'auto',display:'flex',gap:16,fontSize:13,fontWeight:700}}>
            <span style={{color:'#6b5e50'}}>{filtered.length} תיקים</span>

          </div>
        </div>
        <div style={{background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:BLACK,color:'#e8dfc9'}}>
                  {[{k:'caseNum',l:'#תיק'},{k:'folder',l:'תיקייה/לקוח'},{k:'city',l:'עיר'},{k:'bank',l:'בנק'},{k:'purpose',l:'מטרה'},{k:'openDate',l:'פתיחה'},{k:'status',l:'סטטוס'}].map(c=>(
                    <th key={c.k} onClick={()=>toggleSort(c.k)} style={{padding:'10px 12px',textAlign:'right',fontWeight:600,whiteSpace:'nowrap',fontSize:12,cursor:'pointer',userSelect:'none'}}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(201,164,78,0.15)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      {c.l}<span style={{marginRight:4,opacity:sortKey===c.k?1:0.3,fontSize:10}}>{sortKey===c.k?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>{
                  const sc=STATUS_C[c.status]||{bg:'#f0ebe3',fg:'#6b5e50'};
                  const fee=parseNum(c.fee);
                  return(
                    <tr key={c._row} style={{borderBottom:'1px solid #ede8e0',background:i%2===0?'#fff':'#fdf9f5',transition:'background 0.1s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}
                      onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fdf9f5'}>
                      <td style={{padding:'10px 12px',fontWeight:800,color:GOLD,whiteSpace:'nowrap'}}>{c.caseNum}</td>
                      <td style={{padding:'10px 12px',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={c.folder||c.client}>{c.folder||c.client}</td>
                      <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.city}</td>
                      <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50',maxWidth:110,overflow:'hidden',textOverflow:'ellipsis'}}>{c.bank}</td>
                      <td style={{padding:'10px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#6b5e50'}} title={c.purpose}>{c.purpose}</td>
                      <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.openDate}</td>
                      <td style={{padding:'10px 12px'}}>
                        {c.status&&<span style={{...sc,padding:'3px 9px',borderRadius:12,fontSize:11,fontWeight:700}}>{c.status}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'#9a8e84'}}><div style={{fontSize:40,marginBottom:10}}>📊</div><div>לא נמצאו תיקים</div></div>}
          </div>
        </div>
      </div>}

      {/* Stats */}
      {tab==='stats'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <div style={sec}>
            <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:16}}>🏦 לפי בנק (top 10)</div>
            {bankStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>אין נתוני בנק</div>:bankStats.map(([bank,{count,fee}])=>(
              <div key={bank} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'58%'}}>{bank==='—'?'לא צוין':bank}</span>
                  <div style={{display:'flex',gap:10,flexShrink:0}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:GOLD,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={sec}>
            <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:16}}>🏙️ לפי עיר (top 10)</div>
            {cityStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>אין נתוני עיר</div>:cityStats.map(([city,{count,fee}])=>(
              <div key={city} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510'}}>{city==='—'?'לא צוין':city}</span>
                  <div style={{display:'flex',gap:10}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:'#7c3aed',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{...sec,marginBottom:0}}>
          <div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:16}}>🎯 לפי מטרת עבודה</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
            {purposeStats.map(([purpose,{count,fee}])=>{
              const pct=managed.length>0?Math.round(count/managed.length*100):0;
              return(
                <div key={purpose} style={{background:'#faf8f4',borderRadius:10,padding:'12px 14px',border:'1px solid #ede8e0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginLeft:8}} title={purpose}>{purpose==='—'?'לא צוין':purpose}</span>
                    <span style={{fontSize:13,fontWeight:900,color:GOLD3,flexShrink:0}}>{count}</span>
                  </div>
                  <div style={{height:5,background:'#e0d8cc',borderRadius:3,overflow:'hidden',marginBottom:5}}>
                    <div style={{height:'100%',width:`${pct}%`,background:GOLD,borderRadius:3}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#9a8e84'}}>
                    <span>{pct}% מהתיקים</span>

                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ══════════════ SETTINGS VIEW ════════════════════════════════════
function SettingsView({user,settings,onSetting}){
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'};
  const secTitle=(icon,t)=><div style={{fontSize:14,fontWeight:800,color:GOLD3,marginBottom:14,display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:17}}>{icon}</span>{t}</div>;
  const row={display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10};
  const lbl={fontSize:13,color:'#4b3400',fontWeight:600};
  const chip=(val,cur,key)=>(
    <button onClick={()=>onSetting(key,val)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${cur===val?GOLD:'#ddd0bb'}`,background:cur===val?'#fef9e8':'#fff',color:cur===val?GOLD3:'#6b5e50',cursor:'pointer',fontSize:13,fontWeight:cur===val?700:400,transition:'all 0.15s'}}>
      {val==='__auto__'?'אוטומטי לפי משתמש':val===''?'כולם':val}
    </button>
  );
  const expandLabels={tall:'📋 צף כלפי מטה',side:'🪟 צף לצד',full:'🖥️ פתיחה מלאה'};
  const userName=(USER_BY_EMAIL||{})[(user?.email||'').toLowerCase().trim()]||'—';
  return(
    <div style={{padding:'28px 32px',maxWidth:720,animation:'fadeIn 0.3s ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,color:GOLD3,marginBottom:20}}>⚙️ הגדרות</h2>
      <div style={sec}>
        {secTitle('👤','פרופיל משתמש')}
        {user&&<div style={{display:'flex',alignItems:'center',gap:14}}>
          {user.picture?<img src={user.picture} style={{width:56,height:56,borderRadius:'50%',border:`2px solid ${GOLD}55`}} alt=""/>
            :<div style={{width:56,height:56,borderRadius:'50%',background:GOLD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:BLACK}}>{(user.name||'?')[0]}</div>}
          <div>
            <div style={{fontSize:16,fontWeight:700,color:BLACK}}>{user.name}</div>
            <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{user.email}</div>
            <div style={{fontSize:12,color:GOLD3,marginTop:4,fontWeight:600}}>{userName||'לא מזוהה'} <span style={{color:'#9a8e84',fontWeight:400}}>(מזוהה לפי כתובת המייל)</span></div>
          </div>
        </div>}
      </div>
      <div style={sec}>
        {secTitle('🖥️','תצוגה')}
        <div style={row}><span style={lbl}>גודל גופן</span>
          <div style={{display:'flex',gap:6}}>
            {['small','medium','large'].map(v=><button key={v} onClick={()=>onSetting('fontSize',v)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${settings?.fontSize===v?GOLD:'#ddd0bb'}`,background:settings?.fontSize===v?'#fef9e8':'#fff',color:settings?.fontSize===v?GOLD3:'#6b5e50',cursor:'pointer',fontSize:v==='small'?11:v==='large'?15:13,fontWeight:settings?.fontSize===v?700:400}}>
              {v==='small'?'קטן':v==='medium'?'רגיל':'גדול'}
            </button>)}
          </div>
        </div>
        <div style={row}><span style={lbl}>פתיחת תיק</span>
          <div style={{display:'flex',gap:6}}>
            {['tall','side','full'].map(v=><button key={v} onClick={()=>onSetting('expandMode',v)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${settings?.expandMode===v?GOLD:'#ddd0bb'}`,background:settings?.expandMode===v?'#fef9e8':'#fff',color:settings?.expandMode===v?GOLD3:'#6b5e50',cursor:'pointer',fontSize:12,fontWeight:settings?.expandMode===v?700:400,whiteSpace:'nowrap'}}>
              {expandLabels[v]||v}
            </button>)}
          </div>
        </div>
      </div>
      <div style={sec}>
        {secTitle('🗂️','ברירת מחדל פרויקטים')}
        <div style={row}><span style={lbl}>הצגת פרויקטים של</span>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {['__auto__','','יוסי','מיכאל','פייגי'].map(v=>chip(v,settings?.defaultPerson||'__auto__','defaultPerson'))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════ APP ══════════════════════════════════════════════
function App(){
  const [token,setToken]=useState(null);
  const [user,setUser]=useState(null);
  const [view,setView]=useState('home');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [projects,setProjects]=useState([]);
  const [managed,setManaged]=useState([]);
  const [settings,setSettings]=useState(loadSettings);
  const onSetting=useCallback((key,val)=>setSettings(s=>{const n={...s,[key]:val};saveSettings(n);return n;}),[]);

  const loadAll=useCallback(async(tok)=>{
    if(tok)api.token=tok;
    setLoading(true);setError('');
    try{
      dynamicCheckOpts=new Set(['','בוצע','לא בוצע','לא אותר','חלקי','נשלח בקשה ללקוח','התקבל','נשלחה דרישה']);
      const [pR,mR]=await Promise.all([
        api.get("'פרויקטים בביצוע'!A1:Y500"),
        api.get("'ניהול תיקים'!A1:X2000"),
      ]);
      setProjects(pR.slice(1).map((r,i)=>parseProject(r,i)).filter(p=>p.name));
      setManaged(mR.slice(1).map((r,i)=>parseManagedCase(r,i)).filter(c=>c.caseNum||c.client));
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  const handleLogin=useCallback(async(tok)=>{
    api.token=tok;setToken(tok);
    try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${tok}`}});
      const u=await r.json();setUser({name:u.name,email:u.email,picture:u.picture});}catch(e){}
    loadAll(tok);
  },[loadAll]);

  const updateProject=useCallback((rowNum,updated)=>setProjects(prev=>prev.map(p=>p._row===rowNum?updated:p)),[]);
  const updateCase=useCallback((rowNum,updated)=>setManaged(prev=>prev.map(c=>c._row===rowNum?{...c,...updated}:c)),[]);
  const addCase=useCallback((newCase)=>setManaged(prev=>[...prev,newCase]),[]);

  const counts=useMemo(()=>({
    active:projects.filter(p=>!CLIENT_STATUSES.includes(p.status)).length,
    client:projects.filter(p=>CLIENT_STATUSES.includes(p.status)).length,
    managed:managed.length,
  }),[projects,managed]);

  if(!token)return<LoginScreen onLogin={handleLogin}/>;

  return(
    <div style={{direction:'rtl',fontFamily:"'Segoe UI',Arial,sans-serif",background:'#f5f3ef',minHeight:'100vh',zoom:FONT_ZOOM[settings.fontSize]||1}}>
      <Sidebar view={view} setView={setView} user={user} onLogout={()=>{api.token=null;setToken(null);setUser(null);setProjects([]);setManaged([]);}} loading={loading} counts={counts}/>
      <div style={{marginRight:230,minHeight:'100vh'}}>
        <div style={{background:'#fff',borderBottom:'1px solid #e0d8cc',padding:'0 28px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {loading&&<><Spinner size={16}/><span style={{fontSize:13,color:'#6b5e50'}}>טוען...</span></>}
            {error&&<span style={{fontSize:13,color:'#dc2626'}}>⚠️ {error}</span>}
          </div>
          <button onClick={()=>loadAll()} disabled={loading} style={{background:'#faf8f4',border:'1px solid #ddd0bb',borderRadius:8,padding:'6px 16px',cursor:loading?'not-allowed':'pointer',fontSize:13,color:'#3a3228',display:'flex',alignItems:'center',gap:6,opacity:loading?0.6:1}}
            onMouseEnter={e=>{if(!loading)e.currentTarget.style.background='#f0ebe3';}}
            onMouseLeave={e=>{e.currentTarget.style.background='#faf8f4';}}>
            🔄 רענן
          </button>
        </div>
        {view==='home'&&<DashboardView projects={projects} managed={managed} user={user} onSetView={setView}/>}
        {view==='projects'&&<ProjectsView projects={projects} onUpdate={updateProject} user={user} managed={managed} onUpdateCase={updateCase} settings={settings}/>}
        {view==='client'&&<ClientView projects={projects} onUpdate={updateProject} user={user} managed={managed} onUpdateCase={updateCase} settings={settings}/>}
        {view==='managed'&&<ManagedView cases={managed} onUpdateCase={updateCase} onAddCase={addCase}/>}
        {view==='reports'&&<ReportsView managed={managed} projects={projects}/>}
        {view==='settings'&&<SettingsView user={user} settings={settings} onSetting={onSetting}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
