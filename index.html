// מוסיף (DD/MM) להערות אם אין כבר תאריך כזה — בדיוק כמו Apps Script
function withNoteDate(notes){
  if(!notes)return notes;
  if(/\(\d{1,2}\/\d{1,2}\)/.test(notes))return notes;
  const d=new Date();
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  return notes.trim()+' ('+dd+'/'+mm+')';
}

async function sendTaskEmails(prev,next,editorEmail){
  const editorName=USER_BY_EMAIL[(editorEmail||'').toLowerCase()]||'מיכאל';
  for(const [field,ownerName,recipient] of TASK_FIELDS){
    if(next[field]&&next[field]!==prev[field]&&editorName!==ownerName){
      const html="<div dir='rtl' style='text-align:right;font-family:Arial'>"
        +"<h2 style='color:#1a73e8'>היי "+ownerName+",</h2>"
        +"<p>התווספה משימה חדשה בתיק: <b>"+next.name+"</b></p>"
        +"<p>נשלח על ידי: <b>"+editorName+"</b></p>"
        +"<div style='background:#f4f4f4;padding:15px;border-right:5px solid #1a73e8;margin-bottom:20px'>"
        +"<b>תוכן המשימה:</b><br>"+next[field]+"</div>"
        +"<a href='"+CONFIG.SHEET_URL+"' style='background-color:#1a73e8;color:white;padding:12px 20px;text-decoration:none;border-radius:5px;font-weight:bold;display:inline-block'>פתח את הגיליון</a>"
        +"</div>";
      try{await api.sendEmail(recipient,'משימה מ'+editorName+': '+next.name,html);}
      catch(e){console.warn('שגיאת מייל:',e.message);}
    }
  }
  // תזכורות עצמיות למיכאל (כמו Apps Script)
  if(editorName==='מיכאל'){
    const reminderHtml=(msg)=>"<div dir='rtl' style='text-align:right;font-family:Arial'>"+msg+"</div>";
    if(next.yossi&&next.yossi!==prev.yossi&&next.yossi.includes('לבדיקה')&&!(next.notes||'').includes('נכתב למעט')){
      api.sendEmail('mr@mrr.co.il','תזכורת תשלום - '+next.name,reminderHtml("רשמת 'לבדיקה' ליוסי. נא לעדכן תשלום.")).catch(()=>{});
    }
    if(next.notes&&next.notes!==prev.notes&&next.notes.includes('נכתב למעט')){
      api.sendEmail('mr@mrr.co.il','תזכורת תשלום - '+next.name,reminderHtml("רשמת 'נכתב למעט' בהערות. נא לעדכן תשלום.")).catch(()=>{});
    }
  }
}

async function syncStatusToManaged(managedCases,projectName,newStatus,onUpdateCase){
  const STATUS_MAP={'נשלח לבנק':'הסתיים','נשלח לבנק / לקוח':'הסתיים','בהמתנה':'ממתין'};
  const targetStatus=STATUS_MAP[newStatus]||'בביצוע';
  const match=managedCases.find(c=>c.folder&&c.folder.trim()===projectName.trim());
  if(!match)return;
  try{
    await api.put(`'ניהול תיקים'!E${match._row}`,[[targetStatus]]);
    if(onUpdateCase)onUpdateCase(match._row,{status:targetStatus});
  }catch(e){console.warn('שגיאת סנכרון סטטוס:',e.message);}
}

const api={
  token:null,
  async get(range,id=CONFIG.SPREADSHEET_ID){
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,
      {headers:{Authorization:`Bearer ${this.token}`}});
    if(!r.ok)throw new Error((await r.json())?.error?.message||r.statusText);
    return(await r.json()).values||[];
  },
  async put(range,values,id=CONFIG.SPREADSHEET_ID){
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
      {method:'PUT',headers:{Authorization:`Bearer ${this.token}`,'Content-Type':'application/json'},
       body:JSON.stringify({range,majorDimension:'ROWS',values})});
    if(!r.ok)throw new Error((await r.json())?.error?.message||r.statusText);
    return r.json();
  },
  async sendEmail(to,subject,html){
    const subjB64='=?UTF-8?B?'+btoa(unescape(encodeURIComponent(subject)))+'?=';
    const msg='To: '+to+'\r\nContent-Type: text/html; charset=UTF-8\r\nMIME-Version: 1.0\r\nSubject: '+subjB64+'\r\n\r\n'+html;
    const encoded=btoa(unescape(encodeURIComponent(msg))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',headers:{Authorization:`Bearer ${this.token}`,'Content-Type':'application/json'},
      body:JSON.stringify({raw:encoded})
    });
    if(!r.ok){const e=await r.json();throw new Error(e?.error?.message||r.statusText);}
  }
};

function colLetter(n){let s='';while(n>0){s=String.fromCharCode(64+((n-1)%26+1))+s;n=Math.floor((n-1)/26);}return s;}
function parseDate(v){
  if(!v)return null; if(v instanceof Date)return isNaN(v)?null:v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(v);return isNaN(d)?null:d;
}
function fmt(v){if(!v)return'';const d=v instanceof Date?v:parseDate(v);if(!d)return String(v);
  return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function g(row,i){return(i<row.length?String(row[i]||'').trim():'');}

    _expD:parseDate(g(row,P.expected)),_dueD:parseDate(g(row,P.dueDate)),_visitD:parseDate(g(row,P.visitDate)),
  };
}

// ═══════════════ PROJECT EXPANDED (inline accordion) ═════════════
function ProjectExpanded({project,onSave,onCollapse,wide}){
  const [form,setForm]=useState({...project});
  const [saving,setSaving]=useState(false);
  const [flashSaved,setFlashSaved]=useState(false);
  const [err,setErr]=useState('');
  const latestFormRef=useRef(form);
  const debounceRef=useRef(null);
  const savingRef=useRef(false);
  const onSaveRef=useRef(onSave);
  useEffect(()=>{onSaveRef.current=onSave;},[onSave]);
  useEffect(()=>()=>clearTimeout(debounceRef.current),[]);

  const set=(k,v)=>setForm(f=>{const n={...f,[k]:v};latestFormRef.current=n;return n;});

  const doSave=async()=>{
    if(savingRef.current)return;
    savingRef.current=true;
    setSaving(true);setErr('');
    try{
      await onSaveRef.current(latestFormRef.current);
      setFlashSaved(true);setTimeout(()=>setFlashSaved(false),1500);
    }catch(e){setErr(e.message);}
    finally{setSaving(false);savingRef.current=false;}
  };

  const schedSave=()=>{clearTimeout(debounceRef.current);debounceRef.current=setTimeout(doSave,320);};

  const checkOpts=[...dynamicCheckOpts].sort();
  const numMatch=project.name.match(/\b(5\d{4})\b/);
  const caseNum=numMatch?numMatch[1]:'';
  const dot=STATUS_META[form.status]?.dot||GOLD;

  const iS={width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid #ddd0bb',fontSize:13,background:'#fffdf8',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
  const kd=(e)=>{if(e.key==='Enter')e.target.blur();};
  const inp=(k,multi=false)=>multi

  const toISO=v=>{if(!v)return'';const m=v.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);if(m)return`${m[3]||new Date().getFullYear()}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;return v;};

  const dateInp=(k)=><input type="date" value={toISO(form[k]||'')} onChange={e=>set(k,fromISO(e.target.value))} onBlur={schedSave} onKeyDown={kd} style={{...iS,cursor:'pointer'}}/>;

      {/* Fields — stopPropagation */}
      <div onClick={e=>e.stopPropagation()} style={wide?{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}:{}}>

          <div>
            <FLabel>סטטוס</FLabel>

          <div><FLabel>תאריך לביצוע</FLabel>{dateInp('dueDate')}</div>

        {/* משימות */}

          {[['יוסי','yossi','#607060'],['מיכאל','michael',GOLD],['פייגי','feigi','#8c6239']].map(([l,k,c])=>(
            <div key={k} style={{marginBottom:7}}>
              <FLabel><span style={{color:c,fontWeight:700}}>{l}</span></FLabel>
              {inp(k)}

        </div>

        {/* הערות */}
        <div style={box}>
          <SectionTitle icon="💬">הערות ותובנות</SectionTitle>

            {docChk('buildingFile','תיק בנין','#8c6239',BUILDING_OPTS)}

            {docChk('visitSheet','דף ביקור','#4b3400',VISIT_SHEET_OPTS)}

        </div>

        {/* פרטי ביקור */}

const CASE_BASE_DEFAULT='G:/תיקיות אחסון שיתופי/רובינשטיין רוזנטל שמאות מקרקעין/שומות - רובינשטיין רוזנטל שמאות מקרקעין/פרויקטים בביצוע';
function getCaseBase(){return(localStorage.getItem('rrFolderBase')||CASE_BASE_DEFAULT).replace(/\\/g,'/');}
function openCaseFolder(folderName,e){
  e.stopPropagation();e.preventDefault();
  window.location.href='openrr:'+getCaseBase()+'/'+folderName;
}
function ProjectCard({project,onClick,hideDate}){
  const [copied,setCopied]=React.useState(false);
  const m=STATUS_META[project.status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
  const today=new Date();
  const expD=project._expD;
  const diff=expD&&!hideDate?Math.round((expD-today)/86400000):null;
  const overdue=diff!==null&&diff<0;
  const soon=diff!==null&&diff>=0&&diff<=2;

  const numMatch=project.name.match(/\b(5\d{4})\b/);
  const caseNum=numMatch?numMatch[1]:'';
  const parts=project.name.replace(/\s*-\s*\d{5}\s*$/,'').split(' - ');
  const city=parts[0]||'';

  const tasks=[
    {n:'יוסי',v:project.yossi,c:'#607060'},
    {n:'מיכאל',v:project.michael,c:GOLD},
    {n:'פייגי',v:project.feigi,c:'#8c6239'},
  ].filter(t=>t.v);

  const checks=[
    {l:'מקדמה',v:project.advance},{l:'מסמכים',v:project.docs},{l:'דף ביקור',v:project.visitSheet},
    {l:'תיק בניין',v:project.buildingFile},{l:'עסקאות',v:project.transactions},
  ].filter(c=>c.v);

  return(
    <div onClick={e=>onClick&&onClick(e)} style={{
      background:'#fff',borderRadius:13,padding:'15px 17px',cursor:'pointer',
      boxShadow:'0 1px 4px rgba(0,0,0,0.07)',borderRight:`5px solid ${m.dot}`,
      transition:'all 0.16s',outline:overdue?'1.5px solid #fca5a5':'none',
    }}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 5px 18px rgba(0,0,0,0.13)';e.currentTarget.style.transform='translateY(-2px)';}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,0.07)';e.currentTarget.style.transform='translateY(0)';}}
    >
      {/* Title */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:9,gap:6}}>
        <div style={{flex:1,minWidth:0}}>
          {caseNum&&<span style={{fontSize:11,fontWeight:700,color:'#7a5f30',background:'#fef3c7',border:'1px solid #d9af34',borderRadius:20,padding:'2px 8px',display:'inline-flex',alignItems:'center',gap:4,marginBottom:4,userSelect:'none'}}><span style={{width:6,height:6,borderRadius:'50%',background:'#d9af34',flexShrink:0}}/>{`#${caseNum}`}</span>}
          <div style={{fontSize:14,fontWeight:700,color:'#0d0d0d',lineHeight:1.4}}>
            <span style={{color:GOLD}}>{city}</span>
            {parts[1]&&<span style={{color:'#4a3e30'}}>{' — '}{parts.slice(1).join(' — ')}</span>}
          </div>
        </div>
        <Badge status={project.status} size="sm"/>
      </div>

      {/* Dates — hidden for client-side */}
      {!hideDate&&(project.dueDate||project.expected||project.visitDate)&&(
        <div style={{display:'flex',gap:10,marginBottom:9,flexWrap:'wrap'}}>
          {project.dueDate&&<span style={{fontSize:12,color:'#6b5e50'}}>⏰ {project.dueDate}</span>}
          {project.expected&&(
            <span style={{fontSize:12,fontWeight:600,color:overdue?'#dc2626':soon?'#d97706':'#6b5e50'}}>
              {overdue?'⚠️':'📅'} {project.expected}
              {diff!==null&&<span style={{marginRight:4,fontSize:11}}>({Math.abs(diff)} ימים {overdue?'איחור':'נותרו'})</span>}
            </span>
          )}
          {project.visitDate&&<span style={{fontSize:12,color:'#6b5e50'}}>🏠 {project.visitDate}</span>}
        </div>
      )}

      {/* Tasks */}
      {tasks.length>0&&(
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
          {tasks.map(t=>(
            <div key={t.n} style={{background:`${t.c}14`,border:`1px solid ${t.c}33`,borderRadius:7,padding:'3px 9px',fontSize:12}}>
              <span style={{color:t.c,fontWeight:700}}>{t.n}: </span>
              <span style={{color:'#3a3228',verticalAlign:'bottom'}}>{t.v}</span>
            </div>
          ))}
        </div>
      )}

      {/* Checklist badges */}
      {checks.length>0&&(
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:project.notes?6:0}}>
          {checks.map(c=>{
            const ok=c.v&&c.v!=='לא בוצע'&&c.v!=='לא אותר';
            const partial=c.v==='חלקי';
            const notDone=c.v==='לא בוצע'||c.v==='לא אותר';
            const color=partial?'#3a2000':ok?'#1a0e00':notDone?'#606060':'#6b5e50';
            const bg=partial?'#f5e8d5':ok?'#fef9e8':notDone?'#e8e8e8':'#f0ebe3';
            const border=partial?'#8c6239':ok?'#d9af34':notDone?'#b8b8b8':'#ddd0bb';
            return<span key={c.l} style={{fontSize:11,padding:'2px 7px',borderRadius:6,background:bg,color,fontWeight:600,border:`1px solid ${border}`}}>
              {partial?'~':ok?'✓':'✗'} {c.l}
            </span>;
          })}
        </div>
      )}

      {/* Notes */}
      {project.notes&&(
        <div style={{fontSize:12,color:'#9a8e84',marginTop:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderTop:'1px solid #ede8e0',paddingTop:5}}>
          💬 {project.notes}
        </div>
      )}

      {/* Missing docs */}
      {project.missingDocs&&(
        <div style={{marginTop:5,fontSize:12,color:'#9a3412',background:'#fff7ed',padding:'4px 8px',borderRadius:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          ⚠️ {project.missingDocs}
        </div>
      )}
    </div>
  );
}

    ?{width:'min(920px,96vw)',height:'94vh',margin:'auto',borderRadius:18,overflow:'hidden',boxShadow:'0 24px 80px rgba(0,0,0,0.35)',animation:'zoomIn 0.22s ease',display:'flex',flexDirection:'column'}

    ?{position:'absolute',top:anchor?.top||100,left:anchor?.left||'50%',transform:anchor?'none':'translateX(-50%)',width:Math.min(anchor?.width||520,window.innerWidth-20),maxHeight:`calc(100vh - ${(anchor?.top||100)+12}px)`,borderRadius:'0 0 14px 14px',overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,0.22)',animation:'expandDown 0.22s ease',transformOrigin:'top',display:'flex',flexDirection:'column'}

    ?{position:'fixed',inset:0,zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.5)',backdropFilter:'blur(5px)'}
    :mode==='tall'
    ?{position:'fixed',inset:0,zIndex:600,background:'transparent'}
    :{position:'fixed',top:0,left:0,bottom:0,right:230,zIndex:600,display:'flex',direction:'ltr',background:'transparent'};
  return(
    <div style={wrapStyle} onClick={onClose}>
      {mode==='side'&&<div style={{flex:1}} onClick={onClose}/>}

        <div style={{background:BLACK,padding:'18px 24px',flexShrink:0,borderLeft:`4px solid ${dot}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
            <div style={{flex:1,minWidth:0}}>
              {caseNum&&<span style={{fontSize:11,fontWeight:700,color:GOLD,background:`${GOLD}22`,border:`1px solid ${GOLD}44`,borderRadius:20,padding:'2px 9px',display:'inline-block',marginBottom:6}}>#{caseNum}</span>}
              <div style={{fontSize:15,fontWeight:700,color:'#fff',lineHeight:1.4,marginBottom:8}}>{project.name}</div>
              <Badge status={form.status}/>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.12)',border:'none',borderRadius:8,width:34,height:34,color:'rgba(255,255,255,0.8)',cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
          </div>
        </div>
        {/* Tabs */}
        <div style={{background:'#fff',display:'flex',borderBottom:'2px solid #ede8e0',padding:'0 16px',flexShrink:0,overflowX:'auto'}}>
          {panelTabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'12px 14px',border:'none',background:'transparent',borderBottom:`2px solid ${tab===t.id?GOLD:'transparent'}`,color:tab===t.id?GOLD3:'#6b5e50',fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:13,marginBottom:-2,whiteSpace:'nowrap',transition:'color 0.15s'}}>{t.label}</button>
          ))}
        </div>
        {/* Save bar */}
        <div style={{background:'#fff',padding:'10px 24px',borderBottom:'1px solid #e0d8cc',position:'sticky',top:0,zIndex:10,flexShrink:0,display:'flex',gap:8}}>
          <button onClick={doSave} disabled={saving} style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:saved?'#16a34a':BLACK,color:saved?'#fff':GOLD,fontWeight:700,cursor:saving?'not-allowed':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            {saving?<><Spinner size={14} color={GOLD}/>שומר...</>:saved?'✓ נשמר!':'💾 שמור שינויים'}
          </button>
          <button onClick={onClose} style={{padding:'9px 16px',borderRadius:9,border:'1px solid #ddd0bb',background:'#fff',cursor:'pointer',fontSize:13,color:'#6b5e50'}}>סגור</button>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 24px',fontSize:13}}>{err}</div>}
        {/* Content */}
        <div style={{padding:'16px 24px',flex:1,overflowY:'auto',minHeight:0}}>
          {tab==='main'&&<div>
            <div style={sec}>
              <SectionTitle icon="⚙️">סטטוס ותאריכים</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{gridColumn:'1/-1'}}><FLabel>סטטוס</FLabel>
                  <select value={form.status||''} onChange={e=>set('status',e.target.value)} style={{...iS,fontFamily:'inherit'}}>
                    <option value="">— בחר —</option>
                    {STATUS_ORDER.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div><FLabel>תאריך לביצוע</FLabel>{dateInp('dueDate')}</div>
                <div><FLabel>צפי לסיום</FLabel>{dateInp('expected')}</div>
              </div>
            </div>
            <div style={sec}>
              <SectionTitle icon="📋">משימות</SectionTitle>
              {[['יוסי','yossi','#607060'],['מיכאל','michael',GOLD],['פייגי','feigi','#8c6239']].map(([l,k,c])=>(
                <div key={k} style={{marginBottom:10}}><FLabel><span style={{color:c,fontWeight:700}}>{l}</span></FLabel>{inp(k)}</div>
              ))}

            <div style={sec}>
              <SectionTitle icon="💬">הערות</SectionTitle>
              {inp('notes',true)}
            </div>
          </div>}
          {tab==='docs'&&<div>
            <div style={sec}>
              <SectionTitle icon="📁">מסמכים ופעולות</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                {docChk('advance','דרישת מקדמה','#d9af34',ADVANCE_OPTS)}
                {docChk('docs','השלמת מסמכים','#c49a28',DOCS_OPTS)}
                {docChk('buildingFile','תיק בניין','#8c6239',BUILDING_OPTS)}
                {docChk('transactions','עסקאות','#6a4520',TRANSACTIONS_OPTS)}

              </div>
              <FLabel>⚠️ מסמכים חסרים</FLabel>{inp('missingDocs',true)}

          {tab==='visit'&&<div>
            <div style={sec}>
              <SectionTitle icon="🏠">פרטי ביקור</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div><FLabel>תאריך ביקור</FLabel>{dateInp('visitDate')}</div>
                <div><FLabel>שעות</FLabel>{inp('visitHours')}</div>
                <div><FLabel>נייד לתיאום</FLabel>{inp('visitPhone')}</div>
                <div><FLabel>שם לתיאום</FLabel>{inp('visitName')}</div>

          {tab==='fee'&&<div>
            <div style={sec}>
              <SectionTitle icon="💰">שכר טרחה</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div><FLabel>סכום שכ"ט (₪)</FLabel>{inp('fee')}</div>
                <div><FLabel>סטטוס תשלום</FLabel>{inp('feeStatus')}</div>

// ═══════════════ PROJECTS VIEW (kanban groups) ═══════════════════
function ProjectsView({projects,onUpdate,user,managed,onUpdateCase,settings}){
  const [search,setSearch]=useState('');
  const [personFilter,setPersonFilter]=useState('');
  const [panelProject,setPanelProject]=useState(null);
  const [panelAnchor,setPanelAnchor]=useState(null);
  const [collapsed,setCollapsed]=useState({});
  const [viewMode,setViewMode]=useState('cards'); // 'cards' | 'table'
  const [colGroup,setColGroup]=useState(0); // 0=ראשי 1=מסמכים 2=ביקור
  const initFilterRef=useRef(false);
  useEffect(()=>{
    if(!initFilterRef.current){
      initFilterRef.current=true;
      const dp=(settings||DEFAULT_SETTINGS).defaultPerson;
      if(dp==='__auto__'){
        const name=USER_BY_EMAIL[(user?.email||'').toLowerCase()];
        if(name)setPersonFilter(name);
      } else {
        setPersonFilter(dp||'');
      }
    }
  },[user,settings]);

  const activeProjects=useMemo(()=>projects.filter(p=>!CLIENT_STATUSES.includes(p.status)),[projects]);

  const filtered=useMemo(()=>{
    let arr=[...activeProjects];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(p=>[p.name,p.yossi,p.michael,p.feigi,p.notes,p.missingDocs].some(v=>v.toLowerCase().includes(q)));
    if(personFilter==='יוסי')arr=arr.filter(p=>p.yossi);
    if(personFilter==='מיכאל')arr=arr.filter(p=>p.michael);
    if(personFilter==='פייגי')arr=arr.filter(p=>p.feigi);
    return arr;
  },[activeProjects,search,personFilter]);

  const groups=useMemo(()=>{
    const byStatus={};
    STATUS_ORDER.filter(s=>!CLIENT_STATUSES.includes(s)).forEach(s=>{
      const items=filtered.filter(p=>p.status===s);
      if(items.length)byStatus[s]=items;
    });
    return byStatus;
  },[filtered]);

  const handleSave=async(upd)=>{
    const prev=projects.find(p=>p._row===upd._row)||{};
    const finalNotes=withNoteDate(upd.notes);
    const finalUpd={...upd,notes:finalNotes};
    const row=buildProjectRow(finalUpd);
    await api.put(`'פרויקטים בביצוע'!A${finalUpd._row}:${colLetter(row.length)}${finalUpd._row}`,[row]);
    onUpdate(finalUpd._row,{...finalUpd,_raw:row});
    // אוטומציות (רקע)
    sendTaskEmails(prev,finalUpd,user?.email).catch(()=>{});
    if(finalUpd.status!==prev.status&&managed)syncStatusToManaged(managed,finalUpd.name,finalUpd.status,onUpdateCase).catch(()=>{});
    if(managed)sendMissingDocsEmailFn(finalUpd,prev,managed).catch(()=>{});
  };

  const toggle=(s)=>setCollapsed(c=>({...c,[s]:!c[s]}));

  const inp={padding:'9px 14px',borderRadius:10,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none'};

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease',maxWidth:1600}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:GOLD3}}>פרויקטים בביצוע</h2>
          <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{filtered.length} תיקים פעילים</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[{id:'cards',label:'🃏 כרטיסים'},{id:'table',label:'📋 טבלה'}].map(m=>(
            <button key={m.id} onClick={()=>{setViewMode(m.id);setSelectedRow(null);}} style={{
              padding:'7px 14px',borderRadius:8,border:`1px solid ${viewMode===m.id?GOLD:'#ddd0bb'}`,
              background:viewMode===m.id?`${GOLD}18`:'#faf8f4',color:viewMode===m.id?GOLD3:'#6b5e50',
              fontWeight:viewMode===m.id?700:400,cursor:'pointer',fontSize:13,transition:'all 0.15s'
            }}>{m.label}</button>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,marginBottom:22,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש — שם, עיר, לקוח, הערות..."
          style={{...inp,flex:1,minWidth:220}}/>
        <select value={personFilter} onChange={e=>setPersonFilter(e.target.value)} style={inp}>
          <option value="">כל הנציגים</option>
          {['יוסי','מיכאל','פייגי'].map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        {(search||personFilter)&&<button onClick={()=>{setSearch('');setPersonFilter('');}}
          style={{...inp,background:'#ede8e0',color:'#4b3400',border:'1px solid #ddd0bb',cursor:'pointer'}}>נקה ×</button>}
      </div>

      {/* Table view */}
      {viewMode==='table'&&(()=>{
        const today2=new Date();today2.setHours(0,0,0,0);
        const Chk=({v})=>{if(!v)return<span style={{color:'#ccc',fontSize:11}}>—</span>;const ok=v==='בוצע'||v==='התקבל';return<span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:8,background:ok?'#d1fae5':'#fef3c7',color:ok?'#065f46':'#4b3400',whiteSpace:'nowrap'}}>{v}</span>;};
        const groups3=[
          {label:'ראשי',cols:[
            {h:'שם תיק',w:'2.5fr',r:p=>{const d=p._dueD||p._expD;const ov=d&&d<today2;return<div style={{display:'flex',alignItems:'center',gap:6,overflow:'hidden'}}>{ov&&<span style={{color:'#dc2626',flexShrink:0,fontSize:11}}>⚠️</span>}<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600,fontSize:12}}>{p.name}</span></div>;}},
            {h:'סטטוס',w:'120px',r:p=>{const m=STATUS_META[p.status]||{};return<span style={{padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:m.bg,color:m.fg,whiteSpace:'nowrap'}}>{p.status}</span>;}},
            {h:'יוסי',w:'90px',r:p=><Chk v={p.yossi}/>},
            {h:'מיכאל',w:'90px',r:p=><Chk v={p.michael}/>},
            {h:'פייגי',w:'70px',r:p=><Chk v={p.feigi}/>},
            {h:'יעד',w:'80px',r:p=>{const d=p._dueD||p._expD;const ov=d&&d<today2;return p.dueDate||p.expected?<span style={{fontSize:11,color:ov?'#dc2626':'#6b5e50'}}>{p.dueDate||p.expected}</span>:<span style={{color:'#ccc'}}>—</span>;}},
            {h:'צפוי',w:'80px',r:p=>p.expected?<span style={{fontSize:11,color:'#6b5e50'}}>{p.expected}</span>:<span style={{color:'#ccc'}}>—</span>},
          ]},
          {label:'מסמכים',cols:[
            {h:'שם תיק',w:'2fr',r:p=><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block',fontWeight:600,fontSize:12}}>{p.name}</span>},
            {h:'תיק בניין',w:'90px',r:p=><Chk v={p.buildingFile}/>},
            {h:'עסקאות',w:'90px',r:p=><Chk v={p.transactions}/>},
            {h:'מסמכים',w:'90px',r:p=><Chk v={p.docs}/>},
            {h:'מסמכים חסרים',w:'1.5fr',r:p=>p.missingDocs?<span style={{fontSize:11,color:'#9a3412',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}} title={p.missingDocs}>{p.missingDocs}</span>:<span style={{color:'#ccc',fontSize:11}}>—</span>},
            {h:'הערות',w:'2fr',r:p=>p.notes?<span style={{fontSize:11,color:'#6b5e50',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}} title={p.notes}>{p.notes}</span>:<span style={{color:'#ccc',fontSize:11}}>—</span>},
          ]},
          {label:'ביקור',cols:[
            {h:'שם תיק',w:'2fr',r:p=><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block',fontWeight:600,fontSize:12}}>{p.name}</span>},
            {h:'גיליון ביקור',w:'90px',r:p=><Chk v={p.visitSheet}/>},
            {h:'תאריך ביקור',w:'90px',r:p=>p.visitDate?<span style={{fontSize:11}}>{p.visitDate}</span>:<span style={{color:'#ccc',fontSize:11}}>—</span>},
            {h:'שעות',w:'80px',r:p=>p.visitHours?<span style={{fontSize:11}}>{p.visitHours}</span>:<span style={{color:'#ccc',fontSize:11}}>—</span>},
            {h:'מסמכים אחרי ביקור',w:'100px',r:p=><Chk v={p.postVisitDocs}/>},
            {h:'הערות ביקור',w:'2fr',r:p=>p.visitNotes?<span style={{fontSize:11,color:'#6b5e50',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{p.visitNotes}</span>:<span style={{color:'#ccc',fontSize:11}}>—</span>},
          ]},
        ];
        const grp=groups3[colGroup];
        const cols=grp.cols;
        const templateCols=cols.map(c=>c.w).join(' ');
        return(
          <div>
            <div style={{display:'flex',gap:6,marginBottom:10}}>
              {groups3.map((g,i)=>(
                <button key={i} onClick={()=>setColGroup(i)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${colGroup===i?GOLD:'#ddd0bb'}`,background:colGroup===i?'#fef9e8':'#fff',color:colGroup===i?GOLD3:'#6b5e50',cursor:'pointer',fontSize:12,fontWeight:colGroup===i?700:400}}>
                  {g.label}
                </button>
              ))}
              <span style={{marginRight:'auto',fontSize:12,color:'#9a8e84',alignSelf:'center'}}>{filtered.length} תיקים</span>
            </div>
            <div style={{background:'#fff',borderRadius:14,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1px solid #ede8e0',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:templateCols,gap:0,background:BLACK2,color:'#e8dfc9',fontSize:11,fontWeight:700,padding:'9px 14px',alignItems:'center'}}>
                {cols.map((c,i)=><span key={i}>{c.h}</span>)}
              </div>
              {filtered.length===0?(
                <div style={{padding:40,textAlign:'center',color:'#9a8e84'}}>לא נמצאו תיקים</div>
              ):filtered.map((p,idx)=>(
                <div key={p._row} onClick={()=>setPanelProject(p)}
                  style={{display:'grid',gridTemplateColumns:templateCols,gap:0,padding:'8px 14px',alignItems:'center',cursor:'pointer',background:idx%2===0?'#fff':'#fdf9f5',borderBottom:'1px solid #f0ebe3',transition:'background 0.1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}
                  onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?'#fff':'#fdf9f5'}>
                  {cols.map((c,i)=><div key={i} style={{overflow:'hidden'}}>{c.r(p)}</div>)}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {viewMode==='cards'&&Object.keys(groups).length===0?(
        <div style={{padding:60,textAlign:'center',color:'#9a8e84'}}>
          <div style={{fontSize:48,marginBottom:12}}>🔍</div><div>לא נמצאו תיקים</div>
        </div>
      ):viewMode==='cards'&&(
        Object.entries(groups).map(([status,items])=>{
          const m=STATUS_META[status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
          const isOpen=!collapsed[status];
          return(
            <div key={status} style={{marginBottom:18,boxShadow:'0 4px 14px rgba(0,0,0,0.13)',borderRadius:14}}>
              <div onClick={()=>toggle(status)} style={{background:m.bg,padding:'13px 18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:isOpen?`2px solid ${m.dot}88`:'none',borderRadius:isOpen?'14px 14px 0 0':14}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{width:12,height:12,borderRadius:'50%',background:m.dot,display:'inline-block',flexShrink:0,boxShadow:`0 0 5px ${m.dot}99`}}/>
                  <span style={{fontSize:15,fontWeight:800,color:m.fg}}>{status}</span>
                  <span style={{background:`${m.dot}33`,color:m.fg,border:`1px solid ${m.dot}66`,borderRadius:20,padding:'2px 10px',fontSize:13,fontWeight:700}}>{items.length}</span>
                </div>
                <span style={{fontSize:14,color:m.fg,opacity:0.55}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen&&(
                <div style={{background:'#faf8f4',padding:'14px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:12,borderRadius:'0 0 14px 14px'}}>

                </div>

    </div>

}

// ═══════════════ CLIENT VIEW ══════════════════════════════════════
function ClientView({projects,onUpdate,user,managed,onUpdateCase,settings}){
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [panelProject,setPanelProject]=useState(null);
  const [collapsed,setCollapsed]=useState({});

  const clientProjects=useMemo(()=>projects.filter(p=>CLIENT_STATUSES.includes(p.status)),[projects]);
  const filtered=useMemo(()=>{
    let arr=[...clientProjects];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(p=>[p.name,p.notes,p.missingDocs].some(v=>v.toLowerCase().includes(q)));
    if(statusFilter)arr=arr.filter(p=>p.status===statusFilter);
    return arr;
  },[clientProjects,search,statusFilter]);

  const groups=useMemo(()=>{
    const by={};
    CLIENT_STATUSES.forEach(s=>{const items=filtered.filter(p=>p.status===s);if(items.length)by[s]=items;});
    return by;
  },[filtered]);

  const handleSave=async(upd)=>{
    const prev=projects.find(p=>p._row===upd._row)||{};
    const finalNotes=withNoteDate(upd.notes);
    const finalUpd={...upd,notes:finalNotes};
    const row=buildProjectRow(finalUpd);
    await api.put(`'פרויקטים בביצוע'!A${finalUpd._row}:${colLetter(row.length)}${finalUpd._row}`,[row]);
    onUpdate(finalUpd._row,{...finalUpd,_raw:row});
    sendTaskEmails(prev,finalUpd,user?.email).catch(()=>{});
    if(finalUpd.status!==prev.status&&managed)syncStatusToManaged(managed,finalUpd.name,finalUpd.status,onUpdateCase).catch(()=>{});
    if(managed)sendMissingDocsEmailFn(finalUpd,prev,managed).catch(()=>{});
  };

  const counts=useMemo(()=>{const c={};clientProjects.forEach(p=>{c[p.status]=(c[p.status]||0)+1;});return c;},[clientProjects]);
  const inp={padding:'9px 14px',borderRadius:10,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none'};

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease',maxWidth:1600}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:GOLD3}}>ממתין ללקוח</h2>
          <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{filtered.length} תיקים ממתינים לפעולה חיצונית</div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {CLIENT_STATUSES.filter(s=>counts[s]).map(s=>{
            const m=STATUS_META[s]||{};
            return<button key={s} onClick={()=>setStatusFilter(statusFilter===s?'':s)}
              style={{padding:'5px 11px',borderRadius:14,border:`1.5px solid ${statusFilter===s?m.dot||'#ccc':'#ddd0bb'}`,background:statusFilter===s?m.bg||'#f0ebe3':'#fff',cursor:'pointer',fontSize:12,fontWeight:600,color:statusFilter===s?m.fg||'#3a3228':'#6b5e50'}}>
              {s} ({counts[s]})
            </button>;
          })}
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:22}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש..." style={{...inp,flex:1}}/>
        {search&&<button onClick={()=>setSearch('')} style={{...inp,background:'#ede8e0',color:'#4b3400',border:'1px solid #ddd0bb',cursor:'pointer'}}>נקה ×</button>}
      </div>

      {Object.keys(groups).length===0?(
        <div style={{padding:60,textAlign:'center',color:'#9a8e84'}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div><div>אין תיקים ממתינים ללקוח</div>
        </div>
      ):(
        Object.entries(groups).map(([status,items])=>{
          const m=STATUS_META[status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
          const isOpen=!collapsed[status];
          return(
            <div key={status} style={{marginBottom:18,boxShadow:'0 4px 14px rgba(0,0,0,0.13)',borderRadius:14}}>
              <div onClick={()=>setCollapsed(c=>({...c,[status]:!c[status]}))} style={{background:m.bg,padding:'13px 18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:isOpen?`2px solid ${m.dot}88`:'none',borderRadius:isOpen?'14px 14px 0 0':14}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{width:12,height:12,borderRadius:'50%',background:m.dot,display:'inline-block',flexShrink:0,boxShadow:`0 0 5px ${m.dot}99`}}/>
                  <span style={{fontSize:15,fontWeight:800,color:m.fg}}>{status}</span>
                  <span style={{background:`${m.dot}33`,color:m.fg,border:`1px solid ${m.dot}66`,borderRadius:20,padding:'2px 10px',fontSize:13,fontWeight:700}}>{items.length}</span>
                </div>
                <span style={{fontSize:14,color:m.fg,opacity:0.55}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen&&<div style={{background:'#faf8f4',padding:'14px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:12,borderRadius:'0 0 14px 14px'}}>
                {items.map(p=><ProjectCard key={p._row} project={p} onClick={()=>setPanelProject(p)} hideDate/>)}
              </div>}
            </div>
          );
        })
      )}
      {panelProject&&<ProjectDetailPanel project={panelProject} onClose={()=>setPanelProject(null)} onSave={handleSave} mode={settings?.expandMode||'side'}/>}
    </div>
  );
}

const MANAGED_STATUSES=['הסתיים','בביצוע','ממתין','בוטל'];
const PURPOSE_OPTIONS=['שומה אחרת להיטל השבחה','תשלומי איזון','בטוחה - רכישה','בית משפט - הערכת שווי','בדיקת התאמה להיתר','בטוחה - הערכת נכס בשיפוץ','אישור שמאי - העדר פגיעה בשכנים','בטוחה - הערכת נכס קיים','תקן 19 - טרום רכישה','בטוחה - נכס להרחבה ושיפוץ','טבלת הקצאות - תב"ע','דמי שכירות ראויים - מקוצרת','שומה להפחתת מס שבח','דמי שכירות ראויים','ניקוד דירות','דיון בית דין','שמאות פנימית'];
const PROP_TYPE_OPTIONS=['קרקע לבניה','דירת מגורים','צמוד קרקע','צמוד קרקע - דו משפחתי','קרקע חקלאית','מחסן','בניין מגורים','דירות מגורים וחניות'];

function ManagedPanel({cas,onClose,onSave,allCases}){
  const [form,setForm]=useState({...cas});
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleAdvisorChange=(v)=>{
    const updated={advisor:v};
    if(v&&allCases){
      const match=allCases.find(c=>c._row!==cas._row&&c.advisor&&c.advisor.trim()===v.trim()&&(c.advisorPhone||c.advisorEmail));
      if(match){
        if(match.advisorPhone)updated.advisorPhone=match.advisorPhone;
        if(match.advisorEmail)updated.advisorEmail=match.advisorEmail;
      }
    }
    setForm(f=>({...f,...updated}));
  };

  const handleSave=async()=>{
    setSaving(true);setErr('');setSaved(false);
    try{
      const row=[...form._raw];
      while(row.length<=23)row.push('');
      // all cols except folder (5) are editable
      [[M.openDate,'openDate'],[M.closeDate,'closeDate'],[M.fee,'fee'],
       [M.caseNum,'caseNum'],[M.status,'status'],
       [M.client,'client'],[M.phone,'phone'],[M.email,'email'],
       [M.advisor,'advisor'],[M.advisorPhone,'advisorPhone'],[M.advisorEmail,'advisorEmail'],
       [M.purpose,'purpose'],[M.propType,'propType'],[M.rights,'rights'],
       [M.city,'city'],[M.street,'street'],[M.houseNum,'houseNum'],[M.aptNum,'aptNum'],
       [M.block,'block'],[M.parcel,'parcel'],[M.subParcel,'subParcel'],[M.bank,'bank'],[M.michael,'michael'],
      ].forEach(([i,k])=>row[i]=form[k]||'');
      await onSave(form._row,row);
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    }catch(e){setErr(e.message);}
    finally{setSaving(false);}
  };

  const inp=(k,multi=false)=>{
    const s={width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'};
    return multi?<textarea value={form[k]||''} onChange={e=>set(k,e.target.value)} rows={2} style={{...s,resize:'vertical'}}/>
      :<input value={form[k]||''} onChange={e=>set(k,e.target.value)} style={s}/>;
  };

  const selStyle={width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'};

  return(
    <div style={{position:'fixed',inset:0,zIndex:600,display:'flex'}}>

        <div style={{background:BLACK,padding:'20px 24px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:GOLD,fontWeight:700,letterSpacing:'1px',marginBottom:3}}>תיק #{cas.caseNum}</div>
              <div style={{fontSize:14,fontWeight:700,color:'#fff',lineHeight:1.5,maxWidth:440}}>{cas.folder}</div>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,width:32,height:32,color:'rgba(255,255,255,0.8)',cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
          </div>
        </div>
        <div style={{background:'#fff',padding:'10px 24px',borderBottom:'1px solid #e0d8cc',position:'sticky',top:0,zIndex:10,flexShrink:0,display:'flex',gap:8}}>
          <button onClick={handleSave} disabled={saving} style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:saved?'#16a34a':BLACK,color:saved?'#fff':GOLD,fontWeight:700,cursor:saving?'not-allowed':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            {saving?<><Spinner size={14} color={GOLD}/>שומר...</>:saved?'✓ נשמר!':'💾 שמור'}
          </button>
          <button onClick={()=>setForm({...cas})} style={{padding:'9px 14px',borderRadius:9,border:'1px solid #ddd0bb',background:'#fff',cursor:'pointer',fontSize:13,color:'#6b5e50'}}>שחזר</button>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 24px',fontSize:14}}>{err}</div>}

        <div style={{padding:'16px 24px',flex:1}}>
          {/* פרטי תיק */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
            <SectionTitle icon="📦">פרטי תיק</SectionTitle>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>

                </select>

              <div><FLabel>מיכאל</FLabel>{inp('michael')}</div>

            <div style={{padding:'8px 11px',borderRadius:8,background:'#f0ebe3',fontSize:13,color:'#6b5e50',border:'1px solid #e0d8cc'}}>{cas.folder||'—'}</div>
          </div>

          {/* לקוח */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
            <SectionTitle icon="👤">לקוח</SectionTitle>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div style={{gridColumn:'1/-1'}}><FLabel>שם לקוח</FLabel>{inp('client')}</div>
              <div><FLabel>טלפון</FLabel>{inp('phone')}</div>

              <div><FLabel>מייל</FLabel>{inp('advisorEmail')}</div>
            </div>
          </div>

          {/* נכס */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
            <SectionTitle icon="🏠">פרטי הנכס</SectionTitle>

              <div><FLabel>עיר / ישוב</FLabel>{inp('city')}</div>
              <div><FLabel>בנק</FLabel>{inp('bank')}</div>
              <div><FLabel>רחוב</FLabel>{inp('street')}</div>
              <div><FLabel>מספר בית</FLabel>{inp('houseNum')}</div>
              <div><FLabel>מספר דירה</FLabel>{inp('aptNum')}</div>
              <div>
                <FLabel>מטרת העבודה</FLabel>
                <select value={form.purpose||''} onChange={e=>set('purpose',e.target.value)} style={selStyle}>

  const [selected,setSelected]=useState(null);
  const [adding,setAdding]=useState(false);
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');
  const PAGE=500;

  const setF=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const opts=(key)=>[...new Set(cases.map(c=>c[key]).filter(Boolean))].sort();

  const toggleSort=(k)=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const filtered=useMemo(()=>{
    let arr=[...cases];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.street,c.folder,c.bank,c.purpose,c.advisor,c.propType].some(v=>String(v||'').toLowerCase().includes(q)));
    if(filters.status)arr=arr.filter(c=>c.status===filters.status);
    if(filters.bank)arr=arr.filter(c=>c.bank===filters.bank);
    if(filters.city)arr=arr.filter(c=>c.city===filters.city);
    if(filters.purpose)arr=arr.filter(c=>c.purpose===filters.purpose);
    if(filters.propType)arr=arr.filter(c=>c.propType===filters.propType);
    if(filters.advisor)arr=arr.filter(c=>c.advisor===filters.advisor);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'', vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      const cmp=String(va).localeCompare(String(vb),'he');
      return sortDir==='asc'?cmp:-cmp;
    });
    return arr;
  },[cases,search,filters,sortKey,sortDir]);

  const anyFilter=search||Object.values(filters).some(Boolean);
  useEffect(()=>setPage(0),[search,filters]);
  const paged=filtered.slice(page*PAGE,(page+1)*PAGE);
  const total=Math.ceil(filtered.length/PAGE);

  const STATUS_C={'הסתיים':{bg:'#dcfce7',fg:'#166534'},'בביצוע':{bg:'#fdf8ee',fg:'#4b3400'},'ממתין':{bg:'#ffedd5',fg:'#9a3412'},'בוטל':{bg:'#fee2e2',fg:'#991b1b'}};
  const inp={padding:'8px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,background:'#fff',outline:'none'};
  const sel=(k,ph)=>(
    <select value={filters[k]} onChange={e=>setF(k,e.target.value)} style={inp}>
      <option value="">{ph}</option>
      {opts(k).map(v=><option key={v} value={v}>{v}</option>)}
    </select>
  );

  const cols=[
    {k:'caseNum',l:'#תיק',w:80},{k:'folder',l:'תיקייה',w:240},{k:'client',l:'לקוח',w:140},
    {k:'city',l:'עיר',w:90},{k:'street',l:'רחוב',w:100},{k:'houseNum',l:'מס\'',w:50},{k:'aptNum',l:'דירה',w:50},
    {k:'purpose',l:'מטרה',w:150},{k:'propType',l:'סוג נכס',w:100},{k:'rights',l:'זכויות',w:90},
    {k:'bank',l:'בנק',w:100},{k:'advisor',l:'יועץ',w:120},
    {k:'openDate',l:'פתיחה',w:85},{k:'closeDate',l:'סגירה',w:85},{k:'fee',l:'שכר טרחה',w:90},
    {k:'status',l:'סטטוס',w:80},
    {k:'phone',l:'טלפון',w:110},{k:'email',l:'מייל',w:140},
  ];

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease'}}>
      {adding&&<AddCaseModal onClose={()=>setAdding(false)} onAdd={async(form)=>{
        // append new row to sheet
        const row=new Array(24).fill('');
        row[M.caseNum]=form.caseNum;row[M.client]=form.client;row[M.openDate]=form.openDate;
        row[M.status]=form.status;row[M.city]=form.city;row[M.street]=form.street;
        row[M.houseNum]=form.houseNum;row[M.aptNum]=form.aptNum;row[M.purpose]=form.purpose;
        row[M.propType]=form.propType;row[M.bank]=form.bank;row[M.advisor]=form.advisor;
        row[M.phone]=form.phone;row[M.email]=form.email;row[M.fee]=form.fee;row[M.rights]=form.rights;
        await api.put(`'ניהול תיקים'!A${cases.length+2}:${colLetter(24)}${cases.length+2}`,[row]);
        onAddCase({...form,_row:cases.length+2,_raw:row,folder:'',closeDate:'',advisorPhone:'',advisorEmail:'',block:'',parcel:'',subParcel:'',michael:''});
        setAdding(false);
      }}/>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:GOLD3}}>כלל התיקים</h2>
          <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{filtered.length} מתוך {cases.length} תיקים</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {MANAGED_STATUSES.map(s=>{const sc=STATUS_C[s]||{};return(
            <span key={s} onClick={()=>setF('status',filters.status===s?'':s)} style={{...sc,padding:'5px 12px',borderRadius:14,fontSize:12,fontWeight:700,cursor:'pointer',border:`1.5px solid ${filters.status===s?'currentcolor':'transparent'}`}}>
              {s} ({cases.filter(c=>c.status===s).length})
            </span>
          );})}
          <button onClick={()=>setAdding(true)} style={{padding:'9px 18px',borderRadius:10,border:'none',background:BLACK,color:GOLD,fontWeight:700,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',gap:7,boxShadow:'0 2px 8px rgba(0,0,0,0.15)'}}>
            ➕ הוסף תיק
          </button>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש חופשי..."
          style={{...inp,flex:'1 1 200px'}}/>
        {sel('bank','בנק')}
        {sel('city','עיר')}
        {sel('purpose','מטרה')}
        {sel('propType','סוג נכס')}
        {sel('advisor','יועץ')}
        {anyFilter&&<button onClick={()=>{setSearch('');setFilters({status:'',bank:'',city:'',purpose:'',propType:'',advisor:''});}}
          style={{...inp,background:'#ede8e0',color:'#4b3400',border:'1px solid #ddd0bb',cursor:'pointer'}}>נקה הכל ×</button>}
      </div>

      <div style={{background:'#fff',borderRadius:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:BLACK,color:'#e8dfc9'}}>
                {cols.map(c=>(
                  <th key={c.k} onClick={()=>toggleSort(c.k)} style={{padding:'11px 12px',textAlign:'right',fontWeight:600,whiteSpace:'nowrap',fontSize:12,minWidth:c.w,cursor:'pointer',userSelect:'none',transition:'background 0.1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(201,164,78,0.15)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {c.l}
                    <span style={{marginRight:4,opacity:sortKey===c.k?1:0.3,fontSize:10}}>
                      {sortKey===c.k?(sortDir==='asc'?'▲':'▼'):'⇅'}
                    </span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {paged.map((c,i)=>{
                const sc=STATUS_C[c.status]||{bg:'#f0ebe3',fg:'#3a3228'};
                return(
                  <tr key={c._row} style={{borderBottom:'1px solid #ede8e0',background:i%2===0?'#fff':'#fdf9f5',cursor:'pointer',transition:'background 0.1s'}}
                    onClick={()=>setSelected(c)}
                    onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}
                    onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fdf9f5'}
                  >
                    <td style={{padding:'10px 12px',fontWeight:800,color:GOLD,whiteSpace:'nowrap'}}>{c.caseNum}</td>
                    <td style={{padding:'10px 12px',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}} title={c.folder}>{c.folder||c.client}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.client}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.city}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.street}</td>
                    <td style={{padding:'10px 12px'}}>{c.houseNum}</td>
                    <td style={{padding:'10px 12px'}}>{c.aptNum}</td>
                    <td style={{padding:'10px 12px',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#6b5e50'}} title={c.purpose}>{c.purpose}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50'}}>{c.propType}</td>
                    <td style={{padding:'10px 12px',color:'#6b5e50'}}>{c.rights}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.bank}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis'}}>{c.advisor}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.openDate}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.closeDate}</td>
                    <td style={{padding:'10px 12px',fontWeight:c.fee?700:400,color:c.fee?'#1a1510':'#9a8e84'}}>{c.fee?`₪${c.fee}`:''}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>
                      {c.status&&<span style={{...sc,padding:'3px 8px',borderRadius:12,fontSize:11,fontWeight:700}}>{c.status}</span>}
                    </td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>
                      {c.phone&&<a href={`tel:${c.phone}`} onClick={e=>e.stopPropagation()} style={{color:'#4b3400',textDecoration:'none'}}>{c.phone}</a>}
                    </td>
                    <td style={{padding:'10px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {c.email&&<a href={`mailto:${c.email}`} onClick={e=>e.stopPropagation()} style={{color:'#4b3400',textDecoration:'none',fontSize:12}}>{c.email}</a>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'#9a8e84'}}><div style={{fontSize:40,marginBottom:10}}>🗂️</div><div>לא נמצאו תיקים</div></div>}
        </div>
        {total>1&&<div style={{padding:'12px 20px',borderTop:'1px solid #ede8e0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,color:'#6b5e50'}}>עמוד {page+1} / {total} ({filtered.length} תיקים)</span>
          <div style={{display:'flex',gap:6}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'6px 14px',borderRadius:7,border:'1px solid #ddd0bb',background:'#fff',cursor:page===0?'not-allowed':'pointer',opacity:page===0?0.4:1,fontSize:13}}>הקודם</button>
            <button disabled={page>=total-1} onClick={()=>setPage(p=>p+1)} style={{padding:'6px 14px',borderRadius:7,border:'1px solid #ddd0bb',background:'#fff',cursor:page>=total-1?'not-allowed':'pointer',opacity:page>=total-1?0.4:1,fontSize:13}}>הבא</button>
          </div>
        </div>}
      </div>

      {selected&&<ManagedPanel cas={selected} allCases={cases} onClose={()=>setSelected(null)} onSave={async(rowNum,row)=>{
        await api.put(`'ניהול תיקים'!A${rowNum}:${colLetter(row.length)}${rowNum}`,[row]);
        onUpdateCase(rowNum,{...selected,...Object.fromEntries(Object.entries(M).map(([k,i])=>[k,String(row[i]||'').trim()]))});
        setSelected(null);
      }}/>}
    </div>
  );
}

    if(logoSrc===CONFIG.LOGO_URL&&CONFIG.LOGO_FALLBACK){setLogoSrc(CONFIG.LOGO_FALLBACK);}
    else{setLogoErr(true);}

  const nav=[
    {id:'home',icon:'🏠',label:'דף הבית'},

    {id:'reports',icon:'📊',label:'דוחות'},

  return(
    <div style={{width:230,background:BLACK,color:'#e8dfc9',display:'flex',flexDirection:'column',height:'100vh',position:'fixed',right:0,top:0,zIndex:200,borderLeft:`1px solid ${GOLD}22`}}>
      {/* Logo */}
      <div style={{padding:'14px 12px 12px',borderBottom:`1px solid ${GOLD}33`,display:'flex',flexDirection:'column',alignItems:'center'}}>
        {!logoErr?(
          <div style={{background:'#fff',borderRadius:10,padding:'8px 10px',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 2px 10px rgba(0,0,0,0.3)`}}>
            <img src={logoSrc} alt="לוגו" onError={handleLogoErr}
              style={{width:'100%',maxWidth:170,height:54,objectFit:'contain'}}/>
          </div>
        ):(
          <div style={{background:'#fff',borderRadius:10,padding:'10px 14px',width:'100%',textAlign:'right'}}>
            <div style={{fontSize:14,fontWeight:900,color:'#0d0d0d',letterSpacing:'-0.3px'}}>רובינשטיין רוזנטל</div>
            <div style={{fontSize:11,fontWeight:700,color:GOLD3}}>שמאות מקרקעין</div>
          </div>
        )}
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:'12px 10px',overflowY:'auto'}}>
        {nav.map(item=>{
          const active=view===item.id;
          return(
            <button key={item.id} onClick={()=>setView(item.id)} style={{
              display:'flex',alignItems:'center',gap:9,width:'100%',padding:'11px 14px',
              borderRadius:10,border:'none',cursor:'pointer',marginBottom:3,fontSize:14,
              background:active?`${GOLD}22`:'transparent',
              color:active?GOLD:'rgba(255,255,255,0.65)',fontWeight:active?700:400,
              borderRight:`3px solid ${active?GOLD:'transparent'}`,transition:'all 0.15s',textAlign:'right',
            }}
            onMouseEnter={e=>{if(!active){e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.color='rgba(255,255,255,0.9)';}}}
            onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.65)';}}}
            >
              <span style={{fontSize:17,flexShrink:0}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.count>0&&<span style={{background:active?GOLD:`${GOLD}44`,color:active?BLACK:'#fff',borderRadius:20,padding:'1px 8px',fontSize:12,fontWeight:700}}>{item.count}</span>}
              {loading&&active&&<Spinner size={13} color={GOLD}/>}
            </button>
          );
        })}
      </nav>

      {/* User */}
      <div style={{padding:14,borderTop:`1px solid ${GOLD}22`}}>
        {user&&<div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
          {user.picture?<img src={user.picture} style={{width:34,height:34,borderRadius:'50%',border:`1.5px solid ${GOLD}55`,flexShrink:0}} alt=""/>
            :<div style={{width:34,height:34,borderRadius:'50%',background:GOLD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:BLACK,flexShrink:0}}>{(user.name||'?')[0]}</div>}
          <div style={{overflow:'hidden'}}>
            <div style={{fontSize:13,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.name}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.email}</div>

          onMouseEnter={e=>{e.currentTarget.style.background=`${GOLD}18`;e.currentTarget.style.color=GOLD;}}
          onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=`${GOLD}77`;}}>
          התנתקות
        </button>
      </div>
    </div>
  );
}

// ═══════════════ LOGIN ════════════════════════════════════════════
function LoginScreen({onLogin}){
  const [busy,setBusy]=useState(false);
  const [logoSrc,setLogoSrc]=useState(CONFIG.LOGO_URL);
  const [logoErr,setLogoErr]=useState(false);
  const handleLogoErr=()=>{
    if(logoSrc===CONFIG.LOGO_URL&&CONFIG.LOGO_FALLBACK){setLogoSrc(CONFIG.LOGO_FALLBACK);}
    else{setLogoErr(true);}
  };
  const handle=()=>{
    setBusy(true);
    try{
      const c=google.accounts.oauth2.initTokenClient({
        client_id:CONFIG.CLIENT_ID,scope:CONFIG.SCOPES,
        callback:(r)=>{setBusy(false);if(r.access_token)onLogin(r.access_token);},
        error_callback:()=>setBusy(false),
      });
      c.requestAccessToken();
    }catch(e){setBusy(false);alert(e.message);}

  return(
    <div style={{minHeight:'100vh',background:`radial-gradient(ellipse at 55% 35%,#252010 0%,${BLACK} 65%)`,display:'flex',alignItems:'center',justifyContent:'center',padding:20,overflow:'hidden',position:'relative'}}>
      {[[320,-80,-100,'0.08'],[500,'58%',-180,'0.05'],[200,'8%','68%','0.07']].map(([s,l,t,o],i)=>(
        <div key={i} style={{position:'absolute',width:s,height:s,borderRadius:'50%',background:`radial-gradient(circle,${GOLD},transparent)`,opacity:o,left:l,top:t,pointerEvents:'none'}}/>
      ))}
      <div style={{background:'rgba(255,255,255,0.04)',backdropFilter:'blur(24px)',border:`1px solid ${GOLD}22`,borderRadius:28,padding:'50px 44px',maxWidth:420,width:'100%',textAlign:'center',boxShadow:`0 32px 80px rgba(0,0,0,0.5)`,animation:'fadeIn 0.6s ease'}}>
        <div style={{marginBottom:28,display:'flex',justifyContent:'center'}}>
          {!logoErr?(
            <div style={{background:'#fff',borderRadius:14,padding:'14px 20px',boxShadow:`0 4px 20px rgba(0,0,0,0.35), 0 0 0 1px ${GOLD}33`}}>
              <img src={logoSrc} alt="לוגו" onError={handleLogoErr}
