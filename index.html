function withNoteDate(notes){
  if(!notes)return notes;
  if(/\(\d{1,2}\/\d{1,2}\)/.test(notes))return notes;
  const d=new Date();
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  return notes.trim()+' ('+dd+'/'+mm+')';
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР API вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
const api={
  token:null,
  async get(range,id=CONFIG.SPREADSHEET_ID){
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,
      {headers:{Authorization:`Bearer ${this.token}`}});
    if(!r.ok)throw new Error((await r.json())?.error?.message||r.statusText);
    return(await r.json()).values||[];
  },
  async put(range,values,id=CONFIG.SPREADSHEET_ID){
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
      {method:'PUT',headers:{Authorization:`Bearer ${this.token}`,'Content-Type':'application/json'},
       body:JSON.stringify({range,majorDimension:'ROWS',values})});
    if(!r.ok)throw new Error((await r.json())?.error?.message||r.statusText);
    return r.json();
  },
  async sendEmail(to,subject,html,fromAddr=null,replyTo=null){
    const subjB64='=?UTF-8?B?'+btoa(unescape(encodeURIComponent(subject)))+'?=';
    let hdrs='To: '+to+'\r\nContent-Type: text/html; charset=UTF-8\r\nMIME-Version: 1.0\r\nSubject: '+subjB64;
    if(fromAddr)hdrs+='\r\nFrom: '+fromAddr;
    if(replyTo)hdrs+='\r\nReply-To: '+replyTo;
    const msg=hdrs+'\r\n\r\n'+html;
    const encoded=btoa(unescape(encodeURIComponent(msg))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',headers:{Authorization:`Bearer ${this.token}`,'Content-Type':'application/json'},
      body:JSON.stringify({raw:encoded})
    });
    if(!r.ok){const e=await r.json();throw new Error(e?.error?.message||r.statusText);}
  }
};

function colLetter(n){let s='';while(n>0){s=String.fromCharCode(64+((n-1)%26+1))+s;n=Math.floor((n-1)/26);}return s;}
function parseDate(v){
  if(!v)return null; if(v instanceof Date)return isNaN(v)?null:v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(v);return isNaN(d)?null:d;
}
function fmt(v){if(!v)return'';const d=v instanceof Date?v:parseDate(v);if(!d)return String(v);
  return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function g(row,i){return(i<row.length?String(row[i]||'').trim():'');}

function parseProject(row,ri){
  const status=g(row,P.status);
  CHECK_COLS.forEach(ci=>{const v=g(row,ci);if(v&&v.length<25&&!DATE_RE.test(v))dynamicCheckOpts.add(v);});
  return{_row:ri+2,_raw:[...row],
    name:g(row,P.name),yossi:g(row,P.yossi),michael:g(row,P.michael),feigi:g(row,P.feigi),
    notes:g(row,P.notes),dueDate:fmt(g(row,P.dueDate)),status,expected:fmt(g(row,P.expected)),
    advance:g(row,P.advance),docs:g(row,P.docs),missingDocs:g(row,P.missingDocs),
    buildingFile:g(row,P.buildingFile),transactions:g(row,P.transactions),
    visitSheet:g(row,P.visitSheet),visitDate:fmt(g(row,P.visitDate)),
    visitHours:g(row,P.visitHours),visitPhone:g(row,P.visitPhone),
    visitName:g(row,P.visitName),visitRole:g(row,P.visitRole),visitNotes:g(row,P.visitNotes),
    postVisitDocs:fmt(g(row,P.postVisitDocs))||g(row,P.postVisitDocs),
    postVisitComplete:fmt(g(row,P.postVisitComplete))||g(row,P.postVisitComplete),
    fee:g(row,P.fee),feeStatus:g(row,P.feeStatus),feeNotes:g(row,P.feeNotes),
    _expD:parseDate(g(row,P.expected)),_dueD:parseDate(g(row,P.dueDate)),_visitD:parseDate(g(row,P.visitDate)),
  };
}

function AutocompleteInput({value,onChange,options=[],style={},placeholder=''}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  const filtered=React.useMemo(()=>{
    if(!value||value.length<1)return[];
    const q=value.trim().toLowerCase();
    return options.filter(o=>o.toLowerCase().includes(q)).slice(0,12);
  },[value,options]);
  React.useEffect(()=>{
    const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);
  return(
    <div ref={ref} style={{position:'relative',width:'100%'}}>
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>{if(value&&value.length>=1)setOpen(true);}}
        placeholder={placeholder} style={{...style,width:'100%',boxSizing:'border-box'}}/>
      {open&&filtered.length>0&&(
        <div style={{position:'absolute',top:'100%',right:0,left:0,zIndex:999,background:'#fff',border:'1px solid #ddd0bb',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,0.12)',marginTop:3,maxHeight:220,overflowY:'auto'}}>
          {filtered.map(o=>(
            <div key={o} onMouseDown={e=>{e.preventDefault();onChange(o);setOpen(false);}}
              style={{padding:'9px 13px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f0ebe3',direction:'rtl'}}
              onMouseEnter={e=>e.currentTarget.style.background='#faf7f2'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              {o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  while(row.length<=24)row.push('');
  [['status',P.status],['yossi',P.yossi],['michael',P.michael],['feigi',P.feigi],
   ['notes',P.notes],['missingDocs',P.missingDocs],['dueDate',P.dueDate],['expected',P.expected],
   ['advance',P.advance],['docs',P.docs],['buildingFile',P.buildingFile],['transactions',P.transactions],
   ['visitSheet',P.visitSheet],['visitDate',P.visitDate],['visitHours',P.visitHours],
   ['visitPhone',P.visitPhone],['visitName',P.visitName],['visitRole',P.visitRole],
   ['visitNotes',P.visitNotes],['postVisitDocs',P.postVisitDocs],['postVisitComplete',P.postVisitComplete],
   ['fee',P.fee],['feeStatus',P.feeStatus],['feeNotes',P.feeNotes],
  ].forEach(([k,i])=>row[i]=upd[k]||'');

  useEffect(()=>()=>clearTimeout(debounceRef.current),[]);

  const set=(k,v)=>setForm(f=>{const n={...f,[k]:v};latestFormRef.current=n;return n;});

  const doSave=async()=>{
    if(savingRef.current)return;
    savingRef.current=true;
    setSaving(true);setErr('');
    try{
      await onSaveRef.current(latestFormRef.current);
      setFlashSaved(true);setTimeout(()=>setFlashSaved(false),1500);

function ProjectDetailPanel({project,onClose,onSave}){
  const [form,setForm]=useState({...project});

  const [saved,setSaved]=useState(false);
  const [err,setErr]=useState('');

  const debounceRef=useRef(null);

  const dirtyRef=useRef(false);
  const set=(k,v)=>{
    dirtyRef.current=true;
    setForm(f=>{const next={...f,[k]:v};formRef.current=next;return next;});
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>{autoSave();},800);
  };
  const autoSave=async()=>{
    if(savingRef.current)return;
    savingRef.current=true;setSaving(true);setErr('');dirtyRef.current=false;
    try{await onSave({...formRef.current});setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch(e){setErr(e.message);}
    finally{setSaving(false);savingRef.current=false;}

  const handleClose=async()=>{
    clearTimeout(debounceRef.current);
    if(dirtyRef.current)await autoSave();
    onClose();
  };

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР CLIENT VIEW вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function ClientView({projects,onUpdate,user,managed,onUpdateCase,settings}){
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [panelProject,setPanelProject]=useState(null);
  const [collapsed,setCollapsed]=useState({});
  const [viewMode,setViewMode]=useState('cards');

  const clientProjects=useMemo(()=>projects.filter(p=>CLIENT_STATUSES.includes(p.status)),[projects]);
  const filtered=useMemo(()=>{
    let arr=[...clientProjects];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(p=>[p.name,p.notes,p.missingDocs].some(v=>v.toLowerCase().includes(q)));
    if(statusFilter)arr=arr.filter(p=>p.status===statusFilter);
    return arr;
  },[clientProjects,search,statusFilter]);

  const groups=useMemo(()=>{
    const by={};
    CLIENT_STATUSES.forEach(s=>{const items=filtered.filter(p=>p.status===s);if(items.length)by[s]=items;});
    return by;
  },[filtered]);

  const handleSave=async(upd)=>{
    const prev=projects.find(p=>p._row===upd._row)||{};
    const finalNotes=withNoteDate(upd.notes);
    const finalUpd={...upd,notes:finalNotes};
    const row=buildProjectRow(finalUpd);
    await api.put(`'„§„®„Х„Щ„І„Ш„Щ„Э „С„С„Щ„¶„Х„Ґ'!A${finalUpd._row}:${colLetter(row.length)}${finalUpd._row}`,[row]);
    onUpdate(finalUpd._row,{...finalUpd,_raw:row});
    sendTaskEmails(prev,finalUpd,user?.email).catch(()=>{});
    if(finalUpd.status!==prev.status&&managed)syncStatusToManaged(managed,finalUpd.name,finalUpd.status,onUpdateCase).catch(()=>{});
    if(managed)sendMissingDocsEmailFn(finalUpd,prev,managed).catch(()=>{});
  };

  const counts=useMemo(()=>{const c={};clientProjects.forEach(p=>{c[p.status]=(c[p.status]||0)+1;});return c;},[clientProjects]);
  const inp={padding:'9px 14px',borderRadius:10,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none'};

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease',maxWidth:1600}}>

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР MANAGED CASES VIEW вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function ManagedView({cases,onUpdateCase,onAddCase}){
  const [search,setSearch]=useState('');

  const [page,setPage]=useState(0);

  const [adding,setAdding]=useState(false);
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');
  const PAGE=500;

  const setF=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const opts=(key)=>[...new Set(cases.map(c=>c[key]).filter(Boolean))].sort();

  const toggleSort=(k)=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const filtered=useMemo(()=>{
    let arr=[...cases];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.street,c.folder,c.bank,c.purpose,c.advisor,c.propType].some(v=>String(v||'').toLowerCase().includes(q)));
    if(filters.status)arr=arr.filter(c=>c.status===filters.status);
    if(filters.bank)arr=arr.filter(c=>c.bank===filters.bank);
    if(filters.city)arr=arr.filter(c=>c.city===filters.city);
    if(filters.purpose)arr=arr.filter(c=>c.purpose===filters.purpose);
    if(filters.propType)arr=arr.filter(c=>c.propType===filters.propType);
    if(filters.advisor)arr=arr.filter(c=>c.advisor===filters.advisor);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'', vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      const cmp=String(va).localeCompare(String(vb),'he');
      return sortDir==='asc'?cmp:-cmp;
    });
    return arr;

        onAddCase({...form,_row:cases.length+2,_raw:row,folder:'',closeDate:'',michael:''});

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР DASHBOARD VIEW вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

    .sort((a,b)=>(a._dueD||a._expD)-(b._dueD||b._expD));

    {name:'„Щ„Х„°„Щ',role:'„©„Ю„Р„Щ',count:activeProjs.filter(p=>p.yossi).length,color:'#1e40af'},

  ];

  const userName=USER_BY_EMAIL[(user?.email||'').toLowerCase()]||'';
  const hour=new Date().getHours();
  const greet=hour<12?'„С„Х„І„® „Ш„Х„С':hour<17?'„¶„Ф„®„Щ„Щ„Э „Ш„Х„С„Щ„Э':'„Ґ„®„С „Ш„Х„С';

  function KpiCard({icon,label,value,color,sub,onClick}){

      <div onClick={onClick} style={{background:'#fff',borderRadius:16,padding:'22px 24px',

        position:'relative',overflow:'hidden'}}
        onMouseEnter={e=>{if(onClick){e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)';e.currentTarget.style.transform='translateY(-3px)';}}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04)';e.currentTarget.style.transform='none';}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:color,opacity:0.7,borderRadius:'16px 16px 0 0'}}/>
        <div style={{fontSize:24,marginBottom:8,opacity:0.85}}>{icon}</div>
        <div style={{fontSize:36,fontWeight:500,color,lineHeight:1,letterSpacing:'-0.02em'}}>{value}</div>
        <div style={{fontSize:13,color:'#5a4e44',marginTop:7,fontWeight:500}}>{label}</div>
        {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:4,fontWeight:400}}>{sub}</div>}
      </div>
    );
  }

  function UrgentRow({p,isOverdue}){
    const d=p._dueD||p._expD;
    const dStr=p.dueDate||p.expected||'';
    const daysLeft=d?Math.round((d-today)/86400000):null;
    const person=p.yossi?'„Щ„Х„°„Щ':p.michael?'„Ю„Щ„Ы„Р„Ь':p.feigi?'„§„Щ„Щ„Т„Щ':'';
    const m=STATUS_META[p.status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
    return(
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderBottom:'1px solid #f5f3ef',fontSize:13,flexWrap:'wrap'}}>
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,whiteSpace:'nowrap',
          background:isOverdue?'#fef2f2':'#fff7ed',color:isOverdue?'#dc2626':'#d97706',
          border:`1px solid ${isOverdue?'#fca5a5':'#fcd34d'}`}}>
          {isOverdue?`вЪ†пЄП ${Math.abs(daysLeft)} „Щ„Ю„Щ„Э`:daysLeft===0?'рЯФі „Ф„Щ„Х„Э':`рЯУЕ ${daysLeft} „Щ„Ю„Щ„Э`}
        </span>
        <span style={{flex:1,fontWeight:600,color:'#1a1510',minWidth:120}}>{p.name}</span>
        <span style={{color:'#9a8e84',fontSize:12}}>{dStr}</span>
        {person&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:'#fef3c7',color:'#4b3400',border:'1px solid #d9af34'}}>{person}</span>}
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:m.bg,color:m.fg,border:`1px solid ${m.dot}44`}}>{p.status}</span>
      </div>
    );
  }

  const sec={background:'#fff',borderRadius:16,padding:'22px 24px',marginBottom:16,boxShadow:'0 2px 10px rgba(0,0,0,0.06)',border:'1px solid #e8e0d4'};
  const secTitle=(icon,t,count)=>(
    <div style={{fontSize:14,fontWeight:500,color:'#3a2a00',marginBottom:16,display:'flex',alignItems:'center',gap:8,letterSpacing:'0.01em'}}>
      <span style={{fontSize:16,opacity:0.8}}>{icon}</span>{t}
      {count!==undefined&&<span style={{background:`${GOLD}1a`,color:GOLD3,borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:500,border:`1px solid ${GOLD}33`}}>{count}</span>}
    </div>
  );

  return(
    <div style={{padding:'28px 32px',maxWidth:1400,animation:'fadeIn 0.3s ease'}}>
      <div style={{marginBottom:26}}>
        <h2 style={{fontSize:27,fontWeight:500,color:'#1a1510',letterSpacing:'-0.02em'}}>{greet}{userName?` ${userName}`:''} рЯСЛ</h2>
        <div style={{fontSize:13,color:'#9a8e84',marginTop:4,fontWeight:400}}>
          {new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </div>
      </div>

      <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
        <KpiCard icon="рЯУБ" label="„§„®„Х„Щ„І„Ш„Щ„Э „§„Ґ„Щ„Ь„Щ„Э" value={activeProjs.length} color={GOLD3}
          sub={overdueProjs.length>0?`${overdueProjs.length} „С„Р„Щ„Ч„Х„®`:'„Ф„Ы„Ь „С„Ц„Ю„Я вЬУ'} onClick={()=>onSetView('projects')}/>
        <KpiCard icon="вП≥" label="„Ю„Ю„™„Щ„Я „Ь„Ь„І„Х„Ч" value={clientProjs.length} color="#7c3aed" onClick={()=>onSetView('client')}/>
        <KpiCard icon="вЪ°" label="„У„У-„Ь„Щ„Щ„Я „Ф„©„С„Х„Ґ" value={thisWeek.length} color="#c2410c"
          sub={urgentProjs.length>thisWeek.length?`${urgentProjs.length} „С-14 „Щ„Х„Э`:''} onClick={()=>onSetView('projects')}/>
        <KpiCard icon="рЯЧВпЄП" label="„Ы„Ь„Ь „Ф„™„Щ„І„Щ„Э" value={managed.length} color="#1e40af"
          onClick={()=>onSetView('managed')}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={sec}>
          {secTitle('рЯФі','„С„Р„Щ„Ч„Х„®',overdueProjs.length)}
          {overdueProjs.length===0?(
            <div style={{textAlign:'center',color:'#9a8e84',padding:'24px 0',fontSize:13}}>„Р„Щ„Я „™„Щ„І„Щ„Э „С„Р„Щ„Ч„Х„® рЯОЙ</div>
          ):(
            <div style={{borderRadius:10,overflow:'hidden',border:'1px solid #fee2e2'}}>
              {overdueProjs.slice(0,8).map(p=><UrgentRow key={p._row} p={p} isOverdue={true}/>)}
              {overdueProjs.length>8&&<div style={{padding:'8px 14px',fontSize:12,color:'#9a8e84',textAlign:'center'}}>„Х„Ґ„Х„У {overdueProjs.length-8}...</div>}
            </div>
          )}
        </div>
        <div style={sec}>
          {secTitle('рЯУЕ','„У„У-„Ь„Щ„Щ„Я вАФ 14 „Щ„Х„Э „І„®„Х„С„Щ„Э',urgentProjs.length)}
          {urgentProjs.length===0?(
            <div style={{textAlign:'center',color:'#9a8e84',padding:'24px 0',fontSize:13}}>„Р„Щ„Я „™„Р„®„Щ„Ы„Щ „Щ„Ґ„У „І„®„Х„С„Щ„Э</div>
          ):(
            <div style={{borderRadius:10,overflow:'hidden',border:'1px solid #fed7aa'}}>
              {urgentProjs.slice(0,8).map(p=><UrgentRow key={p._row} p={p} isOverdue={false}/>)}
              {urgentProjs.length>8&&<div style={{padding:'8px 14px',fontSize:12,color:'#9a8e84',textAlign:'center'}}>„Х„Ґ„Х„У {urgentProjs.length-8}...</div>}
            </div>
          )}
        </div>
      </div>

      <div style={sec}>
        {secTitle('рЯС•','„С„Щ„¶„Х„Ґ„Щ „Ф„¶„Х„Х„™')}
        <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
          {teamStats.map(({name,role,count,color})=>(
            <div key={name} style={{flex:1,minWidth:120,background:`linear-gradient(135deg,${color}08 0%,${color}03 100%)`,borderRadius:12,padding:'18px',textAlign:'center',border:`1px solid ${color}22`,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,right:0,left:0,height:3,background:color,opacity:0.7,borderRadius:'12px 12px 0 0'}}/>
              <div style={{fontSize:36,fontWeight:500,color,lineHeight:1,letterSpacing:'-0.02em'}}>{count}</div>
              <div style={{fontSize:14,fontWeight:500,color:'#1a1510',marginTop:7}}>{name}</div>
              <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>„™„Щ„І„Щ„Э „§„Ґ„Щ„Ь„Щ„Э</div>
            </div>
          ))}
          <div style={{flex:1,minWidth:120,background:'#faf8f4',borderRadius:12,padding:'18px',textAlign:'center',border:'1px solid #ede8e0'}}>
            <div style={{fontSize:32,fontWeight:500,color:'#6b5e50'}}>{activeProjs.length}</div>
            <div style={{fontSize:14,fontWeight:500,color:'#4b3400',marginTop:6}}>„°„Ф"„Ы</div>
            <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>„С„С„Щ„¶„Х„Ґ</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР REPORTS VIEW вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function ReportsView({managed,projects}){
  const [tab,setTab]=useState('summary');
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');

  const parseNum=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};

  // Financial stats
  const withFee=managed.filter(c=>parseNum(c.fee)>0);
  const totalFee=withFee.reduce((s,c)=>s+parseNum(c.fee),0);
  const completedCases=managed.filter(c=>c.status==='„Ф„°„™„Щ„Щ„Э');
  const completedFee=completedCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const activeCases=managed.filter(c=>c.status==='„С„С„Щ„¶„Х„Ґ');
  const activeFee=activeCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const pendingCases=managed.filter(c=>c.status==='„Ю„Ю„™„Щ„Я');
  const pendingFee=pendingCases.reduce((s,c)=>s+parseNum(c.fee),0);

  // Monthly (last 12 months)
  const monthKey=s=>{if(!s)return null;const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}`:null;};
  const now=new Date();
  const months=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);
    return{key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleDateString('he-IL',{month:'short',year:'2-digit'})};
  });
  const monthlyData=months.map(m=>({...m,count:managed.filter(c=>monthKey(c.openDate)===m.key).length,fee:managed.filter(c=>monthKey(c.openDate)===m.key).reduce((s,c)=>s+parseNum(c.fee),0)}));
  const maxMonthCount=Math.max(...monthlyData.map(m=>m.count),1);

  // Group helpers
  const groupBy=(arr,key)=>{
    const map={};
    arr.forEach(c=>{const k=c[key]||'вАФ';if(!map[k])map[k]={count:0,fee:0};map[k].count++;map[k].fee+=parseNum(c.fee);});
    return Object.entries(map).sort((a,b)=>b[1].count-a[1].count);
  };
  const bankStats=groupBy(managed,'bank').slice(0,10);
  const cityStats=groupBy(managed,'city').slice(0,10);
  const purposeStats=groupBy(managed,'purpose').slice(0,8);
  const maxBar=Math.max(...[...bankStats,...cityStats].map(([,v])=>v.count),1);

  // Filtered table
  const filtered=useMemo(()=>{
    let arr=[...managed];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.bank,c.folder,c.purpose].some(v=>String(v||'').toLowerCase().includes(q)));
    if(statusFilter)arr=arr.filter(c=>c.status===statusFilter);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'',vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      return sortDir==='asc'?String(va).localeCompare(String(vb),'he'):String(vb).localeCompare(String(va),'he');
    });
    return arr;
  },[managed,search,statusFilter,sortKey,sortDir]);
  const toggleSort=k=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const STATUS_C={'„Ф„°„™„Щ„Щ„Э':{bg:'#dcfce7',fg:'#166534',bar:'#22c55e'},'„С„С„Щ„¶„Х„Ґ':{bg:'#fdf8ee',fg:'#4b3400',bar:GOLD},'„Ю„Ю„™„Щ„Я':{bg:'#ffedd5',fg:'#9a3412',bar:'#f97316'},'„С„Х„Ш„Ь':{bg:'#fee2e2',fg:'#991b1b',bar:'#ef4444'}};
  const tabBtns=[{id:'summary',label:'рЯУК „°„Щ„Ы„Х„Э'},{id:'cases',label:'рЯУЛ „У„Х„Ч „™„Щ„І„Щ„Э'},{id:'stats',label:'рЯУИ „†„Щ„™„Х„Ч'}];
  const inp={padding:'8px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,background:'#fff',outline:'none'};
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',border:'1px solid #ede8e0',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:16};
  const KpiCard=({icon,label,value,sub,color})=>(
    <div style={{background:'#fff',borderRadius:14,padding:'20px 22px',flex:1,minWidth:155,border:'1px solid #ede8e0',boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:26,fontWeight:500,color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:12,color:'#6b5e50',marginTop:6,fontWeight:600}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:3}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease',maxWidth:1400}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:500,color:GOLD3}}>рЯУК „У„Х„Ч„Х„™</h2>
        <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{managed.length} „™„Щ„І„Щ„Э „С„Ю„°„У „Ф„†„™„Х„†„Щ„Э</div>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,marginBottom:24,background:'#fff',borderRadius:12,padding:4,border:'1px solid #ede8e0',width:'fit-content'}}>
        {tabBtns.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 18px',borderRadius:9,border:'none',background:tab===t.id?BLACK:'transparent',color:tab===t.id?GOLD:'#6b5e50',fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:13,transition:'all 0.15s'}}>{t.label}</button>
        ))}
      </div>

      {/* вФАвФА SUMMARY вФАвФА */}
      {tab==='summary'&&<div>
        <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
          <KpiCard icon="рЯЧВпЄП" label="„°„Ф„і„Ы „™„Щ„І„Щ„Э" value={managed.length} color={GOLD3}/>
          <KpiCard icon="вЬЕ" label="„Ф„°„™„Щ„Щ„Э" value={completedCases.length} sub={`${managed.length>0?Math.round(completedCases.length/managed.length*100):0}%`} color="#059669"/>
          <KpiCard icon="рЯФД" label="„С„С„Щ„¶„Х„Ґ" value={activeCases.length} sub={`${managed.length>0?Math.round(activeCases.length/managed.length*100):0}%`} color="#2563eb"/>
          <KpiCard icon="вП≥" label="„Ю„Ю„™„Щ„Я" value={pendingCases.length} sub={`${managed.length>0?Math.round(pendingCases.length/managed.length*100):0}%`} color="#d97706"/>
        </div>

        {/* Monthly bar chart */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>рЯУЕ „§„™„Щ„Ч„™ „™„Щ„І„Щ„Э вАФ 12 „Ч„Х„У„©„Щ„Э „Р„Ч„®„Х„†„Щ„Э</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:110}}>
            {monthlyData.map(m=>(
              <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                {m.count>0&&<div style={{fontSize:10,color:'#9a8e84',fontWeight:500}}>{m.count}</div>}
                <div style={{width:'100%',background:m.count>0?GOLD:'#e8e3da',borderRadius:'4px 4px 0 0',height:`${Math.max(3,m.count/maxMonthCount*85)}px`,transition:'height 0.4s'}}/>
                <div style={{fontSize:9,color:'#9a8e84',textAlign:'center',lineHeight:1.2,whiteSpace:'nowrap'}}>{m.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Status breakdown */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>рЯС• „С„Щ„¶„Х„Ґ„Щ „¶„Х„Х„™ вАФ „§„®„Х„Щ„І„Ш„Щ„Э „§„Ґ„Щ„Ь„Щ„Э</div>
          {(()=>{
            const teamData=[
              {name:'„Щ„Х„°„Щ',color:'#2563eb',icon:'рЯС§'},
              {name:'„Ю„Щ„Ы„Р„Ь',color:'#7c3aed',icon:'рЯС§'},
              {name:'„§„Щ„Щ„Т„Щ',color:'#059669',icon:'рЯС§'},
            ].map(t=>{
              const teamCases=managed.filter(c=>c.michael===t.name||c.folder?.includes(t.name));
              const done=managed.filter(c=>c.status==='„Ф„°„™„Щ„Щ„Э'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              const active=managed.filter(c=>c.status==='„С„С„Щ„¶„Х„Ґ'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              return{...t,total:teamCases.length,done,active,pct:teamCases.length>0?Math.round(done/teamCases.length*100):0};
            });
            const maxTotal=Math.max(...teamData.map(t=>t.total),1);
            // Also: monthly open rate (last 6 months)
            const recentMonths=monthlyData.slice(-6);
            const avgPerMonth=recentMonths.length?Math.round(recentMonths.reduce((s,m)=>s+m.count,0)/recentMonths.length):0;
            const thisMonth=recentMonths[recentMonths.length-1]?.count||0;
            const trend=thisMonth>avgPerMonth?'вЖС':'вЖУ';
            const trendColor=thisMonth>=avgPerMonth?'#059669':'#d97706';
            return(
              <div>
                {teamData.map(t=>(
                  <div key={t.name} style={{marginBottom:16}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13,alignItems:'center'}}>
                      <span style={{fontWeight:500,color:t.color}}>{t.name}</span>
                      <div style={{display:'flex',gap:14,fontSize:12}}>
                        <span style={{background:'#f0ebe3',borderRadius:10,padding:'2px 8px',color:'#6b5e50'}}>{t.total} „™„Щ„І„Щ„Э</span>
                        <span style={{background:'#dcfce7',borderRadius:10,padding:'2px 8px',color:'#166534'}}>вЬУ {t.done} „Ф„°„™„Щ„Щ„Э</span>
                        <span style={{background:'#fdf8ee',borderRadius:10,padding:'2px 8px',color:GOLD3}}>рЯФД {t.active} „§„Ґ„Щ„Ь</span>
                        <span style={{fontWeight:500,color:t.color}}>{t.pct}%</span>
                      </div>
                    </div>
                    <div style={{height:10,background:'#f0ebe3',borderRadius:5,overflow:'hidden',position:'relative'}}>
                      <div style={{height:'100%',width:`${t.total/maxTotal*100}%`,background:`${t.color}33`,borderRadius:5,position:'absolute'}}/>
                      <div style={{height:'100%',width:`${t.done/maxTotal*100}%`,background:t.color,borderRadius:5,position:'absolute',transition:'width 0.6s'}}/>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:20,padding:'14px 16px',background:'#faf8f4',borderRadius:10,border:'1px solid #ede8e0',display:'flex',gap:24,alignItems:'center'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:500,color:trendColor}}>{trend} {thisMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>„™„Щ„І„Щ„Э „Ф„Ч„Х„У„©</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:500,color:GOLD3}}>{avgPerMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>„Ю„Ю„Х„¶„Ґ 6 „Ч„Х„У„©„Щ„Э</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:3,alignItems:'flex-end',height:32}}>
                      {recentMonths.map(m=>(
                        <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                          <div style={{width:'100%',background:m.count>=avgPerMonth?GOLD:'#e0d8cc',borderRadius:'3px 3px 0 0',height:`${Math.max(3,m.count/Math.max(...recentMonths.map(x=>x.count),1)*26)}px`}}/>
                          <div style={{fontSize:8,color:'#9a8e84'}}>{m.label.split(' ')[0]}</div>

                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>}

      {/* вФАвФА CASES TABLE вФАвФА */}
      {tab==='cases'&&<div>
        <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="рЯФН „Ч„Щ„§„Х„©..." style={{...inp,flex:1,minWidth:220}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={inp}>
            <option value="">„Ы„Ь „Ф„°„Ш„Ш„Х„°„Щ„Э</option>
            {['„Ф„°„™„Щ„Щ„Э','„С„С„Щ„¶„Х„Ґ','„Ю„Ю„™„Щ„Я','„С„Х„Ш„Ь'].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(search||statusFilter)&&<button onClick={()=>{setSearch('');setStatusFilter('');}} style={{...inp,background:'#ede8e0',color:'#4b3400',cursor:'pointer'}}>„†„І„Ф √Ч</button>}
          <div style={{marginRight:'auto',display:'flex',gap:16,fontSize:13,fontWeight:500}}>
            <span style={{color:'#6b5e50'}}>{filtered.length} „™„Щ„І„Щ„Э</span>

          </div>
        </div>
        <div style={{background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:BLACK,color:'#e8dfc9'}}>
                  {[{k:'caseNum',l:'#„™„Щ„І'},{k:'folder',l:'„™„Щ„І„Щ„Щ„Ф/„Ь„І„Х„Ч'},{k:'city',l:'„Ґ„Щ„®'},{k:'bank',l:'„С„†„І'},{k:'purpose',l:'„Ю„Ш„®„Ф'},{k:'openDate',l:'„§„™„Щ„Ч„Ф'},{k:'status',l:'„°„Ш„Ш„Х„°'}].map(c=>(
                    <th key={c.k} onClick={()=>toggleSort(c.k)} style={{padding:'10px 12px',textAlign:'right',fontWeight:600,whiteSpace:'nowrap',fontSize:12,cursor:'pointer',userSelect:'none'}}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(201,164,78,0.15)'}

                      {c.l}<span style={{marginRight:4,opacity:sortKey===c.k?1:0.3,fontSize:10}}>{sortKey===c.k?(sortDir==='asc'?'вЦ≤':'вЦЉ'):'вЗЕ'}</span>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>{
                  const sc=STATUS_C[c.status]||{bg:'#f0ebe3',fg:'#6b5e50'};

                      onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}

                      <td style={{padding:'10px 12px',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={c.folder||c.client}>{c.folder||c.client}</td>

                      <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50',maxWidth:110,overflow:'hidden',textOverflow:'ellipsis'}}>{c.bank}</td>
                      <td style={{padding:'10px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#6b5e50'}} title={c.purpose}>{c.purpose}</td>
                      <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.openDate}</td>
                      <td style={{padding:'10px 12px'}}>

            </table>
            {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'#9a8e84'}}><div style={{fontSize:40,marginBottom:10}}>рЯУК</div><div>„Ь„Р „†„Ю„¶„Р„Х „™„Щ„І„Щ„Э</div></div>}
          </div>
        </div>
      </div>}

      {/* Stats */}
      {tab==='stats'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <div style={sec}>
            <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>рЯП¶ „Ь„§„Щ „С„†„І (top 10)</div>
            {bankStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>„Р„Щ„Я „†„™„Х„†„Щ „С„†„І</div>:bankStats.map(([bank,{count,fee}])=>(
              <div key={bank} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'58%'}}>{bank==='вАФ'?'„Ь„Р „¶„Х„Щ„Я':bank}</span>
                  <div style={{display:'flex',gap:10,flexShrink:0}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:GOLD,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={sec}>
            <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>рЯПЩпЄП „Ь„§„Щ „Ґ„Щ„® (top 10)</div>
            {cityStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>„Р„Щ„Я „†„™„Х„†„Щ „Ґ„Щ„®</div>:cityStats.map(([city,{count,fee}])=>(
              <div key={city} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510'}}>{city==='вАФ'?'„Ь„Р „¶„Х„Щ„Я':city}</span>
                  <div style={{display:'flex',gap:10}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:'#7c3aed',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{...sec,marginBottom:0}}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>рЯОѓ „Ь„§„Щ „Ю„Ш„®„™ „Ґ„С„Х„У„Ф</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
            {purposeStats.map(([purpose,{count,fee}])=>{
              const pct=managed.length>0?Math.round(count/managed.length*100):0;
              return(
                <div key={purpose} style={{background:'#faf8f4',borderRadius:10,padding:'12px 14px',border:'1px solid #ede8e0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:500,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginLeft:8}} title={purpose}>{purpose==='вАФ'?'„Ь„Р „¶„Х„Щ„Я':purpose}</span>
                    <span style={{fontSize:13,fontWeight:500,color:GOLD3,flexShrink:0}}>{count}</span>
                  </div>
                  <div style={{height:5,background:'#e0d8cc',borderRadius:3,overflow:'hidden',marginBottom:5}}>
                    <div style={{height:'100%',width:`${pct}%`,background:GOLD,borderRadius:3}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#9a8e84'}}>
                    <span>{pct}% „Ю„Ф„™„Щ„І„Щ„Э</span>

                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР SETTINGS VIEW вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function SettingsView({user,settings,onSetting}){
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'};
  const secTitle=(icon,t)=><div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:14,display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:17}}>{icon}</span>{t}</div>;
  const row={display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10};
  const lbl={fontSize:13,color:'#4b3400',fontWeight:600};
  const chip=(val,cur,key)=>(
    <button onClick={()=>onSetting(key,val)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${cur===val?GOLD:'#ddd0bb'}`,background:cur===val?'#fef9e8':'#fff',color:cur===val?GOLD3:'#6b5e50',cursor:'pointer',fontSize:13,fontWeight:cur===val?700:400,transition:'all 0.15s'}}>
      {val==='__auto__'?'„Р„Х„Ш„Х„Ю„Ш„Щ „Ь„§„Щ „Ю„©„™„Ю„©':val===''?'„Ы„Х„Ь„Э':val}
    </button>
  );
  const expandLabels={tall:'рЯУЛ „¶„£ „Ы„Ь„§„Щ „Ю„Ш„Ф',side:'рЯ™Я „¶„£ „Ь„¶„У',full:'рЯЦ•пЄП „§„™„Щ„Ч„Ф „Ю„Ь„Р„Ф'};
  const userName=(USER_BY_EMAIL||{})[(user?.email||'').toLowerCase().trim()]||'вАФ';
  return(
    <div style={{padding:'28px 32px',maxWidth:720,animation:'fadeIn 0.3s ease'}}>
      <h2 style={{fontSize:22,fontWeight:500,color:GOLD3,marginBottom:20}}>вЪЩпЄП „Ф„Т„У„®„Х„™</h2>
      <div style={sec}>
        {secTitle('рЯС§','„§„®„Х„§„Щ„Ь „Ю„©„™„Ю„©')}
        {user&&<div style={{display:'flex',alignItems:'center',gap:14}}>
          {user.picture?<img src={user.picture} style={{width:56,height:56,borderRadius:'50%',border:`2px solid ${GOLD}55`}} alt=""/>
            :<div style={{width:56,height:56,borderRadius:'50%',background:GOLD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:500,color:BLACK}}>{(user.name||'?')[0]}</div>}
          <div>
            <div style={{fontSize:16,fontWeight:500,color:BLACK}}>{user.name}</div>
            <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{user.email}</div>
            <div style={{fontSize:13,color:GOLD3,marginTop:4,fontWeight:500}}>{USER_ROLES[userName]||'вАФ'}</div>
            <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>{userName||'„Ь„Р „Ю„Ц„Х„Ф„Ф'} ¬Ј „Ю„Ц„Х„Ф„Ф „Ь„§„Щ „Ы„™„Х„С„™ „Ф„Ю„Щ„Щ„Ь</div>
          </div>
        </div>}
      </div>
      <div style={sec}>
        {secTitle('рЯЦ•пЄП','„™„¶„Х„Т„Ф')}
        <div style={row}><span style={lbl}>„Т„Х„У„Ь „Т„Х„§„Я</span>
          <div style={{display:'flex',gap:6}}>
            {['small','medium','large'].map(v=><button key={v} onClick={()=>onSetting('fontSize',v)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${settings?.fontSize===v?GOLD:'#ddd0bb'}`,background:settings?.fontSize===v?'#fef9e8':'#fff',color:settings?.fontSize===v?GOLD3:'#6b5e50',cursor:'pointer',fontSize:v==='small'?11:v==='large'?15:13,fontWeight:settings?.fontSize===v?700:400}}>
              {v==='small'?'„І„Ш„Я':v==='medium'?'„®„Т„Щ„Ь':'„Т„У„Х„Ь'}
            </button>)}
          </div>
        </div>
      </div>
      <div style={sec}>
        {secTitle('рЯЧВпЄП','„С„®„Щ„®„™ „Ю„Ч„У„Ь „§„®„Х„Щ„І„Ш„Щ„Э')}
        <div style={row}><span style={lbl}>„Ф„¶„Т„™ „§„®„Х„Щ„І„Ш„Щ„Э „©„Ь</span>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {['__auto__','','„Щ„Х„°„Щ','„Ю„Щ„Ы„Р„Ь','„§„Щ„Щ„Т„Щ'].map(v=>chip(v,settings?.defaultPerson||'__auto__','defaultPerson'))}
          </div>
        </div>
      </div>
    </div>
  );
}

// вХРвХРвХРвХРвХРвХРвХРвХРввХРвХРвХР APP вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function App(){
  const [token,setToken]=useState(null);
  const [user,setUser]=useState(null);
  const [view,setView]=useState('home');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [projects,setProjects]=useState([]);
  const [managed,setManaged]=useState([]);
  const [settings,setSettings]=useState(()=>{try{return JSON.parse(localStorage.getItem('rrr_settings')||'{}')}catch{return {};}});
  const onSetting=(k,v)=>setSettings(s=>{const n={...s,[k]:v};try{localStorage.setItem('rrr_settings',JSON.stringify(n));}catch{}return n;});

  const loadAll=useCallback(async(tok)=>{
    const t=tok||api.token;
    if(!t)return;
    setLoading(true);setError('');
    try{
      const [pR,mR]=await Promise.all([
        api.get(`'„§„®„Х„Щ„І„Ш„Щ„Э „С„С„Щ„¶„Х„Ґ'!A:Z`),
        api.get(`'„†„Щ„Ф„Х„Ь „™„Щ„І„Щ„Э'!A:X`),
      ]);
      setProjects(pR.slice(1).map((r,i)=>parseProject(r,i)).filter(p=>p.name));
      setManaged(mR.slice(1).map((r,i)=>parseManagedCase(r,i)).filter(c=>c.caseNum||c.client));
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  const handleLogin=useCallback(async(tok)=>{
    api.token=tok;setToken(tok);
    try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${tok}`}});
      const u=await r.json();setUser({name:u.name,email:u.email,picture:u.picture});}catch(e){}
    loadAll(tok);
  },[loadAll]);

  const updateProject=useCallback((rowNum,updated)=>setProjects(prev=>prev.map(p=>p._row===rowNum?updated:p)),[]);
  const updateCase=useCallback((rowNum,updated)=>setManaged(prev=>prev.map(c=>c._row===rowNum?updated:c)),[]);
  const addCase=useCallback((newCase)=>setManaged(prev=>[...prev,newCase]),[]);

  const counts=React.useMemo(()=>({
    active:projects.filter(p=>p.status&&!CLIENT_STATUSES.includes(p.status)&&p.status!=='„Ф„°„™„Щ„Щ„Э'&&p.status!=='„С„Х„Ш„Ь').length,
    client:projects.filter(p=>CLIENT_STATUSES.includes(p.status)).length,
    managed:managed.length,
  }),[projects,managed]);

  if(!token){
    return <LoginScreen onLogin={handleLogin}/>;
  }

  return(
    <div style={{direction:'rtl',fontFamily:"'Rubik',sans-serif",background:'#f0ede8',minHeight:'100vh',zoom:FONT_ZOOM[settings.fontSize]||1}}>
      <Sidebar view={view} setView={setView} user={user} onLogout={()=>{api.token=null;setToken(null);setUser(null);setProjects([]);setManaged([]);}} loading={loading} counts={counts}/>
      <div style={{marginRight:232,minHeight:'100vh'}}>
        <div style={{background:'rgba(255,255,255,0.95)',backdropFilter:'blur(8px)',borderBottom:'1px solid #e8e0d4',padding:'10px 24px 10px 28px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:100}}>
          {loading&&<><Spinner size={14} color={GOLD}/><span style={{fontSize:13,color:GOLD}}>„Ш„Х„Ґ„Я...</span></>}
          {error&&<span style={{fontSize:13,color:'#dc2626'}}>вЪ†пЄП {error}</span>}
          <div style={{flex:1}}/>
          <button onClick={()=>loadAll()} style={{padding:'6px 14px',borderRadius:8,border:`1px solid ${GOLD}44`,background:'transparent',color:GOLD,fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>рЯФД „®„Ґ„†„Я</button>
        </div>
        {view==='home'&&<DashboardView projects={projects} managed={managed} user={user} onSetView={setView}/>}
        {view==='projects'&&<ProjectsView projects={projects} onUpdate={updateProject} user={user} managed={managed} onUpdateCase={updateCase} settings={settings}/>}
        {view==='client'&&<ClientView projects={projects} onUpdate={updateProject} user={user} managed={managed} onUpdateCase={updateCase} settings={settings}/>}
        {view==='managed'&&<ManagedView cases={managed} onUpdateCase={updateCase} onAddCase={addCase}/>}
        {view==='reports'&&<ReportsView managed={managed} projects={projects}/>}
        {view==='settings'&&<SettingsView user={user} settings={settings} onSetting={onSetting}/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
</body>
