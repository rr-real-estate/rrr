                  {g.label}
                </button>
              ))}
              <span style={{marginRight:'auto',fontSize:11,color:'#9a8e84'}}>{filtered.length} תיקים · לחץ תא לעריכה · F2 או הקלד לעריכה ישירה</span>
            </div>
            <div style={{background:'#fff',borderRadius:14,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1px solid #ede8e0',overflowX:'auto'}}>
              <div style={{display:'grid',gridTemplateColumns:templateCols,gap:0,background:BLACK2,color:'#e8dfc9',fontSize:12,fontWeight:500,alignItems:'center',minWidth:'max-content'}}>
                {cols.map((c,i)=><span key={i} style={{padding:'10px 12px',borderLeft:hdrBorder(i),whiteSpace:'nowrap'}}>{c.h}</span>)}
              </div>
              {filtered.length===0?(
                <div style={{padding:40,textAlign:'center',color:'#9a8e84'}}>לא נמצאו תיקים</div>
              ):filtered.map((p,idx)=>(
                <div key={p._row}
                  style={{display:'grid',gridTemplateColumns:templateCols,gap:0,alignItems:'stretch',background:idx%2===0?'#fff':'#fdf9f5',borderBottom:'1px solid #ede8e0',minWidth:'max-content'}}
                  onMouseEnter={e=>{if(!editCell)e.currentTarget.style.background='#fef9ee';}}
                  onMouseLeave={e=>{if(!editCell)e.currentTarget.style.background=idx%2===0?'#fff':'#fdf9f5';}}>
                  {cols.map((c,i)=><div key={i} style={{overflow:'hidden',borderLeft:cellBorder(i),display:'flex',alignItems:'stretch'}}>{c.r(p)}</div>)}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {viewMode==='cards'&&Object.keys(groups).length===0?(
        <div style={{padding:60,textAlign:'center',color:'#9a8e84'}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div><div>אין תיקים ממתינים ללקוח</div>
        </div>
      ):viewMode==='cards'&&(
        Object.entries(groups).map(([status,items])=>{
          const m=STATUS_META[status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
          const isOpen=!collapsed[status];
          return(
            <div key={status} style={{marginBottom:18,boxShadow:'0 4px 14px rgba(0,0,0,0.13)',borderRadius:14}}>
              <div onClick={()=>setCollapsed(c=>({...c,[status]:!c[status]}))} style={{background:m.bg,padding:'13px 18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:isOpen?`2px solid ${m.dot}88`:'none',borderRadius:isOpen?'14px 14px 0 0':14}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{width:12,height:12,borderRadius:'50%',background:m.dot,display:'inline-block',flexShrink:0,boxShadow:`0 0 5px ${m.dot}99`}}/>
                  <span style={{fontSize:15,fontWeight:500,color:m.fg}}>{status}</span>
                  <span style={{background:`${m.dot}33`,color:m.fg,border:`1px solid ${m.dot}66`,borderRadius:20,padding:'2px 10px',fontSize:13,fontWeight:500}}>{items.length}</span>
                </div>
                <span style={{fontSize:14,color:m.fg,opacity:0.55}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen&&<div style={{background:'#faf8f4',padding:'14px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:12,borderRadius:'0 0 14px 14px',alignItems:'stretch',gridAutoRows:'190px'}}>
                {items.map(p=><ProjectCard key={p._row} project={p} onClick={()=>setPanelProject(p)} hideDate/>)}
              </div>}
            </div>
          );
        })
      )}
      {panelProject&&<ProjectDetailPanel project={panelProject} onClose={()=>setPanelProject(null)} onSave={handleSave} managed={managed} onUpdateCase={onUpdateCase} onDeleteProject={(rowNum)=>{if(onDelete)onDelete(rowNum);setPanelProject(null);}}/>}
    </div>
  );
}

// ═══════════════ MANAGED CASE PANEL ══════════════════════════════
const MANAGED_STATUSES=['הסתיים','בביצוע','ממתין','בוטל'];
const PURPOSE_OPTIONS=['שומה אחרת להיטל השבחה','תשלומי איזון','בטוחה - רכישה','בית משפט - הערכת שווי','בדיקת התאמה להיתר','בטוחה - הערכת נכס בשיפוץ','אישור שמאי - העדר פגיעה בשכנים','בטוחה - הערכת נכס קיים','תקן 19 - טרום רכישה','בטוחה - נכס להרחבה ושיפוץ','טבלת הקצאות - תב"ע','דמי שכירות ראויים - מקוצרת','שומה להפחתת מס שבח','דמי שכירות ראויים','ניקוד דירות','דיון בית דין','שמאות פנימית'];
const PROP_TYPE_OPTIONS=['קרקע לבניה','דירת מגורים','צמוד קרקע','צמוד קרקע - דו משפחתי','קרקע חקלאית','מחסן','בניין מגורים','דירות מגורים וחניות'];

function ManagedPanel({cas,onClose,onSave,onDelete,onDeleteProject,allCases,addProject,projects}){
  const [form,setForm]=useState({...cas});
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const [tab,setTab]=useState(0);
  const [err,setErr]=useState('');
  const lastSavedStatusRef=React.useRef(cas.status);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleAdvisorChange=(v)=>{
    const updated={advisor:v};
    if(v&&allCases){
      const match=allCases.find(c=>c._row!==cas._row&&c.advisor&&c.advisor.trim()===v.trim()&&(c.advisorPhone||c.advisorEmail));
      if(match){
        if(match.advisorPhone)updated.advisorPhone=match.advisorPhone;
        if(match.advisorEmail)updated.advisorEmail=match.advisorEmail;
      }
    }
    setForm(f=>({...f,...updated}));
  };

  const handleSave=async()=>{
    setSaving(true);setErr('');setSaved(false);
    try{
      const row=[...form._raw];
      while(row.length<=23)row.push('');
      [[M.openDate,'openDate'],[M.closeDate,'closeDate'],[M.fee,'fee'],
       [M.caseNum,'caseNum'],[M.status,'status'],
       [M.client,'client'],[M.phone,'phone'],[M.email,'email'],
       [M.advisor,'advisor'],[M.advisorPhone,'advisorPhone'],[M.advisorEmail,'advisorEmail'],
       [M.purpose,'purpose'],[M.propType,'propType'],[M.rights,'rights'],
       [M.city,'city'],[M.street,'street'],[M.houseNum,'houseNum'],[M.aptNum,'aptNum'],
       [M.block,'block'],[M.parcel,'parcel'],[M.subParcel,'subParcel'],[M.bank,'bank'],[M.michael,'michael'],
      ].forEach(([i,k])=>row[i]=form[k]||'');
      await onSave(form._row,row);
      // If status changed TO בביצוע since last save, add to פרויקטים בביצוע
      if(form.status==='בביצוע'&&lastSavedStatusRef.current!=='בביצוע'){
        const folder=cas.folder||'';
        const alreadyExists=folder&&(projects||[]).some(p=>p.name&&p.name.trim()===folder.trim());
        if(!alreadyExists&&folder){
          try{
            const projRow=new Array(25).fill('');
            projRow[P.name]=folder;
            projRow[P.status]='ממתין לקבלת מסמכים';
            const res=await api.append("'פרויקטים בביצוע'",[projRow]);
            const rng=res?.updates?.updatedRange||'';
            const rm=rng.match(/(\d+)(?::[A-Z]+\d+)?$/);
            const newRow=rm?parseInt(rm[1]):null;
            if(newRow&&addProject)addProject(parseProject(projRow,newRow-2));
          }catch(e2){console.warn('שגיאה בהוספת פרויקט:',e2.message);}
        }
      }
      lastSavedStatusRef.current=form.status;
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    }catch(e){setErr(e.message);}
    finally{setSaving(false);}
  };

  const handleDelete=async()=>{
    if(!confirmDel){setConfirmDel(true);return;}
    setDeleting(true);setErr('');
    try{
      await api.deleteSheetRow('ניהול תיקים',cas._row);
      if(onDelete)onDelete(cas._row);
      // also delete from פרויקטים בביצוע if exists
      const folder=(cas.folder||'').trim();
      if(folder){
        const matchProj=(projects||[]).find(p=>p.name&&p.name.trim()===folder);
        if(matchProj){
          try{
            await api.deleteSheetRow('פרויקטים בביצוע',matchProj._row);
            if(onDeleteProject)onDeleteProject(matchProj._row);
          }catch(e2){console.warn('שגיאה במחיקת פרויקט:',e2.message);}
        }
      }
      onClose();
    }catch(e){setErr(e.message);setDeleting(false);}
  };

  const purposeOpts=React.useMemo(()=>[...new Set([...PURPOSE_OPTIONS,...(allCases||[]).map(c=>c.purpose||'').filter(Boolean)])].sort(),[allCases]);
  const propTypeOpts=React.useMemo(()=>[...new Set([...PROP_TYPE_OPTIONS,...(allCases||[]).map(c=>c.propType||'').filter(Boolean)])].sort(),[allCases]);

  const inp=(k)=>{
    const s={width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
    return <input value={form[k]||''} onChange={e=>set(k,e.target.value)} style={s}/>;
  };
  const selStyle={width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'};
  const sec={background:'#fff',borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'};
  const tabs=[{label:'📦 תיק'},{label:'👤 לקוח ויועץ'},{label:'🏠 נכס'}];

  return(
    <div style={{position:'fixed',inset:0,zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.55)',backdropFilter:'blur(8px)'}} onClick={onClose}>
      <div style={{background:'#f5f3ef',width:'min(680px,96vw)',height:'min(680px,90vh)',borderRadius:18,overflow:'hidden',boxShadow:'0 32px 80px rgba(0,0,0,0.35)',display:'flex',flexDirection:'column',animation:'fadeIn 0.2s ease'}} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{background:BLACK,padding:'18px 22px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:GOLD,fontWeight:500,letterSpacing:'1px',marginBottom:4}}>תיק #{cas.caseNum}</div>
              <div style={{fontSize:14,fontWeight:500,color:'#fff',lineHeight:1.5,wordBreak:'break-word'}}>{cas.folder}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,flexShrink:0}}>
              <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,width:32,height:32,color:'rgba(255,255,255,0.8)',cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
              <button onClick={handleDelete} disabled={deleting} title={confirmDel?'לחץ שוב לאישור':'מחק תיק'}
                style={{background:confirmDel?'#dc2626':'rgba(220,38,38,0.15)',border:'none',borderRadius:8,width:32,height:32,
                  color:confirmDel?'#fff':'#ef4444',cursor:deleting?'not-allowed':'pointer',fontSize:15,
                  display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s'}}>
                {deleting?<Spinner size={12} color="#ef4444"/>:'🗑️'}
              </button>
              {confirmDel&&<div style={{fontSize:9,color:'#f87171',textAlign:'center',lineHeight:1.2,width:44}}>לחץ<br/>שוב</div>}
            </div>
          </div>
          {/* Tabs */}
          <div style={{display:'flex',gap:3,marginTop:14}}>
            {tabs.map((t,i)=>(
              <button key={i} onClick={()=>{setTab(i);setConfirmDel(false);}} style={{
                flex:1,padding:'7px 4px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',
                fontSize:12,fontWeight:tab===i?600:400,transition:'all 0.15s',
                background:tab===i?`${GOLD}22`:'rgba(255,255,255,0.05)',
                color:tab===i?GOLD:'rgba(255,255,255,0.5)',
                borderBottom:tab===i?`2px solid ${GOLD}`:'2px solid transparent'
              }}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* Save bar */}
        <div style={{background:'#fff',padding:'9px 22px',borderBottom:'1px solid #e0d8cc',flexShrink:0,display:'flex',gap:8}}>
          <button onClick={handleSave} disabled={saving} style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:saved?'#16a34a':BLACK,color:saved?'#fff':GOLD,fontWeight:500,cursor:saving?'not-allowed':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            {saving?<><Spinner size={14} color={GOLD}/>שומר...</>:saved?'✓ נשמר!':'💾 שמור'}
          </button>
          <button onClick={()=>{setForm({...cas});setErr('');}} style={{padding:'9px 14px',borderRadius:9,border:'1px solid #ddd0bb',background:'#fff',cursor:'pointer',fontSize:13,color:'#6b5e50'}}>שחזר</button>
          {(()=>{
            const _bp=localStorage.getItem('folderBasePath')||'';
            const _fp=cas.folderLink||(cas.folder&&_bp?buildFolderPath(_bp,cas.folder,cas.status):'');
            return _fp?(
              <button onClick={()=>openFolder(_fp)} title={_fp}
                style={{padding:'9px 13px',borderRadius:9,border:'1px solid #ddd0bb',background:'#fff',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>
                📂
              </button>
            ):null;
          })()}
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 22px',fontSize:13,flexShrink:0}}>{err}</div>}

        {/* Content */}
        <div style={{overflowY:'auto',flex:1,padding:'16px 22px'}}>

          {tab===0&&<div style={sec}>
            <SectionTitle icon="📦">פרטי תיק</SectionTitle>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div><FLabel>מספר תיק</FLabel>{inp('caseNum')}</div>
              <div>
                <FLabel>סטטוס</FLabel>
                <select value={form.status||''} onChange={e=>set('status',e.target.value)} style={selStyle}>
                  <option value="">— בחר —</option>
                  {MANAGED_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                  {form.status&&!MANAGED_STATUSES.includes(form.status)&&<option value={form.status}>{form.status}</option>}
                </select>
              </div>
              <div><FLabel>תאריך פתיחה</FLabel>{inp('openDate')}</div>
              <div><FLabel>תאריך סגירה</FLabel>{inp('closeDate')}</div>
              <div><FLabel>שכר טרחה (₪)</FLabel>{inp('fee')}</div>
            </div>
            <FLabel>תיקייה (נוסחה — קריאה בלבד)</FLabel>
            <div style={{padding:'8px 11px',borderRadius:8,background:'#f0ebe3',fontSize:13,color:'#6b5e50',border:'1px solid #e0d8cc',direction:'rtl'}}>{cas.folder||'—'}</div>
          </div>}

          {tab===1&&<React.Fragment>
            <div style={sec}>
              <SectionTitle icon="👤">לקוח</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{gridColumn:'1/-1'}}><FLabel>שם לקוח</FLabel>{inp('client')}</div>
                <div><FLabel>טלפון</FLabel>{inp('phone')}</div>
                <div><FLabel>מייל</FLabel>{inp('email')}</div>
              </div>
            </div>
            <div style={sec}>
              <SectionTitle icon="🤝">יועץ משכנתאות</SectionTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{gridColumn:'1/-1'}}>
                  <FLabel>שם יועץ</FLabel>
                  <AutocompleteInput value={form.advisor||''} onChange={v=>handleAdvisorChange(v)}
                    options={[...new Set((allCases||[]).map(c=>c.advisor||'').filter(Boolean))].sort()}
                    style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}
                    placeholder="הקלד שם יועץ"/>
                </div>
                <div><FLabel>טלפון יועץ</FLabel>{inp('advisorPhone')}</div>
                <div><FLabel>מייל יועץ</FLabel>{inp('advisorEmail')}</div>
              </div>
            </div>
          </React.Fragment>}

          {tab===2&&<div style={sec}>
            <SectionTitle icon="🏠">פרטי הנכס</SectionTitle>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div><FLabel>עיר / ישוב</FLabel>{inp('city')}</div>
              <div><FLabel>בנק</FLabel>
                <AutocompleteInput value={form.bank||''} onChange={v=>set('bank',v)}
                  options={[...new Set((allCases||[]).map(c=>c.bank||'').filter(Boolean))].sort()}
                  style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}
                  placeholder="הקלד שם בנק"/>
              </div>
              <div><FLabel>רחוב</FLabel>{inp('street')}</div>
              <div><FLabel>מספר בית</FLabel>{inp('houseNum')}</div>
              <div><FLabel>מספר דירה</FLabel>{inp('aptNum')}</div>
              <div>
                <FLabel>מטרת העבודה</FLabel>
                <AutocompleteInput value={form.purpose||''} onChange={v=>set('purpose',v)}
                  options={purposeOpts}
                  style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}
                  placeholder="הקלד מטרת עבודה"/>
              </div>
              <div>
                <FLabel>סוג נכס</FLabel>
                <AutocompleteInput value={form.propType||''} onChange={v=>set('propType',v)}
                  options={propTypeOpts}
                  style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}
                  placeholder="הקלד סוג נכס"/>
              </div>
              <div><FLabel>גוש</FLabel>{inp('block')}</div>
              <div><FLabel>חלקה</FLabel>{inp('parcel')}</div>
              <div><FLabel>תת חלקה</FLabel>{inp('subParcel')}</div>
            </div>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════ ADD CASE MODAL ══════════════════════════════════
function AddCaseModal({onClose,onAdd,cases}){
  const nextNum=React.useMemo(()=>{
    const nums=(cases||[]).map(c=>Number(c.caseNum)||0).filter(n=>n>0);
    return nums.length?Math.max(...nums)+1:'';
  },[cases]);
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({caseNum:String(nextNum),client:'',city:'',street:'',houseNum:'',aptNum:'',
    purpose:'',propType:'',bank:'',advisor:'',phone:'',email:'',advisorPhone:'',advisorEmail:'',
    openDate:today,status:'בביצוע',fee:'',rights:'',block:'',parcel:'',subParcel:''});
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const [errors,setErrors]=useState({});
  const [showClientContact,setShowClientContact]=useState(false);
  const [showAdvisorContact,setShowAdvisorContact]=useState(false);
  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrors(er=>{const n={...er};delete n[k];return n;});};

  const advisorList=React.useMemo(()=>{
    const map={};
    (cases||[]).forEach(c=>{if(c.advisor&&c.advisor.trim())map[c.advisor.trim()]={phone:c.advisorPhone||'',email:c.advisorEmail||''};});
    return map;
  },[cases]);
  const bankList=React.useMemo(()=>[...new Set((cases||[]).map(c=>c.bank||'').filter(Boolean))].sort(),[cases]);
  const purposeList=React.useMemo(()=>[...new Set([...PURPOSE_OPTIONS,...(cases||[]).map(c=>c.purpose||'').filter(Boolean)])].sort(),[cases]);
  const propTypeList=React.useMemo(()=>[...new Set([...PROP_TYPE_OPTIONS,...(cases||[]).map(c=>c.propType||'').filter(Boolean)])].sort(),[cases]);

  const handleAdvisorChange=(v)=>{
    const updated={advisor:v};
    const match=advisorList[v.trim()];
    if(match){
      if(match.phone)updated.advisorPhone=match.phone;
      if(match.email)updated.advisorEmail=match.email;
      if(match.phone||match.email)setShowAdvisorContact(true);
    }
    setForm(f=>({...f,...updated}));
    setErrors(er=>{const n={...er};delete n.advisor;delete n.advisorPhone;delete n.advisorEmail;delete n.phone;delete n.email;return n;});
  };

  const validate=()=>{
    const e={};
    if(!form.caseNum)e.caseNum='שדה חובה';
    const words=(form.client||'').trim().split(/\s+/).filter(Boolean);
    if(words.length<2)e.client='חייב להזין שם ומשפחה';
    const hasAdvisor=(form.advisor||'').trim();
    if(hasAdvisor){
      if(!(form.advisorPhone||'').trim())e.advisorPhone='שדה חובה';
      if(!(form.advisorEmail||'').trim())e.advisorEmail='שדה חובה';
    } else {
      if(!(form.phone||'').trim())e.phone='שדה חובה';
      if(!(form.email||'').trim())e.email='שדה חובה';
    }
    if(!(form.city||'').trim())e.city='שדה חובה';
    if(!(form.bank||'').trim())e.bank='שדה חובה';
    if(!(form.block||'').trim())e.block='שדה חובה';
    if(!(form.parcel||'').trim())e.parcel='שדה חובה';
    if(!(form.purpose||'').trim())e.purpose='שדה חובה';
    if(!(form.propType||'').trim())e.propType='שדה חובה';
    return e;
  };

  const handleAdd=async()=>{
    const e=validate();
    if(Object.keys(e).length>0){
      setErrors(e);
      if(e.advisorPhone||e.advisorEmail)setShowAdvisorContact(true);
      if(e.phone||e.email)setShowClientContact(true);
      return;
    }
    setSaving(true);setErr('');
    try{await onAdd(form);}
    catch(e2){setErr(e2.message);setSaving(false);}
  };

  const errColor='#dc2626';
  const iS={width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid #ddd0bb',fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
  const errMsg=(k)=>errors[k]?<div style={{fontSize:11,color:errColor,marginTop:2}}>{errors[k]}</div>:null;
  const bdr=(k)=>errors[k]?`2px solid ${errColor}`:'1px solid #ddd0bb';
  const inp=(k,placeholder='')=>(
    <React.Fragment>
      <input value={form[k]||''} onChange={e=>set(k,e.target.value)} placeholder={placeholder} style={{...iS,border:bdr(k)}}/>
      {errMsg(k)}
    </React.Fragment>
  );
  const acInp=(k,opts,placeholder,onChange)=>(
    <React.Fragment>
      <AutocompleteInput value={form[k]||''} onChange={onChange||(v=>set(k,v))} options={opts} style={{...iS,border:bdr(k)}} placeholder={placeholder}/>
      {errMsg(k)}
    </React.Fragment>
  );
  const selStyle={...iS};
  const secStyle={background:'#faf7f2',borderRadius:12,padding:14,marginBottom:12,border:'1px solid #ede5d8'};
  const secTitle=(icon,label)=>(<div style={{fontSize:11,fontWeight:500,color:GOLD,letterSpacing:'0.1em',marginBottom:10,textTransform:'uppercase'}}>{icon} {label}</div>);
  const expandBtn=(label,open,setOpen,hasErr)=>(
    <button type="button" onClick={()=>setOpen(o=>!o)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:hasErr?'#fee2e2':'#f0ebe3',border:`1px solid ${hasErr?errColor:'#ddd0bb'}`,borderRadius:8,padding:'7px 12px',cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:500,color:hasErr?errColor:'#5a4e44',marginTop:4}}>
      <span>📞 {label}{hasErr?' ← שדות חובה':''}</span><span style={{fontSize:10}}>{open?'▲':'▼'}</span>
    </button>
  );

  const hasAdvisor=(form.advisor||'').trim();
  const clientContactErr=!hasAdvisor&&(errors.phone||errors.email);
  const advisorContactErr=hasAdvisor&&(errors.advisorPhone||errors.advisorEmail);

  return(
    <div style={{position:'fixed',inset:0,zIndex:700,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:20,padding:28,width:'100%',maxWidth:620,maxHeight:'92vh',overflow:'auto',boxShadow:'0 24px 60px rgba(0,0,0,0.3)',animation:'fadeIn 0.2s ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{fontSize:18,fontWeight:500,color:BLACK}}>הוסף תיק חדש</h2>
          <button onClick={onClose} style={{background:'#f0ebe3',border:'none',borderRadius:8,width:32,height:32,fontSize:18,cursor:'pointer',color:'#6b5e50',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        {err&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 14px',borderRadius:8,fontSize:14,marginBottom:14}}>{err}</div>}
        {Object.keys(errors).length>0&&<div style={{background:'#fff7ed',color:'#92400e',padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:14,border:'1px solid #fcd34d'}}>יש למלא את כל שדות החובה לפני שמירה</div>}

        {/* פרטי תיק */}
        <div style={secStyle}>
          {secTitle('📦','פרטי תיק')}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><FLabel>מספר תיק *</FLabel>{inp('caseNum')}</div>
            <div><FLabel>תאריך פתיחה</FLabel>
              <input type="date" value={form.openDate} onChange={e=>set('openDate',e.target.value)} style={iS}/>
            </div>
            <div>
              <FLabel>סטטוס</FLabel>
              <select value={form.status} onChange={e=>set('status',e.target.value)} style={selStyle}>
                {['בביצוע','הסתיים','ממתין','בוטל'].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div><FLabel>שכר טרחה (₪)</FLabel>{inp('fee')}</div>
          </div>
        </div>

        {/* פרטי לקוח */}
        <div style={secStyle}>
          {secTitle('👤','פרטי לקוח')}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{gridColumn:'1/-1'}}><FLabel>שם לקוח *</FLabel>{inp('client','שם פרטי ושם משפחה')}</div>
          </div>
          {expandBtn('נייד ומייל לקוח',showClientContact,setShowClientContact,!!clientContactErr)}
          {showClientContact&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
            <div><FLabel>נייד לקוח{!hasAdvisor?' *':''}</FLabel>{inp('phone')}</div>
            <div><FLabel>מייל לקוח{!hasAdvisor?' *':''}</FLabel>{inp('email')}</div>
          </div>}
        </div>

        {/* פרטי יועץ */}
        <div style={secStyle}>
          {secTitle('🤝','פרטי יועץ משכנתאות')}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{gridColumn:'1/-1'}}><FLabel>שם יועץ</FLabel>
              <AutocompleteInput value={form.advisor||''} onChange={v=>handleAdvisorChange(v)} options={Object.keys(advisorList)} style={iS} placeholder="הקלד שם יועץ (אופציונלי)"/>
            </div>
          </div>
          {expandBtn('נייד ומייל יועץ',showAdvisorContact,setShowAdvisorContact,!!advisorContactErr)}
          {showAdvisorContact&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
            <div><FLabel>נייד יועץ{hasAdvisor?' *':''}</FLabel>{inp('advisorPhone')}</div>
            <div><FLabel>מייל יועץ{hasAdvisor?' *':''}</FLabel>{inp('advisorEmail')}</div>
          </div>}
        </div>

        {/* פרטי נכס */}
        <div style={secStyle}>
          {secTitle('🏠','פרטי הנכס')}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><FLabel>ישוב / עיר *</FLabel>{inp('city')}</div>
            <div><FLabel>בנק *</FLabel>{acInp('bank',bankList,'הקלד שם בנק')}</div>
            <div><FLabel>רחוב</FLabel>{inp('street')}</div>
            <div><FLabel>מס׳ בית</FLabel>{inp('houseNum')}</div>
            <div><FLabel>מס׳ דירה</FLabel>{inp('aptNum')}</div>
            <div><FLabel>גוש *</FLabel>{inp('block')}</div>
            <div><FLabel>חלקה *</FLabel>{inp('parcel')}</div>
            <div><FLabel>תת חלקה</FLabel>{inp('subParcel')}</div>
            <div><FLabel>מטרת העבודה *</FLabel>{acInp('purpose',purposeList,'הקלד מטרת עבודה')}</div>
            <div><FLabel>סוג נכס *</FLabel>{acInp('propType',propTypeList,'הקלד סוג נכס')}</div>
          </div>
        </div>

        <div style={{display:'flex',gap:10}}>
          <button onClick={handleAdd} disabled={saving} style={{flex:1,padding:'11px',borderRadius:10,border:'none',background:BLACK,color:GOLD,fontWeight:500,cursor:saving?'not-allowed':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            {saving?<><Spinner size={14} color={GOLD}/>שומר...</>:'➕ הוסף תיק'}
          </button>
          <button onClick={onClose} style={{padding:'11px 20px',borderRadius:10,border:'1px solid #ddd0bb',background:'#fff',cursor:'pointer',fontSize:14}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ MANAGED CASES VIEW ══════════════════════════════
function ManagedView({cases,onUpdateCase,onAddCase,addProject,projects,onDeleteCase,onDeleteProject}){
  const [search,setSearch]=useState('');
  const [filters,setFilters]=useState({status:'',bank:'',city:'',purpose:'',propType:'',advisor:''});
  const [page,setPage]=useState(0);
  const [selected,setSelected]=useState(null);
  const [adding,setAdding]=useState(false);
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');
  const PAGE=500;

  const setF=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const opts=(key)=>[...new Set(cases.map(c=>c[key]).filter(Boolean))].sort();

  const toggleSort=(k)=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const filtered=useMemo(()=>{
    let arr=[...cases];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.street,c.folder,c.bank,c.purpose,c.advisor,c.propType].some(v=>String(v||'').toLowerCase().includes(q)));
    if(filters.status)arr=arr.filter(c=>c.status===filters.status);
    if(filters.bank)arr=arr.filter(c=>c.bank===filters.bank);
    if(filters.city)arr=arr.filter(c=>c.city===filters.city);
    if(filters.purpose)arr=arr.filter(c=>c.purpose===filters.purpose);
    if(filters.propType)arr=arr.filter(c=>c.propType===filters.propType);
    if(filters.advisor)arr=arr.filter(c=>c.advisor===filters.advisor);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'', vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      const cmp=String(va).localeCompare(String(vb),'he');
      return sortDir==='asc'?cmp:-cmp;
    });
    return arr;
  },[cases,search,filters,sortKey,sortDir]);

  const anyFilter=search||Object.values(filters).some(Boolean);
  useEffect(()=>setPage(0),[search,filters]);
  const paged=filtered.slice(page*PAGE,(page+1)*PAGE);
  const total=Math.ceil(filtered.length/PAGE);

  const STATUS_C={'הסתיים':{bg:'#dcfce7',fg:'#166534'},'בביצוע':{bg:'#fdf8ee',fg:'#4b3400'},'ממתין':{bg:'#ffedd5',fg:'#9a3412'},'בוטל':{bg:'#fee2e2',fg:'#991b1b'}};
  const inp={padding:'8px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,background:'#fff',outline:'none'};
  const sel=(k,ph)=>(
    <select value={filters[k]} onChange={e=>setF(k,e.target.value)} style={inp}>
      <option value="">{ph}</option>
      {opts(k).map(v=><option key={v} value={v}>{v}</option>)}
    </select>
  );

  const cols=[
    {k:'caseNum',l:'#תיק',w:80},{k:'folder',l:'תיקייה',w:240},{k:'client',l:'לקוח',w:140},
    {k:'city',l:'עיר',w:90},{k:'street',l:'רחוב',w:100},{k:'houseNum',l:'מס\'',w:50},{k:'aptNum',l:'דירה',w:50},
    {k:'purpose',l:'מטרה',w:150},{k:'propType',l:'סוג נכס',w:100},{k:'rights',l:'זכויות',w:90},
    {k:'bank',l:'בנק',w:100},{k:'advisor',l:'יועץ',w:120},
    {k:'openDate',l:'פתיחה',w:85},{k:'closeDate',l:'סגירה',w:85},{k:'fee',l:'שכר טרחה',w:90},
    {k:'status',l:'סטטוס',w:80},
    {k:'phone',l:'טלפון',w:110},{k:'email',l:'מייל',w:140},
  ];

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease'}}>
      {adding&&<AddCaseModal cases={cases} onClose={()=>setAdding(false)} onAdd={async(form)=>{
        // נוסחת שם תיקייה זהה ל-Apps Script: O - P Q - G - D
        const folder=`${form.city||''} - ${[form.street,form.houseNum].filter(Boolean).join(' ')} - ${form.client||''} - ${form.caseNum||''}`;
        const row=new Array(24).fill('');
        row[M.caseNum]=form.caseNum;row[M.client]=form.client;row[M.openDate]=form.openDate;
        row[M.status]=form.status;row[M.city]=form.city;row[M.street]=form.street;
        row[M.houseNum]=form.houseNum;row[M.aptNum]=form.aptNum;row[M.purpose]=form.purpose;
        row[M.propType]=form.propType;row[M.bank]=form.bank;row[M.advisor]=form.advisor;
        row[M.phone]=form.phone;row[M.email]=form.email;row[M.fee]=form.fee;
        row[M.advisorPhone]=form.advisorPhone;row[M.advisorEmail]=form.advisorEmail;
        row[M.block]=form.block;row[M.parcel]=form.parcel;row[M.subParcel]=form.subParcel;
        row[M.folder]=folder;
        await api.put(`'ניהול תיקים'!A${cases.length+2}:${colLetter(24)}${cases.length+2}`,[row]);
        onAddCase({...form,_row:cases.length+2,_raw:row,folder,closeDate:'',michael:''});
        // הוסף שורה לפרויקטים בביצוע אם סטטוס = בביצוע
        if(form.status==='בביצוע'&&folder){
          try{
            const projRow=new Array(25).fill('');
            projRow[P.name]=folder;
            projRow[P.status]='ממתין לקבלת מסמכים';
            const res=await api.append("'פרויקטים בביצוע'",[projRow]);
            const rng=res?.updates?.updatedRange||'';
            const rm=rng.match(/(\d+)(?::[A-Z]+\d+)?$/);
            const newRow=rm?parseInt(rm[1]):null;
            if(newRow&&addProject)addProject(parseProject(projRow,newRow-2));
          }catch(e2){console.warn('שגיאה בהוספת פרויקט:',e2.message);}
        }
        setAdding(false);
      }}/>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:500,color:GOLD3}}>כלל התיקים</h2>
          <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{filtered.length} מתוך {cases.length} תיקים</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {MANAGED_STATUSES.map(s=>{const sc=STATUS_C[s]||{};return(
            <span key={s} onClick={()=>setF('status',filters.status===s?'':s)} style={{...sc,padding:'5px 12px',borderRadius:14,fontSize:12,fontWeight:500,cursor:'pointer',border:`1.5px solid ${filters.status===s?'currentcolor':'transparent'}`}}>
              {s} ({cases.filter(c=>c.status===s).length})
            </span>
          );})}
          <button onClick={()=>setAdding(true)} style={{padding:'9px 18px',borderRadius:10,border:'none',background:BLACK,color:GOLD,fontWeight:500,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',gap:7,boxShadow:'0 2px 8px rgba(0,0,0,0.15)'}}>
            ➕ הוסף תיק
          </button>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש חופשי..."
          style={{...inp,flex:'1 1 200px'}}/>
        {sel('bank','בנק')}
        {sel('city','עיר')}
        {sel('purpose','מטרה')}
        {sel('propType','סוג נכס')}
        {sel('advisor','יועץ')}
        {anyFilter&&<button onClick={()=>{setSearch('');setFilters({status:'',bank:'',city:'',purpose:'',propType:'',advisor:''});}}
          style={{...inp,background:'#ede8e0',color:'#4b3400',border:'1px solid #ddd0bb',cursor:'pointer'}}>נקה הכל ×</button>}
      </div>

      <div style={{background:'#fff',borderRadius:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:BLACK,color:'#e8dfc9'}}>
                {cols.map(c=>(
                  <th key={c.k} onClick={()=>toggleSort(c.k)} style={{padding:'11px 12px',textAlign:'right',fontWeight:600,whiteSpace:'nowrap',fontSize:12,minWidth:c.w,cursor:'pointer',userSelect:'none',transition:'background 0.1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(201,164,78,0.15)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {c.l}
                    <span style={{marginRight:4,opacity:sortKey===c.k?1:0.3,fontSize:10}}>
                      {sortKey===c.k?(sortDir==='asc'?'▲':'▼'):'⇅'}
                    </span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {paged.map((c,i)=>{
                const sc=STATUS_C[c.status]||{bg:'#f0ebe3',fg:'#3a3228'};
                return(
                  <tr key={c._row} style={{borderBottom:'1px solid #ede8e0',background:i%2===0?'#fff':'#fdf9f5',cursor:'pointer',transition:'background 0.1s'}}
                    onClick={()=>setSelected(c)}
                    onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}
                    onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fdf9f5'}
                  >
                    <td style={{padding:'10px 12px',fontWeight:500,color:GOLD,whiteSpace:'nowrap'}}>{c.caseNum}</td>
                    <td style={{padding:'10px 12px',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}} title={c.folder}>{c.folder||c.client}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.client}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.city}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.street}</td>
                    <td style={{padding:'10px 12px'}}>{c.houseNum}</td>
                    <td style={{padding:'10px 12px'}}>{c.aptNum}</td>
                    <td style={{padding:'10px 12px',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#6b5e50'}} title={c.purpose}>{c.purpose}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50'}}>{c.propType}</td>
                    <td style={{padding:'10px 12px',color:'#6b5e50'}}>{c.rights}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>{c.bank}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#6b5e50',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis'}}>{c.advisor}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.openDate}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap',color:'#9a8e84'}}>{c.closeDate}</td>
                    <td style={{padding:'10px 12px',fontWeight:c.fee?700:400,color:c.fee?'#1a1510':'#9a8e84'}}>{c.fee?`₪${c.fee}`:''}</td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>
                      {c.status&&<span style={{...sc,padding:'3px 8px',borderRadius:12,fontSize:11,fontWeight:500}}>{c.status}</span>}
                    </td>
                    <td style={{padding:'10px 12px',whiteSpace:'nowrap'}}>
                      {c.phone&&<a href={`tel:${c.phone}`} onClick={e=>e.stopPropagation()} style={{color:'#4b3400',textDecoration:'none'}}>{c.phone}</a>}
                    </td>
                    <td style={{padding:'10px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {c.email&&<a href={`mailto:${c.email}`} onClick={e=>e.stopPropagation()} style={{color:'#4b3400',textDecoration:'none',fontSize:12}}>{c.email}</a>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'#9a8e84'}}><div style={{fontSize:40,marginBottom:10}}>🗂️</div><div>לא נמצאו תיקים</div></div>}
        </div>
        {total>1&&<div style={{padding:'12px 20px',borderTop:'1px solid #ede8e0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,color:'#6b5e50'}}>עמוד {page+1} / {total} ({filtered.length} תיקים)</span>
          <div style={{display:'flex',gap:6}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'6px 14px',borderRadius:7,border:'1px solid #ddd0bb',background:'#fff',cursor:page===0?'not-allowed':'pointer',opacity:page===0?0.4:1,fontSize:13}}>הקודם</button>
            <button disabled={page>=total-1} onClick={()=>setPage(p=>p+1)} style={{padding:'6px 14px',borderRadius:7,border:'1px solid #ddd0bb',background:'#fff',cursor:page>=total-1?'not-allowed':'pointer',opacity:page>=total-1?0.4:1,fontSize:13}}>הבא</button>
          </div>
        </div>}
      </div>

      {selected&&<ManagedPanel cas={selected} allCases={cases} projects={projects} addProject={addProject}
        onClose={()=>setSelected(null)}
        onDelete={(rowNum)=>{if(onDeleteCase)onDeleteCase(rowNum);setSelected(null);}}
        onDeleteProject={onDeleteProject}
        onSave={async(rowNum,row)=>{
          await api.put(`'ניהול תיקים'!A${rowNum}:${colLetter(row.length)}${rowNum}`,[row]);
          onUpdateCase(rowNum,{...selected,...Object.fromEntries(Object.entries(M).map(([k,i])=>[k,String(row[i]||'').trim()]))});
        }}/>}
    </div>
  );
}

// ═══════════════ SIDEBAR ══════════════════════════════════════════

// ═══════════════ DASHBOARD VIEW ══════════════════════════════════
function DashboardView({projects,managed,user,onSetView,onOpenProject,messages,onlineUsers,onPostMessage,onMarkRead}){
  const today=new Date();today.setHours(0,0,0,0);
  const in7=new Date(today);in7.setDate(in7.getDate()+7);
  const in14=new Date(today);in14.setDate(in14.getDate()+14);

  const activeProjs=projects.filter(p=>!CLIENT_STATUSES.includes(p.status));
  const clientProjs=projects.filter(p=>CLIENT_STATUSES.includes(p.status));

  const overdueProjs=activeProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d<today;})
    .sort((a,b)=>(a._dueD||a._expD)-(b._dueD||b._expD));
  const urgentProjs=activeProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d>=today&&d<=in14;})
    .sort((a,b)=>(a._dueD||a._expD)-(b._dueD||b._expD));
  const thisWeek=urgentProjs.filter(p=>{const d=p._dueD||p._expD;return d&&d<=in7;});

  const parseNum=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
  const totalFee=managed.reduce((s,c)=>s+parseNum(c.fee),0);

  const teamStats=[
    {name:'יוסי',role:'שמאי',count:activeProjs.filter(p=>p.yossi).length,color:'#1e40af'},
    {name:'מיכאל',role:'שמאי',count:activeProjs.filter(p=>p.michael).length,color:GOLD3},
    {name:'פייגי',role:'מזכירה',count:activeProjs.filter(p=>p.feigi).length,color:'#7c3aed'},
  ];

  const userName=USER_BY_EMAIL[(user?.email||'').toLowerCase()]||'';
  const hour=new Date().getHours();
  const greet=hour<12?'בוקר טוב':hour<17?'צהריים טובים':'ערב טוב';

  function KpiCard({icon,label,value,color,sub,onClick}){
    return(
      <div onClick={onClick} style={{background:'#fff',borderRadius:16,padding:'22px 24px',
        boxShadow:'0 2px 10px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04)',
        border:'1px solid #e8e0d4',flex:1,minWidth:160,
        cursor:onClick?'pointer':'default',transition:'all 0.2s cubic-bezier(0.4,0,0.2,1)',
        position:'relative',overflow:'hidden'}}
        onMouseEnter={e=>{if(onClick){e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)';e.currentTarget.style.transform='translateY(-3px)';}}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04)';e.currentTarget.style.transform='none';}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:color,opacity:0.7,borderRadius:'16px 16px 0 0'}}/>
        <div style={{fontSize:24,marginBottom:8,opacity:0.85}}>{icon}</div>
        <div style={{fontSize:36,fontWeight:500,color,lineHeight:1,letterSpacing:'-0.02em'}}>{value}</div>
        <div style={{fontSize:13,color:'#5a4e44',marginTop:7,fontWeight:500}}>{label}</div>
        {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:4,fontWeight:400}}>{sub}</div>}
      </div>
    );
  }

  function UrgentRow({p,isOverdue}){
    const d=p._dueD||p._expD;
    const dStr=p.dueDate||p.expected||'';
    const daysLeft=d?Math.round((d-today)/86400000):null;
    const person=p.yossi?'יוסי':p.michael?'מיכאל':p.feigi?'פייגי':'';
    const m=STATUS_META[p.status]||{bg:'#e8e8e8',fg:'#404040',dot:'#9e9e9e'};
    return(
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderBottom:'1px solid #f5f3ef',fontSize:13,flexWrap:'wrap'}}>
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,whiteSpace:'nowrap',
          background:isOverdue?'#fef2f2':'#fff7ed',color:isOverdue?'#dc2626':'#d97706',
          border:`1px solid ${isOverdue?'#fca5a5':'#fcd34d'}`}}>
          {isOverdue?`⚠️ ${Math.abs(daysLeft)} ימים`:daysLeft===0?'🔴 היום':`📅 ${daysLeft} ימים`}
        </span>
        <span style={{flex:1,fontWeight:600,color:'#1a1510',minWidth:120}}>{p.name}</span>
        <span style={{color:'#9a8e84',fontSize:12}}>{dStr}</span>
        {person&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:'#fef3c7',color:'#4b3400',border:'1px solid #d9af34'}}>{person}</span>}
        <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:m.bg,color:m.fg,border:`1px solid ${m.dot}44`}}>{p.status}</span>
      </div>
    );
  }

  const sec={background:'#fff',borderRadius:16,padding:'22px 24px',marginBottom:16,boxShadow:'0 2px 10px rgba(0,0,0,0.06)',border:'1px solid #e8e0d4'};
  const secTitle=(icon,t,count)=>(
    <div style={{fontSize:14,fontWeight:500,color:'#3a2a00',marginBottom:16,display:'flex',alignItems:'center',gap:8,letterSpacing:'0.01em'}}>
      <span style={{fontSize:16,opacity:0.8}}>{icon}</span>{t}
      {count!==undefined&&<span style={{background:`${GOLD}1a`,color:GOLD3,borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:500,border:`1px solid ${GOLD}33`}}>{count}</span>}
    </div>
  );

  // ── לוח מודעות ──
  const [msgDraft,setMsgDraft]=React.useState('');
  const [msgTo,setMsgTo]=React.useState('כולם');
  const [sending,setSending]=React.useState(false);
  const visibleMsgs=React.useMemo(()=>(messages||[]).filter(m=>
    m.to==='כולם'||m.to===userName||m.from===userName
  ).slice().reverse(),[messages,userName]);
  const handleSend=async()=>{
    if(!msgDraft.trim()||!userName)return;
    setSending(true);
    try{await onPostMessage(userName,msgTo,msgDraft);setMsgDraft('');}
    finally{setSending(false);}
  };

  return(
    <div style={{padding:'28px 32px',animation:'fadeIn 0.3s ease'}}>
      {/* שורת ברכה + מחוברים */}
      <div style={{marginBottom:26,display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:27,fontWeight:500,color:'#1a1510',letterSpacing:'-0.02em'}}>{greet}{userName?` ${userName}`:''} 👋</h2>
          <div style={{fontSize:13,color:'#9a8e84',marginTop:4,fontWeight:400}}>
            {new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
          </div>
        </div>
        {(onlineUsers||[]).length>0&&(
          <div style={{display:'flex',alignItems:'center',gap:8,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:20,padding:'8px 16px',flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'#15803d',fontWeight:600}}>🟢 מחובר עכשיו:</span>
            {onlineUsers.map(u=>(
              <span key={u} style={{fontSize:12,color:'#166534',background:'#dcfce7',borderRadius:12,padding:'2px 10px',fontWeight:500}}>{u}</span>
            ))}
          </div>
        )}
      </div>

      <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
        <KpiCard icon="📁" label="פרויקטים פעילים" value={activeProjs.length} color={GOLD3}
          sub={overdueProjs.length>0?`${overdueProjs.length} באיחור`:'הכל בזמן ✓'} onClick={()=>onSetView('projects')}/>
        <KpiCard icon="⏳" label="ממתין ללקוח" value={clientProjs.length} color="#7c3aed" onClick={()=>onSetView('clients')}/>
        <KpiCard icon="🗂️" label="כלל התיקים" value={managed.length} color="#1e40af"
          onClick={()=>onSetView('managed')}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:16,marginBottom:16,alignItems:'start'}}>

        {/* ── ימין: תיבת מייל — משימות אישיות ── */}
        {(()=>{
          const userFieldMap={'יוסי':'yossi','מיכאל':'michael','פייגי':'feigi'};
          const userField=userFieldMap[userName];
          if(!userField)return <div/>;
          const myTasks=activeProjs
            .filter(p=>p[userField])
            .map(p=>{
              const d=p._dueD||p._expD;
              const dStr=p.dueDate||p.expected||'';
              const daysLeft=d?Math.round((d-today)/86400000):null;
              return{...p,_d:d,_dStr:dStr,_daysLeft:daysLeft};
            })
            .sort((a,b)=>{
              const rankA=a._daysLeft===null?999:a._daysLeft;
              const rankB=b._daysLeft===null?999:b._daysLeft;
              return rankA-rankB;
            });
          return(
            <div style={{...sec,padding:0,overflow:'hidden'}}>
              <div style={{padding:'14px 20px',borderBottom:'1px solid #ede8e0',display:'flex',alignItems:'center',gap:10,background:'#fdfaf5'}}>
                <span style={{fontSize:15}}>📬</span>
                <span style={{fontSize:13,fontWeight:600,color:'#3a2a00'}}>המשימות שלי — {userName}</span>
                <span style={{marginRight:'auto',fontSize:11,color:'#9a8e84'}}>{myTasks.length} משימות</span>
              </div>
              {myTasks.length===0?(
                <div style={{padding:'32px 0',textAlign:'center',color:'#9a8e84',fontSize:13}}>אין משימות פתוחות 🎉</div>
              ):(
                <div style={{maxHeight:420,overflowY:'auto'}}>
                  {myTasks.map((p,i)=>{
                    const isOverdue=p._daysLeft!==null&&p._daysLeft<0;
                    const isToday=p._daysLeft===0;
                    const isSoon=p._daysLeft!==null&&p._daysLeft>0&&p._daysLeft<=7;
                    const borderColor=isOverdue?'#dc2626':isToday?'#f97316':isSoon?'#d97706':'#d4cabb';
                    const dateBg=isOverdue?'#fef2f2':isToday?'#fff7ed':isSoon?'#fffbeb':'#f5f3ef';
                    const dateFg=isOverdue?'#dc2626':isToday?'#ea580c':isSoon?'#d97706':'#9a8e84';
                    const dateLabel=p._daysLeft===null?'ללא תאריך':isOverdue?`⚠️ ${Math.abs(p._daysLeft)} ימים`:isToday?'🔴 היום':isSoon?`📅 ${p._daysLeft} ימים`:`📅 ${p._dStr}`;
                    return(
                      <div key={p._row} onClick={()=>onOpenProject&&onOpenProject(p._row)}
                        style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 20px',
                          borderBottom:i<myTasks.length-1?'1px solid #f0ebe2':'none',
                          borderRight:`3px solid ${borderColor}`,
                          background:isOverdue?'#fffcfc':isToday?'#fffdf8':'#fff',
                          transition:'background 0.15s',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background=isOverdue?'#fff0f0':'#f5f1e8'}
                        onMouseLeave={e=>e.currentTarget.style.background=isOverdue?'#fffcfc':isToday?'#fffdf8':'#fff'}>
                        <div style={{flexShrink:0,minWidth:100,paddingTop:2}}>
                          <span style={{display:'inline-block',background:dateBg,color:dateFg,borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:600,border:`1px solid ${dateFg}33`,whiteSpace:'nowrap'}}>{dateLabel}</span>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:'#1a1510',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                          <div style={{fontSize:12,color:'#5a4e44',lineHeight:1.5,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{renderBold(p[userField])}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}

        {/* ── שמאל: לוח מודעות ── */}

                    <span style={{fontSize:10,color:'#c4b9aa',marginRight:'auto'}}>{m.date}</span>

                    <button onClick={()=>onMarkRead&&onMarkRead(m._row,userName,m.readBy)}

                    </button>
                  )}

          {/* טופס שליחה */}
          <div style={{padding:'12px 16px',borderTop:'1px solid #ede8e0',background:'#fafaf7'}}>

              <select value={msgTo} onChange={e=>setMsgTo(e.target.value)}

                <option value="כולם">כולם</option>
                {['יוסי','מיכאל','פייגי'].filter(n=>n!==userName).map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <span style={{fontSize:11,color:'#9a8e84',alignSelf:'center'}}>← נמען</span>
            </div>
            <textarea value={msgDraft} onChange={e=>setMsgDraft(e.target.value)}
              placeholder="כתוב הודעה..."
              rows={2}
              onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();handleSend();}}}
              style={{width:'100%',fontSize:12,padding:'7px 10px',borderRadius:8,border:'1px solid #ddd0bb',resize:'none',outline:'none',fontFamily:'inherit',boxSizing:'border-box',background:'#fff'}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
              <span style={{fontSize:10,color:'#c4b9aa'}}>Ctrl+Enter לשליחה</span>
              <button onClick={handleSend} disabled={sending||!msgDraft.trim()||!userName}
                style={{fontSize:12,padding:'5px 16px',borderRadius:8,border:'none',background:GOLD,color:'#fff',cursor:'pointer',fontWeight:600,fontFamily:'inherit',opacity:sending||!msgDraft.trim()?0.5:1}}>
                {sending?'שולח...':'שלח'}
              </button>
            </div>
          </div>
        </div>

      </div>{/* סוף גריד 2 עמודות */}

      <div style={sec}>
        {secTitle('👥','ביצועי הצוות')}
        <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
          {teamStats.map(({name,role,count,color})=>(
            <div key={name} style={{flex:1,minWidth:120,background:`linear-gradient(135deg,${color}08 0%,${color}03 100%)`,borderRadius:12,padding:'18px',textAlign:'center',border:`1px solid ${color}22`,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,right:0,left:0,height:3,background:color,opacity:0.7,borderRadius:'12px 12px 0 0'}}/>
              <div style={{fontSize:36,fontWeight:500,color,lineHeight:1,letterSpacing:'-0.02em'}}>{count}</div>
              <div style={{fontSize:14,fontWeight:500,color:'#1a1510',marginTop:7}}>{name}</div>
              <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>תיקים פעילים</div>
            </div>
          ))}
          <div style={{flex:1,minWidth:120,background:'#faf8f4',borderRadius:12,padding:'18px',textAlign:'center',border:'1px solid #ede8e0'}}>
            <div style={{fontSize:32,fontWeight:500,color:'#6b5e50'}}>{activeProjs.length}</div>
            <div style={{fontSize:14,fontWeight:500,color:'#4b3400',marginTop:6}}>סה"כ</div>
            <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>בביצוע</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ REPORTS VIEW ════════════════════════════════════
function ReportsView({managed,projects}){
  const [tab,setTab]=useState('summary');
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [sortKey,setSortKey]=useState('caseNum');
  const [sortDir,setSortDir]=useState('desc');

  const parseNum=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};

  // Financial stats
  const withFee=managed.filter(c=>parseNum(c.fee)>0);
  const totalFee=withFee.reduce((s,c)=>s+parseNum(c.fee),0);
  const completedCases=managed.filter(c=>c.status==='הסתיים');
  const completedFee=completedCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const activeCases=managed.filter(c=>c.status==='בביצוע');
  const activeFee=activeCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const pendingCases=managed.filter(c=>c.status==='ממתין');
  const pendingFee=pendingCases.reduce((s,c)=>s+parseNum(c.fee),0);
  const canceledCases=managed.filter(c=>c.status==='בוטל');

  // Monthly (last 12 months)
  const monthKey=s=>{if(!s)return null;const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}`:null;};
  const now=new Date();
  const months=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);
    return{key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleDateString('he-IL',{month:'short',year:'2-digit'})};
  });
  const monthlyData=months.map(m=>({...m,count:managed.filter(c=>monthKey(c.openDate)===m.key).length,fee:managed.filter(c=>monthKey(c.openDate)===m.key).reduce((s,c)=>s+parseNum(c.fee),0)}));
  const maxMonthCount=Math.max(...monthlyData.map(m=>m.count),1);

  // Group helpers
  const groupBy=(arr,key)=>{
    const map={};
    arr.forEach(c=>{const k=c[key]||'—';if(!map[k])map[k]={count:0,fee:0};map[k].count++;map[k].fee+=parseNum(c.fee);});
    return Object.entries(map).sort((a,b)=>b[1].count-a[1].count);
  };
  const bankStats=groupBy(managed,'bank').slice(0,10);
  const cityStats=groupBy(managed,'city').slice(0,10);
  const purposeStats=groupBy(managed,'purpose').slice(0,8);
  const maxBar=Math.max(...[...bankStats,...cityStats].map(([,v])=>v.count),1);

  // Filtered table
  const filtered=useMemo(()=>{
    let arr=[...managed];
    const q=search.toLowerCase();
    if(q)arr=arr.filter(c=>[c.caseNum,c.client,c.city,c.bank,c.folder,c.purpose].some(v=>String(v||'').toLowerCase().includes(q)));
    if(statusFilter)arr=arr.filter(c=>c.status===statusFilter);
    arr.sort((a,b)=>{
      let va=a[sortKey]||'',vb=b[sortKey]||'';
      if(sortKey==='caseNum'||sortKey==='fee'){va=Number(va)||0;vb=Number(vb)||0;return sortDir==='asc'?va-vb:vb-va;}
      return sortDir==='asc'?String(va).localeCompare(String(vb),'he'):String(vb).localeCompare(String(va),'he');
    });
    return arr;
  },[managed,search,statusFilter,sortKey,sortDir]);
  const toggleSort=k=>{if(sortKey===k){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(k);setSortDir('asc');}};

  const STATUS_C={'הסתיים':{bg:'#dcfce7',fg:'#166534',bar:'#22c55e'},'בביצוע':{bg:'#fdf8ee',fg:'#4b3400',bar:GOLD},'ממתין':{bg:'#ffedd5',fg:'#9a3412',bar:'#f97316'},'בוטל':{bg:'#fee2e2',fg:'#991b1b',bar:'#ef4444'}};
  const tabBtns=[{id:'summary',label:'📊 סיכום'},{id:'cases',label:'📋 דוח תיקים'},{id:'stats',label:'📈 ניתוח'}];
  const inp={padding:'8px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,background:'#fff',outline:'none'};
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',border:'1px solid #ede8e0',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:16};
  const KpiCard=({icon,label,value,sub,color})=>(
    <div style={{background:'#fff',borderRadius:14,padding:'20px 22px',flex:1,minWidth:155,border:'1px solid #ede8e0',boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:26,fontWeight:500,color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:12,color:'#6b5e50',marginTop:6,fontWeight:600}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:'#9a8e84',marginTop:3}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{padding:'24px 28px',animation:'fadeIn 0.3s ease'}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:500,color:GOLD3}}>📊 דוחות</h2>
        <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{managed.length} תיקים במסד הנתונים</div>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,marginBottom:24,background:'#fff',borderRadius:12,padding:4,border:'1px solid #ede8e0',width:'fit-content'}}>
        {tabBtns.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 18px',borderRadius:9,border:'none',background:tab===t.id?BLACK:'transparent',color:tab===t.id?GOLD:'#6b5e50',fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:13,transition:'all 0.15s'}}>{t.label}</button>
        ))}
      </div>

      {/* ── SUMMARY ── */}
      {tab==='summary'&&<div>
        <div style={{display:'flex',gap:14,marginBottom:20,flexWrap:'wrap'}}>
          <KpiCard icon="🗂️" label="סה״כ תיקים" value={managed.length} color={GOLD3}/>
          <KpiCard icon="✅" label="הסתיים" value={completedCases.length} sub={`${managed.length>0?Math.round(completedCases.length/managed.length*100):0}%`} color="#059669"/>
          <KpiCard icon="🔄" label="בביצוע" value={activeCases.length} sub={`${managed.length>0?Math.round(activeCases.length/managed.length*100):0}%`} color="#2563eb"/>
          <KpiCard icon="⏳" label="ממתין" value={pendingCases.length} sub={`${managed.length>0?Math.round(pendingCases.length/managed.length*100):0}%`} color="#d97706"/>
          <KpiCard icon="🚫" label="בוטל" value={canceledCases.length} sub={`${managed.length>0?Math.round(canceledCases.length/managed.length*100):0}%`} color="#991b1b"/>
        </div>

        {/* Monthly bar chart */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>📅 פתיחת תיקים — 12 חודשים אחרונים</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:110}}>
            {monthlyData.map(m=>(
              <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                {m.count>0&&<div style={{fontSize:10,color:'#9a8e84',fontWeight:500}}>{m.count}</div>}
                <div style={{width:'100%',background:m.count>0?GOLD:'#e8e3da',borderRadius:'4px 4px 0 0',height:`${Math.max(3,m.count/maxMonthCount*85)}px`,transition:'height 0.4s'}}/>
                <div style={{fontSize:9,color:'#9a8e84',textAlign:'center',lineHeight:1.2,whiteSpace:'nowrap'}}>{m.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Status breakdown */}
        <div style={sec}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>👥 ביצועי צוות — פרויקטים פעילים</div>
          {(()=>{
            const teamData=[
              {name:'יוסי',color:'#2563eb',icon:'👤'},
              {name:'מיכאל',color:'#7c3aed',icon:'👤'},
              {name:'פייגי',color:'#059669',icon:'👤'},
            ].map(t=>{
              const teamCases=managed.filter(c=>c.michael===t.name||c.folder?.includes(t.name));
              const done=managed.filter(c=>c.status==='הסתיים'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              const active=managed.filter(c=>c.status==='בביצוע'&&(c.michael===t.name||c.folder?.includes(t.name))).length;
              return{...t,total:teamCases.length,done,active,pct:teamCases.length>0?Math.round(done/teamCases.length*100):0};
            });
            const maxTotal=Math.max(...teamData.map(t=>t.total),1);
            // Also: monthly open rate (last 6 months)
            const recentMonths=monthlyData.slice(-6);
            const avgPerMonth=recentMonths.length?Math.round(recentMonths.reduce((s,m)=>s+m.count,0)/recentMonths.length):0;
            const thisMonth=recentMonths[recentMonths.length-1]?.count||0;
            const trend=thisMonth>avgPerMonth?'↑':'↓';
            const trendColor=thisMonth>=avgPerMonth?'#059669':'#d97706';
            return(
              <div>
                {teamData.map(t=>(
                  <div key={t.name} style={{marginBottom:16}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13,alignItems:'center'}}>
                      <span style={{fontWeight:500,color:t.color}}>{t.name}</span>
                      <div style={{display:'flex',gap:14,fontSize:12}}>
                        <span style={{background:'#f0ebe3',borderRadius:10,padding:'2px 8px',color:'#6b5e50'}}>{t.total} תיקים</span>
                        <span style={{background:'#dcfce7',borderRadius:10,padding:'2px 8px',color:'#166534'}}>✓ {t.done} הסתיים</span>
                        <span style={{background:'#fdf8ee',borderRadius:10,padding:'2px 8px',color:GOLD3}}>🔄 {t.active} פעיל</span>
                        <span style={{fontWeight:500,color:t.color}}>{t.pct}%</span>
                      </div>
                    </div>
                    <div style={{height:10,background:'#f0ebe3',borderRadius:5,overflow:'hidden',position:'relative'}}>
                      <div style={{height:'100%',width:`${t.total/maxTotal*100}%`,background:`${t.color}33`,borderRadius:5,position:'absolute'}}/>
                      <div style={{height:'100%',width:`${t.done/maxTotal*100}%`,background:t.color,borderRadius:5,position:'absolute',transition:'width 0.6s'}}/>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:20,padding:'14px 16px',background:'#faf8f4',borderRadius:10,border:'1px solid #ede8e0',display:'flex',gap:24,alignItems:'center'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:500,color:trendColor}}>{trend} {thisMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>תיקים החודש</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:500,color:GOLD3}}>{avgPerMonth}</div>
                    <div style={{fontSize:11,color:'#9a8e84'}}>ממוצע 6 חודשים</div>
                  </div>
                  <div style={{height:36,width:1,background:'#ede8e0'}}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:3,alignItems:'flex-end',height:32}}>
                      {recentMonths.map(m=>(
                        <div key={m.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                          <div style={{width:'100%',background:m.count>=avgPerMonth?GOLD:'#e0d8cc',borderRadius:'3px 3px 0 0',height:`${Math.max(3,m.count/Math.max(...recentMonths.map(x=>x.count),1)*26)}px`}}/>
                          <div style={{fontSize:8,color:'#9a8e84'}}>{m.label.split(' ')[0]}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>}

      {/* ── CASES TABLE ── */}
      {tab==='cases'&&<div>
        <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש..." style={{...inp,flex:1,minWidth:220}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={inp}>
            <option value="">כל הסטטוסים</option>
            {['הסתיים','בביצוע','ממתין','בוטל'].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(search||statusFilter)&&<button onClick={()=>{setSearch('');setStatusFilter('');}} style={{...inp,background:'#ede8e0',color:'#4b3400',cursor:'pointer'}}>נקה ×</button>}
          <div style={{marginRight:'auto',display:'flex',gap:16,fontSize:13,fontWeight:500}}>
            <span style={{color:'#6b5e50'}}>{filtered.length} תיקים</span>

          </div>
        </div>
        <div style={{background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:BLACK,color:'#e8dfc9'}}>
                  {[{k:'caseNum',l:'#תיק'},{k:'folder',l:'תיקייה/לקוח'},{k:'city',l:'עיר'},{k:'bank',l:'בנק'},{k:'purpose',l:'מטרה'},{k:'openDate',l:'פתיחה'},{k:'status',l:'סטטוס'}].map(c=>(

                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      {c.l}<span style={{marginRight:4,opacity:sortKey===c.k?1:0.3,fontSize:10}}>{sortKey===c.k?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>

                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>{
                  const sc=STATUS_C[c.status]||{bg:'#f0ebe3',fg:'#6b5e50'};

                  return(
                    <tr key={c._row} style={{borderBottom:'1px solid #ede8e0',background:i%2===0?'#fff':'#fdf9f5',transition:'background 0.1s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#fdf8ee'}
                      onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fdf9f5'}>
                      <td style={{padding:'10px 12px',fontWeight:500,color:GOLD,whiteSpace:'nowrap'}}>{c.caseNum}</td>
                      <td style={{padding:'10px 12px',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={c.folder||c.client}>{c.folder||c.client}</td>

      </div>}
