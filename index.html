          <div style={sec}>
            <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>🏦 לפי בנק (top 10)</div>
            {bankStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>אין נתוני בנק</div>:bankStats.map(([bank,{count,fee}])=>(
              <div key={bank} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'58%'}}>{bank==='—'?'לא צוין':bank}</span>
                  <div style={{display:'flex',gap:10,flexShrink:0}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:GOLD,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={sec}>
            <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>🏙️ לפי עיר (top 10)</div>
            {cityStats.length===0?<div style={{color:'#9a8e84',textAlign:'center',padding:'16px 0',fontSize:13}}>אין נתוני עיר</div>:cityStats.map(([city,{count,fee}])=>(
              <div key={city} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#1a1510'}}>{city==='—'?'לא צוין':city}</span>
                  <div style={{display:'flex',gap:10}}>
                    <span style={{color:'#6b5e50'}}>{count}</span>

                  </div>
                </div>
                <div style={{height:6,background:'#f0ebe3',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${count/maxBar*100}%`,background:'#7c3aed',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{...sec,marginBottom:0}}>
          <div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:16}}>🎯 לפי מטרת עבודה</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
            {purposeStats.map(([purpose,{count,fee}])=>{
              const pct=managed.length>0?Math.round(count/managed.length*100):0;
              return(
                <div key={purpose} style={{background:'#faf8f4',borderRadius:10,padding:'12px 14px',border:'1px solid #ede8e0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:500,color:'#1a1510',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginLeft:8}} title={purpose}>{purpose==='—'?'לא צוין':purpose}</span>
                    <span style={{fontSize:13,fontWeight:500,color:GOLD3,flexShrink:0}}>{count}</span>
                  </div>
                  <div style={{height:5,background:'#e0d8cc',borderRadius:3,overflow:'hidden',marginBottom:5}}>
                    <div style={{height:'100%',width:`${pct}%`,background:GOLD,borderRadius:3}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#9a8e84'}}>
                    <span>{pct}% מהתיקים</span>

                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ══════════════ SETTINGS VIEW ════════════════════════════════════
function SettingsView({user,settings,onSetting,managed,onUpdateFolderLinks}){
  const sec={background:'#fff',borderRadius:14,padding:'20px 22px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #ede8e0'};
  const secTitle=(icon,t)=><div style={{fontSize:14,fontWeight:500,color:GOLD3,marginBottom:14,display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:17}}>{icon}</span>{t}</div>;
  const row={display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10};
  const lbl={fontSize:13,color:'#4b3400',fontWeight:600};
  const chip=(val,cur,key)=>(
    <button onClick={()=>onSetting(key,val)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${cur===val?GOLD:'#ddd0bb'}`,background:cur===val?'#fef9e8':'#fff',color:cur===val?GOLD3:'#6b5e50',cursor:'pointer',fontSize:13,fontWeight:cur===val?700:400,transition:'all 0.15s',fontFamily:'Rubik,sans-serif'}}>
      {val==='__auto__'?'אוטומטי לפי משתמש':val===''?'כולם':val}
    </button>
  );
  const userName=(USER_BY_EMAIL||{})[(user?.email||'').toLowerCase().trim()]||'—';
  const [basePath,setBasePath]=React.useState(()=>localStorage.getItem('folderBasePath')||'');
  const [updatingLinks,setUpdatingLinks]=React.useState(false);
  const [linksDone,setLinksDone]=React.useState(false);
  const saveBasePath=(v)=>{setBasePath(v);try{localStorage.setItem('folderBasePath',v);}catch{}};
  const handleUpdateLinks=async()=>{
    if(!basePath.trim()){alert('נא להזין נתיב בסיס תחילה');return;}
    setUpdatingLinks(true);setLinksDone(false);
    try{await onUpdateFolderLinks(basePath.trim());setLinksDone(true);setTimeout(()=>setLinksDone(false),3000);}
    catch(e){alert('שגיאה בעדכון קישורים: '+e.message);}
    finally{setUpdatingLinks(false);}
  };
  return(
    <div style={{padding:'28px 32px',maxWidth:720,animation:'fadeIn 0.3s ease'}}>
      <h2 style={{fontSize:22,fontWeight:500,color:GOLD3,marginBottom:20}}>⚙️ הגדרות</h2>
      <div style={sec}>
        {secTitle('👤','פרופיל משתמש')}
        {user&&<div style={{display:'flex',alignItems:'center',gap:14}}>
          {user.picture?<img src={user.picture} style={{width:56,height:56,borderRadius:'50%',border:`2px solid ${GOLD}55`}} alt=""/>
            :<div style={{width:56,height:56,borderRadius:'50%',background:GOLD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:500,color:BLACK}}>{(user.name||'?')[0]}</div>}
          <div>
            <div style={{fontSize:16,fontWeight:500,color:BLACK}}>{user.name}</div>
            <div style={{fontSize:13,color:'#6b5e50',marginTop:2}}>{user.email}</div>
            <div style={{fontSize:13,color:GOLD3,marginTop:4,fontWeight:500}}>{USER_ROLES[userName]||'—'}</div>
            <div style={{fontSize:11,color:'#9a8e84',marginTop:2}}>{userName||'לא מזוהה'} · מזוהה לפי כתובת המייל</div>
          </div>
        </div>}
      </div>
      <div style={sec}>
        {secTitle('🖥️','תצוגה')}
        <div style={row}><span style={lbl}>גודל גופן</span>
          <div style={{display:'flex',gap:6}}>
            {['small','medium','large'].map(v=><button key={v} onClick={()=>onSetting('fontSize',v)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${settings?.fontSize===v?GOLD:'#ddd0bb'}`,background:settings?.fontSize===v?'#fef9e8':'#fff',color:settings?.fontSize===v?GOLD3:'#6b5e50',cursor:'pointer',fontSize:v==='small'?11:v==='large'?15:13,fontWeight:settings?.fontSize===v?700:400,fontFamily:'Rubik,sans-serif'}}>
              {v==='small'?'קטן':v==='medium'?'רגיל':'גדול'}
            </button>)}
          </div>
        </div>
      </div>
      <div style={sec}>
        {secTitle('👤','נציג ברירת מחדל')}
        <div style={{fontSize:12,color:'#9a8e84',marginBottom:10}}>בעת כניסה, סנן אוטומטית לפי נציג זה</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {['__auto__','','יוסי','מיכאל','פייגי'].map(v=>chip(v,settings?.defaultPerson??'__auto__','defaultPerson'))}
        </div>
      </div>
      <div style={sec}>
        {secTitle('📅','תיקי ברירת מחדל')}
        <div style={{fontSize:12,color:'#9a8e84',marginBottom:10}}>סנן תיקים לפי תאריך לביצוע (⏰) בכניסה לאתר</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {[['all','הכל'],['today','היום'],['2days','יומיים'],['week','שבוע']].map(([val,label])=>(
            <button key={val} onClick={()=>onSetting('defaultDays',val)} style={{
              padding:'5px 14px',borderRadius:20,
              border:`1.5px solid ${(settings?.defaultDays??'all')===val?GOLD:'#ddd0bb'}`,
              background:(settings?.defaultDays??'all')===val?'#fef9e8':'#fff',
              color:(settings?.defaultDays??'all')===val?GOLD3:'#6b5e50',
              cursor:'pointer',fontSize:13,
              fontWeight:(settings?.defaultDays??'all')===val?700:400,
              transition:'all 0.15s',fontFamily:'Rubik,sans-serif'
            }}>{label}</button>
          ))}
        </div>
      </div>

      <div style={sec}>
        {secTitle('🗂️','חיבור לתיקיות במחשב')}
        <div style={{fontSize:12,color:'#9a8e84',marginBottom:14,lineHeight:1.7}}>
          מאפשר פתיחת תיקיית תיק ישירות מהאתר. צריך להגדיר פעם אחת על כל מחשב:
        </div>
        {/* שלב 1 */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'#3a2a00',marginBottom:6}}>שלב 1 — הגדר פרוטוקול Windows</div>
          <div style={{fontSize:12,color:'#6b5e50',marginBottom:8}}>הורד את הקובץ והפעל אותו (לחיצה כפולה). פעולה זו נדרשת פעם אחת בלבד לכל מחשב. לאחר מכן פתיחת תיקיות תהיה ללא חלון נוסף.</div>
          <button onClick={downloadRegFile} style={{padding:'8px 18px',borderRadius:9,border:`1.5px solid ${GOLD}`,background:'#fef9e8',color:GOLD3,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',display:'flex',alignItems:'center',gap:7}}>
            ⚙️ הורד קובץ הגדרה (.bat)
          </button>
        </div>
        {/* שלב 2 */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'#3a2a00',marginBottom:6}}>שלב 2 — הדבק נתיב בסיס</div>
          <div style={{fontSize:12,color:'#6b5e50',marginBottom:8}}>הנתיב לתיקייה הראשית שמכילה את פרויקטים בביצוע / פרויקטים שהושלמו / בוטל.</div>
          <input value={basePath} onChange={e=>saveBasePath(e.target.value)}
            placeholder={'לדוגמא: G:\\תיקיות אחסון שיתופי\\שומות'}
            style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1px solid #ddd0bb',fontSize:13,fontFamily:'inherit',boxSizing:'border-box',background:'#fff',outline:'none',direction:'ltr',textAlign:'left'}}/>
        </div>
        {/* שלב 3 */}
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'#3a2a00',marginBottom:6}}>שלב 3 — עדכן קישורים בגיליון</div>
          <div style={{fontSize:12,color:'#6b5e50',marginBottom:8}}>כותב את הנתיב המלא לכל תיק בעמודה X של ניהול תיקים (דורס הכל).</div>
          <button onClick={handleUpdateLinks} disabled={updatingLinks||!basePath.trim()}
            style={{padding:'8px 18px',borderRadius:9,border:'none',background:linksDone?'#16a34a':BLACK,color:linksDone?'#fff':GOLD,cursor:(updatingLinks||!basePath.trim())?'not-allowed':'pointer',fontSize:13,fontWeight:500,fontFamily:'inherit',display:'flex',alignItems:'center',gap:7,opacity:(updatingLinks||!basePath.trim())?0.6:1}}>
            {updatingLinks?<><Spinner size={12} color={GOLD}/>מעדכן...</>:linksDone?'✓ עודכן!':'🔗 עדכן קישורים'}
          </button>
        </div>
      </div>

    </div>
  );
}
function App(){
  const [token,setToken]=useState(null);
  const [user,setUser]=useState(null);
  const [view,setView]=useState('home');
  const [openProjectRow,setOpenProjectRow]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [projects,setProjects]=useState([]);
  const [managed,setManaged]=useState([]);
  const [messages,setMessages]=useState([]);
  const [onlineUsers,setOnlineUsers]=useState([]);
  const [settings,setSettings]=useState(()=>{try{return JSON.parse(localStorage.getItem('rrr_settings')||'{}')}catch{return {};}});
  const onSetting=(k,v)=>setSettings(s=>{const n={...s,[k]:v};try{localStorage.setItem('rrr_settings',JSON.stringify(n));}catch{}return n;});
  const loadMsgsPresence=useCallback(async()=>{
    try{
      const [msgRows,presRows]=await Promise.all([
        api.get("'הודעות'!A2:E"),
        api.get("'נוכחות'!A2:B"),
      ]);
      setMessages((msgRows||[]).map((r,i)=>parseMsg(r,i)).filter(m=>m.text));
      const now=new Date();
      setOnlineUsers((presRows||[]).map(r=>parsePresenceRow(r)).filter(p=>p.name&&p.lastSeen&&(now-p.lastSeen)<3*60*1000).map(p=>p.name));
    }catch(e){}
  },[]);
  const loadAll=useCallback(async()=>{
    setLoading(true);setError('');
    try{
      const [pRows,mRows]=await Promise.all([
        api.get("'פרויקטים בביצוע'!A2:Z"),
        api.get("'ניהול תיקים'!A2:Z"),
      ]);
      setProjects((pRows||[]).map((r,i)=>parseProject(r,i)).filter(p=>p.name));
      setManaged((mRows||[]).map((r,i)=>parseManagedCase(r,i)).filter(c=>c.caseNum||c.client));
    }catch(e){setError('שגיאה בטעינת הנתונים: '+e.message);}
    finally{setLoading(false);}
    loadMsgsPresence();
  },[loadMsgsPresence]);
  // רענון שקט — ללא ספינר, פועל אוטומטית ברקע כל 15 שניות
  const silentRefresh=useCallback(async()=>{
    if(!api.token)return;
    try{
      const [pRows,mRows]=await Promise.all([
        api.get("'פרויקטים בביצוע'!A2:Z"),
        api.get("'ניהול תיקים'!A2:Z"),
      ]);
      setProjects((pRows||[]).map((r,i)=>parseProject(r,i)).filter(p=>p.name));
      setManaged((mRows||[]).map((r,i)=>parseManagedCase(r,i)).filter(c=>c.caseNum||c.client));
    }catch(e){}
    loadMsgsPresence();
  },[loadMsgsPresence]);
  useEffect(()=>{
    if(!token)return;
    const id=setInterval(()=>{if(!document.hidden)silentRefresh();},15000);
    return()=>clearInterval(id);
  },[token,silentRefresh]);
  // Heartbeat נוכחות — כל 30 שניות
  const updatePresence=useCallback(async(uName)=>{
    if(!uName||!api.token)return;
    try{
      const rows=await api.get("'נוכחות'!A2:B");
      const arr=rows||[];
      const idx=arr.findIndex(r=>String(r[0]).trim()===uName);
      const now=new Date().toISOString();
      if(idx>=0){await api.put(`'נוכחות'!A${idx+2}:B${idx+2}`,[[uName,now]]);}
      else{await api.append("'נוכחות'",[[uName,now]]);}
      loadMsgsPresence();
    }catch(e){}
  },[loadMsgsPresence]);
  useEffect(()=>{
    if(!token||!user)return;
    const uName=USER_BY_EMAIL[(user.email||'').toLowerCase()]||'';
    if(!uName)return;
    updatePresence(uName);
    const id=setInterval(()=>{if(!document.hidden)updatePresence(uName);},30000);
    return()=>clearInterval(id);
  },[token,user,updatePresence]);
  // שליחת הודעה ללוח מודעות
  const postMessage=useCallback(async(from,to,text)=>{
    if(!text.trim())return;
    await api.append("'הודעות'",[[nowHe(),from,to,text.trim(),'']]);
    await loadMsgsPresence();
  },[loadMsgsPresence]);
  // סימון קראתי
  const markRead=useCallback(async(msgRow,uName,currentReadBy)=>{
    if(currentReadBy.includes(uName))return;
    const newReadBy=[...currentReadBy,uName];
    await api.put(`'הודעות'!E${msgRow}`,[[newReadBy.join(',')]]);
    setMessages(ms=>ms.map(m=>m._row===msgRow?{...m,readBy:newReadBy}:m));
  },[]);
  const handleLogin=useCallback(async(tok)=>{
    api.token=tok;setToken(tok);
    try{
      const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+tok}});
      if(r.ok){
        const u=await r.json();setUser(u);
        _currentUserName=USER_BY_EMAIL[(u.email||'').toLowerCase()]||u.name||'';
      }
    }catch{}
    loadAll();
  },[loadAll]);
  const updateProject=useCallback((rowNum,upd)=>{
    setProjects(ps=>ps.map(p=>p._row===rowNum?{...p,...upd}:p));
  },[]);
  const updateCase=useCallback((rowNum,upd)=>{
    setManaged(ms=>ms.map(m=>m._row===rowNum?{...m,...upd}:m));
  },[]);
  const addCase=useCallback((c)=>{setManaged(ms=>[...ms,c]);},[]);
  const addProject=useCallback((p)=>{setProjects(ps=>[...ps,p]);},[]);
  const deleteProject=useCallback((rowNum)=>{setProjects(ps=>ps.filter(p=>p._row!==rowNum));},[]);
  const deleteCase=useCallback((rowNum)=>{setManaged(ms=>ms.filter(m=>m._row!==rowNum));},[]);
  const handleUpdateFolderLinks=useCallback(async(basePath)=>{
    if(!managed.length)return;
    // כתיבה אחת — טווח רציף מהשורה הנמוכה לגבוהה
    const sorted=[...managed].sort((a,b)=>a._row-b._row);
    const minRow=sorted[0]._row;
    const maxRow=sorted[sorted.length-1]._row;
    const rowMap={};
    sorted.forEach(c=>{rowMap[c._row]=buildFolderPath(basePath,c.folder,c.status);});
    const values=[];
    for(let r=minRow;r<=maxRow;r++)values.push([rowMap[r]||'']);
    await api.put(`'ניהול תיקים'!X${minRow}:X${maxRow}`,values);
    setManaged(ms=>ms.map(c=>({...c,folderLink:buildFolderPath(basePath,c.folder,c.status)})));
  },[managed]);
  const counts=React.useMemo(()=>({
    active:projects.filter(p=>p.status&&!CLIENT_STATUSES.includes(p.status)&&p.status!=='הסתיים'&&p.status!=='בוטל').length,
    client:projects.filter(p=>CLIENT_STATUSES.includes(p.status)).length,
    managed:managed.length,
  }),[projects,managed]);
  if(!token){return <LoginScreen onLogin={handleLogin}/>;}
  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f7f3ee',fontFamily:'Rubik,sans-serif',direction:'rtl'}}>
      <Sidebar view={view} setView={setView} user={user} loading={loading} counts={counts}
        onLogout={()=>{api.token=null;setToken(null);setUser(null);setProjects([]);setManaged([]);}}/>
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden',marginRight:232,height:'100vh'}}>
        {error&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 24px',fontSize:13}}>{error}</div>}
        {view==='home'&&<DashboardView projects={projects} managed={managed} user={user} onSetView={setView} onOpenProject={(row)=>{setOpenProjectRow(row);setView('projects');}} messages={messages} onlineUsers={onlineUsers} onPostMessage={postMessage} onMarkRead={markRead}/>}
        {view==='projects'&&<ProjectsView projects={projects} onUpdate={updateProject} user={user} managed={managed} onUpdateCase={updateCase} settings={settings} onDelete={deleteProject} autoOpenRow={openProjectRow} onAutoOpenConsumed={()=>setOpenProjectRow(null)}/>}
        {view==='clients'&&<ClientView projects={projects} managed={managed} onUpdate={updateProject} onUpdateCase={updateCase} addCase={addCase} user={user} settings={settings} onDelete={deleteProject}/>}
        {view==='managed'&&<ManagedView cases={managed} projects={projects} onUpdateCase={updateCase} onAddCase={addCase} addProject={addProject} onDeleteCase={deleteCase} onDeleteProject={deleteProject}/>}
        {view==='reports'&&<ReportsView managed={managed} projects={projects}/>}
        {view==='settings'&&<SettingsView settings={settings} onSetting={onSetting} user={user} managed={managed} onUpdateFolderLinks={handleUpdateFolderLinks}/>}
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
